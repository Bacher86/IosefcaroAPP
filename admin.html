<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Maestro - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .sidebar-item { cursor: pointer; transition: 0.2s; }
        .sidebar-item.active { background: #1e293b; color: white; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-pro { border: 1px solid #d0d5dd; border-radius: 12px; padding: 12px; width: 100%; margin-bottom: 16px; outline: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r bg-white p-6 hidden md:flex flex-col sticky top-0 h-screen">
        <h1 class="font-extrabold text-xl mb-10 text-slate-800">Iosef Caro Admin</h1>
        <nav class="space-y-2">
            <div onclick="switchTab('comunicacion')" id="btn-comunicacion" class="sidebar-item active p-3 text-slate-500 font-bold">Comunicación</div>
            <div onclick="switchTab('usuarios')" id="btn-usuarios" class="sidebar-item p-3 text-slate-500 font-bold">Usuarios</div>
            <div onclick="switchTab('alumnos')" id="btn-alumnos" class="sidebar-item p-3 text-slate-500 font-bold">Alumnos</div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <h2 id="title-display" class="text-3xl font-extrabold mb-8">Comunicación</h2>

        <div id="tab-comunicacion" class="tab-content active">
            <div class="bg-white p-6 rounded-3xl border max-w-xl">
                <input type="text" id="post-tit" class="input-pro" placeholder="Título">
                <textarea id="post-msg" rows="4" class="input-pro" placeholder="Mensaje"></textarea>
                <button onclick="enviarComunicado()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">Publicar</button>
            </div>
        </div>

        <div id="tab-usuarios" class="tab-content">
            <div class="grid grid-cols-1 gap-6">
                <div class="bg-white p-6 rounded-3xl border">
                    <h3 class="font-bold mb-4">Registrar Docente</h3>
                    <input type="text" id="doc-nom" class="input-pro" placeholder="Nombre">
                    <input type="email" id="doc-mail" class="input-pro" placeholder="Email">
                    <input type="text" id="doc-cursos" class="input-pro" placeholder="Cursos (Ej: SALA 5)">
                    <button onclick="crearDocente()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Guardar Docente</button>
                </div>
            </div>
        </div>

        <div id="tab-alumnos" class="tab-content">
            <div class="bg-white p-6 rounded-3xl border max-w-xl">
                <h3 class="font-bold mb-4">Nuevo Alumno</h3>
                <input type="text" id="alum-nom" class="input-pro" placeholder="Nombre completo">
                <button onclick="crearAlumno()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold">Cargar Alumno</button>
            </div>
        </div>
    </main>

    <script>
        // TUS CREDENCIALES REALES
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };

        // INICIALIZACION SEGURA
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            document.getElementById('title-display').innerText = id.toUpperCase();
        }

        async function enviarComunicado() {
            const t = document.getElementById('post-tit').value;
            const m = document.getElementById('post-msg').value;
            if(!t || !m) return alert("Faltan datos");
            
            try {
                await db.collection('comunicados').add({
                    titulo: t, texto: m, creadoEn: firebase.firestore.FieldValue.serverTimestamp(), tag: "TODOS"
                });
                alert("¡Publicado en Firebase!");
                location.reload();
            } catch(e) { alert("Error: " + e.message); }
        }

        async function crearDocente() {
            const n = document.getElementById('doc-nom').value;
            const m = document.getElementById('doc-mail').value.toLowerCase().trim();
            const c = document.getElementById('doc-cursos').value.split(',');
            if(!n || !m) return alert("Faltan datos");

            try {
                await db.collection('usuarios').doc(m).set({ nombre: n, rol: 'docente', cursos: c });
                alert("Docente registrado");
            } catch(e) { alert("Error: " + e.message); }
        }

        async function crearAlumno() {
            const n = document.getElementById('alum-nom').value;
            if(!n) return alert("Faltan datos");

            try {
                await db.collection('alumnos').add({ nombre: n, curso: "SALA 5" });
                alert("Alumno registrado");
            } catch(e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
