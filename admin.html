<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión Maestro - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1); }
        #login-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center">
            <div class="w-20 h-20 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl">
                <i class="fas fa-hammer"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Panel Maestro</h1>
            <p class="text-slate-400 font-bold mt-1 uppercase text-[10px] tracking-[0.3em] mb-8">Administración General</p>
            <div class="space-y-4">
                <input type="email" id="log-email" placeholder="Tu Email" class="input-pro">
                <input type="password" id="log-pass" placeholder="Tu Contraseña" class="input-pro">
                <button onclick="validarIngreso()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black transition shadow-lg">ACCEDER AL PANEL</button>
            </div>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <nav class="bg-white border-b p-4 flex gap-2 sticky top-0 z-50 overflow-x-auto shadow-sm">
            <button onclick="switchTab('importar')" class="nav-btn bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Carga CSV</button>
            <button onclick="switchTab('staff')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Staff Admin/Com</button>
            <button onclick="switchTab('materias')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Materias/Cursos</button>
            <button onclick="switchTab('docentes')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Docentes</button>
            <button onclick="switchTab('alumnos')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Alumnos</button>
            <button onclick="switchTab('familias')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Familias</button>
            <button onclick="cerrarSesion()" class="ml-auto text-rose-500 p-2"><i class="fas fa-power-off"></i></button>
        </nav>

        <main class="p-4 max-w-6xl mx-auto space-y-6">

            <section id="tab-importar" class="tab-content active">
                <div class="bg-white p-10 rounded-[2.5rem] border-4 border-dashed border-slate-100 text-center">
                    <i class="fas fa-file-upload text-5xl text-blue-500 mb-4"></i>
                    <h2 class="text-2xl font-black text-slate-800">Importador de Alumnos</h2>
                    <p class="text-slate-400 mb-8">Formato CSV: <b>alumno, curso, familia, mail1, mail2, mail3</b></p>
                    <input type="file" id="csv-file" accept=".csv" class="hidden" onchange="document.getElementById('csv-info').innerText = this.files[0].name">
                    <label for="csv-file" class="bg-slate-100 text-slate-800 px-8 py-4 rounded-2xl font-bold cursor-pointer hover:bg-slate-200 inline-block mb-4 transition">Seleccionar Archivo</label>
                    <p id="csv-info" class="text-xs font-black text-blue-600 mb-6 uppercase"></p>
                    <button onclick="procesarCSV()" class="block mx-auto bg-blue-600 text-white px-12 py-4 rounded-2xl font-black shadow-xl">INICIAR IMPORTACIÓN</button>
                    <div id="csv-status" class="mt-6 text-sm font-bold text-slate-400"></div>
                </div>
            </section>

            <section id="tab-staff" class="tab-content space-y-6">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="font-black text-xl mb-4">Nuevo Usuario con Acceso</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="staff-nombre" placeholder="Nombre completo" class="input-pro">
                        <input type="email" id="staff-email" placeholder="Email de login" class="input-pro">
                        <input type="text" id="staff-pass" placeholder="Contraseña de login" class="input-pro">
                        <select id="staff-rol" class="input-pro">
                            <option value="admin">Administrador Total</option>
                            <option value="comunicacion">Solo Comunicación</option>
                        </select>
                        <button onclick="crearStaff()" class="md:col-span-2 bg-slate-900 text-white p-4 rounded-2xl font-bold">Guardar Usuario</button>
                    </div>
                </div>
                <div id="lista-staff" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="tab-materias" class="tab-content space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-3xl border">
                        <h3 class="font-black mb-4">Materias</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="new-materia" placeholder="Nueva materia" class="input-pro">
                            <button onclick="crearMaestro('materias', 'new-materia')" class="bg-blue-600 text-white px-4 rounded-xl font-bold">+</button>
                        </div>
                        <div id="lista-materias" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border">
                        <h3 class="font-black mb-4">Cursos</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="new-curso" placeholder="Ej: 1A" class="input-pro">
                            <button onclick="crearMaestro('cursos', 'new-curso')" class="bg-emerald-600 text-white px-4 rounded-xl font-bold">+</button>
                        </div>
                        <div id="lista-cursos" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </section>

            <section id="tab-docentes" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="font-black text-xl mb-4">Asignar Materia/Curso a Docente</h2>
                    <p class="text-[10px] text-slate-400 mb-4 uppercase font-bold italic">Nota: Si el docente ya existe, se sumarán las nuevas asignaciones.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="doc-nombre" placeholder="Nombre y Apellido" class="input-pro">
                        <input type="email" id="doc-email" placeholder="Email institucional" class="input-pro">
                        <select id="doc-materia" class="input-pro">
                            <option value="">Seleccionar Materia</option>
                        </select>
                        <select id="doc-curso" class="input-pro">
                            <option value="">Seleccionar Curso</option>
                        </select>
                        <button onclick="crearDocente()" class="md:col-span-2 bg-slate-900 text-white p-4 rounded-2xl font-bold">Asignar y Guardar</button>
                    </div>
                </div>
                <div id="lista-docentes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

            <section id="tab-alumnos" class="tab-content space-y-4">
                <div class="bg-white p-4 rounded-2xl border flex items-center justify-between shadow-sm">
                    <input type="text" onkeyup="buscar('search-alu', 'lista-alumnos')" id="search-alu" placeholder="Filtrar por nombre..." class="input-pro max-w-xs">
                    <span id="count-alumnos" class="text-[10px] font-black text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">Cargando...</span>
                </div>
                <div id="lista-alumnos" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </section>

            <section id="tab-familias" class="tab-content space-y-4">
                <div class="bg-white p-4 rounded-2xl border shadow-sm">
                    <input type="text" onkeyup="buscar('search-fam', 'lista-familias')" id="search-fam" placeholder="Buscar familia o email..." class="input-pro">
                </div>
                <div id="lista-familias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

        </main>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", 
            authDomain: "app-iosefcaro.firebaseapp.com", 
            projectId: "app-iosefcaro", 
            storageBucket: "app-iosefcaro.firebasestorage.app", 
            messagingSenderId: "651320124248", 
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function validarIngreso() {
            const emailInput = document.getElementById('log-email').value.trim().toLowerCase();
            const passInput = document.getElementById('log-pass').value.trim();
            if(!emailInput || !passInput) return alert("Ingresa tus datos.");
            if(emailInput === "uriel.bacher@gmail.com" && passInput === "Gallardo10") {
                autorizar("admin");
                return;
            }
            try {
                const userDoc = await db.collection('usuarios').doc(emailInput).get();
                if(userDoc.exists) {
                    const data = userDoc.data();
                    if(data.pass === passInput && data.rol === 'admin') {
                        autorizar("admin");
                    } else if (data.rol !== 'admin') {
                        alert("Este usuario no tiene permisos de administrador.");
                    } else {
                        alert("Contraseña incorrecta.");
                    }
                } else {
                    alert("Usuario no registrado.");
                }
            } catch(e) { alert("Error de conexión."); }
        }

        function autorizar(rol) {
            sessionStorage.setItem('iosef_admin_session', rol);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            refrescarTodo();
        }

        window.onload = () => {
            if(sessionStorage.getItem('iosef_admin_session')) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').classList.remove('hidden');
                refrescarTodo();
            }
        };

        function cerrarSesion() { sessionStorage.clear(); location.reload(); }

        async function procesarCSV() {
            const file = document.getElementById('csv-file').files[0];
            if(!file) return alert("Carga un archivo .csv primero");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split(/\r?\n/);
                let logs = 0;
                for(let i=1; i<lines.length; i++) {
                    const columns = lines[i].split(',').map(s => s?.trim());
                    const [alu, cur, fam] = columns;
                    const emails = columns.slice(3).filter(email => email && email.includes('@'));

                    if(alu && emails.length > 0) {
                        for(let mail of emails) {
                            const m = mail.toLowerCase();
                            await db.collection('usuarios').doc(m).set({
                                nombre: fam, 
                                rol: 'familia', 
                                hijos: firebase.firestore.FieldValue.arrayUnion({ nombre: alu, curso: cur.toUpperCase() })
                            }, {merge:true});
                        }
                        await db.collection('alumnos').add({ nombre: alu, curso: cur.toUpperCase(), familiaNombre: fam });
                        logs++;
                        document.getElementById('csv-status').innerText = `Procesando: ${logs} alumnos...`;
                    }
                }
                alert("Importación de " + logs + " alumnos completada.");
                location.reload();
            };
            reader.readAsText(file);
        }

        async function crearMaestro(col, inpId) {
            const val = document.getElementById(inpId).value.trim();
            if(!val) return;
            await db.collection(col).add({ nombre: val });
            document.getElementById(inpId).value = "";
            refrescarTodo();
        }

        async function crearStaff() {
            const n = document.getElementById('staff-nombre').value;
            const m = document.getElementById('staff-email').value.toLowerCase().trim();
            const p = document.getElementById('staff-pass').value;
            const r = document.getElementById('staff-rol').value;
            if(!n || !m || !p) return alert("Completa todos los campos");
            await db.collection('usuarios').doc(m).set({ nombre: n, pass: p, rol: r });
            alert("Usuario Staff guardado");
            cargarStaff();
        }

        // --- REGISTRO DOCENTE MULTI-CURSO Y MULTI-MATERIA ---
        async function crearDocente() {
            const n = document.getElementById('doc-nombre').value;
            const e = document.getElementById('doc-email').value.toLowerCase().trim();
            const mat = document.getElementById('doc-materia').value;
            const cur = document.getElementById('doc-curso').value;
            if(!n || !e || !mat || !cur) return alert("Completa todos los datos");

            // Usamos arrayUnion para no sobreescribir lo anterior
            await db.collection('usuarios').doc(e).set({ 
                nombre: n, 
                rol: 'docente',
                materias: firebase.firestore.FieldValue.arrayUnion(mat),
                cursos: firebase.firestore.FieldValue.arrayUnion(cur) 
            }, { merge: true });

            alert("Asignación completada: " + mat + " en " + cur);
            cargarDocentes();
        }

        async function cargarMaestros(col, contId) {
            const snap = await db.collection(col).orderBy('nombre', 'asc').get();
            const cont = document.getElementById(contId);
            const selectDoc = col === 'materias' ? document.getElementById('doc-materia') : document.getElementById('doc-curso');
            
            cont.innerHTML = "";
            if(selectDoc) selectDoc.innerHTML = `<option value="">Seleccionar ${col === 'materias' ? 'Materia' : 'Curso'}</option>`;

            snap.forEach(doc => {
                const name = doc.data().nombre;
                cont.innerHTML += `<span class="bg-slate-100 px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-2 border">
                    ${name} <i onclick="eliminarDoc('${col}', '${doc.id}')" class="fas fa-times text-slate-300 hover:text-red-500 cursor-pointer"></i>
                </span>`;
                if(selectDoc) selectDoc.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        async function cargarStaff() {
            const snap = await db.collection('usuarios').where('rol', 'in', ['admin', 'comunicacion']).get();
            const cont = document.getElementById('lista-staff');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                cont.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                    <span><b>${u.nombre}</b> <br><small class="text-blue-500 font-black uppercase text-[9px]">${u.rol} • ${doc.id}</small></span>
                    <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="text-rose-200 hover:text-rose-600"><i class="fas fa-trash"></i></button>
                </div>`;
            });
        }

        async function cargarDocentes() {
            const snap = await db.collection('usuarios').where('rol', '==', 'docente').get();
            const cont = document.getElementById('lista-docentes');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                // Manejar tanto el formato viejo (string) como el nuevo (array)
                const mats = d.materias ? d.materias.join(', ') : (d.materia || 'Sin materia');
                const curs = d.cursos ? d.cursos.join(', ') : (d.curso || 'Sin curso');

                cont.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center text-sm shadow-sm">
                    <span><b>${d.nombre}</b><br>
                    <small class="text-blue-600 font-bold uppercase text-[9px]">MATERIAS: ${mats}</small><br>
                    <small class="text-emerald-600 font-bold uppercase text-[9px]">CURSOS: ${curs}</small><br>
                    <small class="text-slate-400">${doc.id}</small></span>
                    <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="text-rose-200"><i class="fas fa-user-minus"></i></button>
                </div>`;
            });
        }

        async function cargarAlumnos() {
            const snap = await db.collection('alumnos').get();
            const cont = document.getElementById('lista-alumnos');
            cont.innerHTML = "";
            document.getElementById('count-alumnos').innerText = snap.size + " Alumnos";
            snap.forEach(doc => {
                const a = doc.data();
                cont.innerHTML += `<div class="bg-white p-4 rounded-2xl border text-center shadow-sm" data-search="${a.nombre} ${a.curso}">
                    <p class="font-bold text-sm">${a.nombre}</p>
                    <p class="text-[9px] bg-slate-100 px-2 py-0.5 rounded-full inline-block mt-1 font-black">${a.curso}</p>
                    <button onclick="eliminarDoc('alumnos', '${doc.id}')" class="block mx-auto mt-2 text-slate-200 hover:text-rose-400"><i class="fas fa-times-circle"></i></button>
                </div>`;
            });
        }

        async function cargarFamilias() {
            const snap = await db.collection('usuarios').where('rol','==','familia').get();
            const cont = document.getElementById('lista-familias');
            cont.innerHTML = "";
            snap.forEach(doc => {
                cont.innerHTML += `<div class="bg-white p-4 rounded-2xl border shadow-sm" data-search="${doc.data().nombre} ${doc.id}">
                    <p class="font-bold text-sm">${doc.data().nombre}</p>
                    <p class="text-[10px] text-slate-400 truncate">${doc.id}</p>
                    <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="mt-2 text-[9px] font-black text-rose-300 uppercase hover:text-rose-600">Borrar Acceso</button>
                </div>`;
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white'); b.classList.add('text-slate-500');
            });
            event.currentTarget.classList.add('bg-slate-900', 'text-white');
        }

        async function eliminarDoc(col, id) {
            if(confirm("¿Seguro?")) { await db.collection(col).doc(id).delete(); refrescarTodo(); }
        }

        function buscar(inpId, contId) {
            const q = document.getElementById(inpId).value.toLowerCase();
            const items = document.getElementById(contId).children;
            for (let item of items) {
                const txt = item.getAttribute('data-search') || item.innerText;
                item.style.display = txt.toLowerCase().includes(q) ? 'block' : 'none';
            }
        }

        function refrescarTodo() {
            cargarStaff();
            cargarDocentes();
            cargarAlumnos();
            cargarFamilias();
            cargarMaestros('materias', 'lista-materias');
            cargarMaestros('cursos', 'lista-cursos');
        }
    </script>
</body>
</html>
