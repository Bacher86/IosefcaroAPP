<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión Institucional - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #2563eb; ring: 3px ring-blue-100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="bg-white border-b p-4 flex gap-4 sticky top-0 z-50 shadow-sm overflow-x-auto">
        <button onclick="switchTab('familias')" class="nav-btn font-bold px-4 py-2 rounded-xl bg-slate-900 text-white whitespace-nowrap">Familias y Carga Masiva</button>
        <button onclick="switchTab('alumnos')" class="nav-btn font-bold px-4 py-2 rounded-xl text-slate-500 whitespace-nowrap">Lista de Alumnos</button>
        <button onclick="switchTab('docentes')" class="nav-btn font-bold px-4 py-2 rounded-xl text-slate-500 whitespace-nowrap">Docentes y Materias</button>
    </nav>

    <main class="p-4 max-w-6xl mx-auto">

        <section id="tab-familias" class="tab-content active space-y-6">
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <h2 class="font-black text-xl mb-2 text-slate-800">Carga Masiva Multihijo</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4">Formato: Hijo1, Hijo2, Hijo3, Hijo4, Curso, Familia, Mail1, Mail2, Mail3</p>
                <textarea id="csv-masivo" class="input-pro h-40 mb-4 bg-slate-50 font-mono text-xs" placeholder="Juan Perez, Maria Perez, , , 1A, Familia Perez, papa@mail.com, mama@mail.com"></textarea>
                <button onclick="procesarCargaMasiva()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black shadow-lg">Procesar y Vincular Datos</button>
            </div>

            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <h3 class="font-bold text-slate-700">Usuarios (Familias)</h3>
                    <input type="text" id="bus-fam" onkeyup="buscarEnTabla('bus-fam', 'lista-familias')" placeholder="Buscar familia..." class="text-xs p-2 border rounded-lg">
                </div>
                <div id="lista-familias" class="divide-y max-h-[400px] overflow-y-auto"></div>
            </div>
        </section>

        <section id="tab-alumnos" class="tab-content space-y-6">
            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <h3 class="font-bold text-slate-700">Alumnos Registrados</h3>
                    <input type="text" id="bus-al" onkeyup="buscarEnTabla('bus-al', 'lista-alumnos')" placeholder="Buscar alumno..." class="text-xs p-2 border rounded-lg">
                </div>
                <div id="lista-alumnos" class="divide-y max-h-[600px] overflow-y-auto"></div>
            </div>
        </section>

        <section id="tab-docentes" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h3 class="font-black text-lg mb-4">Gestionar Materias</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-materia" placeholder="Nombre de la materia" class="input-pro">
                        <button onclick="agregarMateria()" class="bg-emerald-500 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="lista-materias" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h3 class="font-black text-lg mb-4">Alta/Edición Docente</h3>
                    <input type="hidden" id="doc-id">
                    <input type="text" id="doc-nom" placeholder="Nombre completo" class="input-pro mb-3">
                    <input type="email" id="doc-mail" placeholder="Email (ID de acceso)" class="input-pro mb-3">
                    
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2">CURSOS (Multiselección)</label>
                            <div id="check-cursos" class="h-32 overflow-y-auto border rounded-xl p-2 bg-slate-50 space-y-1"></div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2">MATERIAS (Multiselección)</label>
                            <div id="check-materias" class="h-32 overflow-y-auto border rounded-xl p-2 bg-slate-50 space-y-1"></div>
                        </div>
                    </div>
                    <button onclick="guardarDocente()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">Guardar Docente</button>
                </div>
            </div>

            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <div class="p-4 bg-slate-50 border-b font-bold text-slate-700">Staff Docente</div>
                <div id="lista-docentes" class="divide-y"></div>
            </div>
        </section>

    </main>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", 
            authDomain: "app-iosefcaro.firebaseapp.com", 
            projectId: "app-iosefcaro", 
            storageBucket: "app-iosefcaro.firebasestorage.app", 
            messagingSenderId: "651320124248", 
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = () => {
            refrescarTodo();
        };

        function refrescarTodo() {
            cargarFamilias();
            cargarAlumnos();
            cargarMaterias();
            cargarDocentes();
        }

        // --- CARGA MASIVA ---
        async function procesarCargaMasiva() {
            const texto = document.getElementById('csv-masivo').value;
            const lineas = texto.split('\n');
            let count = 0;

            for (let linea of lineas) {
                if (!linea.trim()) continue;
                const [h1, h2, h3, h4, curso, familia, m1, m2, m3] = linea.split(',').map(s => s.trim());
                
                let hijosData = [];
                // Procesar hasta 4 hijos
                for (let hName of [h1, h2, h3, h4]) {
                    if (hName) {
                        const alRef = await db.collection('alumnos').add({ nombre: hName, curso: curso });
                        hijosData.push({ nombre: hName, id: alRef.id });
                    }
                }

                // Crear/Actualizar usuarios familia por cada mail
                for (let mail of [m1, m2, m3]) {
                    if (mail && mail.includes('@')) {
                        await db.collection('usuarios').doc(mail.toLowerCase()).set({
                            nombre: familia,
                            rol: 'familia',
                            hijos: hijosData
                        }, { merge: true });
                    }
                }
                count++;
            }
            alert(`Éxito: Se procesaron ${count} familias.`);
            refrescarTodo();
        }

        // --- MATERIAS ---
        async function agregarMateria() {
            const nom = document.getElementById('new-materia').value.trim();
            if(!nom) return;
            await db.collection('config').doc('materias').set({
                lista: firebase.firestore.FieldValue.arrayUnion(nom)
            }, { merge: true });
            document.getElementById('new-materia').value = "";
            cargarMaterias();
        }

        async function cargarMaterias() {
            const doc = await db.collection('config').doc('materias').get();
            const materias = doc.exists ? doc.data().lista : [];
            const cont = document.getElementById('lista-materias');
            const checks = document.getElementById('check-materias');
            cont.innerHTML = ""; checks.innerHTML = "";
            
            materias.sort().forEach(m => {
                cont.innerHTML += `<span class="bg-slate-100 px-3 py-1 rounded-full text-xs font-bold text-slate-600">${m}</span>`;
                checks.innerHTML += `<label class="flex items-center text-xs gap-2"><input type="checkbox" class="chk-mat" value="${m}"> ${m}</label>`;
            });
        }

        // --- DOCENTES ---
        async function guardarDocente() {
            const nom = document.getElementById('doc-nom').value;
            const mail = document.getElementById('doc-mail').value.toLowerCase().trim();
            const cursosSel = Array.from(document.querySelectorAll('.chk-cur:checked')).map(c => c.value);
            const matsSel = Array.from(document.querySelectorAll('.chk-mat:checked')).map(c => c.value);

            if(!nom || !mail) return alert("Nombre y Mail son obligatorios");

            await db.collection('usuarios').doc(mail).set({
                nombre: nom,
                email: mail,
                rol: 'docente',
                cursos: cursosSel,
                materias: matsSel
            }, { merge: true });

            alert("Docente Guardado");
            location.reload();
        }

        async function cargarDocentes() {
            const snap = await db.collection('usuarios').where('rol', '==', 'docente').get();
            const cont = document.getElementById('lista-docentes');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <p class="font-bold">${d.nombre}</p>
                            <p class="text-[10px] text-slate-400">${doc.id} • ${d.cursos?.join(", ") || 'Sin curso'}</p>
                        </div>
                        <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="text-rose-400"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        // --- ALUMNOS Y CURSOS ---
        async function cargarAlumnos() {
            const snap = await db.collection('alumnos').orderBy('curso').get();
            const cont = document.getElementById('lista-alumnos');
            const checkCursos = document.getElementById('check-cursos');
            cont.innerHTML = "";
            
            let cursosUnicos = new Set();
            snap.forEach(doc => {
                const a = doc.data();
                cursosUnicos.add(a.curso);
                cont.innerHTML += `
                    <div class="p-3 flex justify-between text-sm row-al" data-search="${a.nombre}">
                        <span><b>${a.curso}</b> - ${a.nombre}</span>
                        <button onclick="eliminarDoc('alumnos', '${doc.id}')" class="text-slate-300"><i class="fas fa-times"></i></button>
                    </div>`;
            });

            checkCursos.innerHTML = "";
            [...cursosUnicos].sort().forEach(c => {
                checkCursos.innerHTML += `<label class="flex items-center text-xs gap-2"><input type="checkbox" class="chk-cur" value="${c}"> ${c}</label>`;
            });
        }

        async function cargarFamilias() {
            const snap = await db.collection('usuarios').where('rol', '==', 'familia').get();
            const cont = document.getElementById('lista-familias');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const f = doc.data();
                const hijos = f.hijos?.map(h => h.nombre).join(", ") || "Sin hijos vinculados";
                cont.innerHTML += `
                    <div class="p-4 row-fam" data-search="${f.nombre} ${doc.id}">
                        <div class="flex justify-between">
                            <p class="font-bold text-slate-800">${f.nombre}</p>
                            <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="text-rose-300"><i class="fas fa-trash"></i></button>
                        </div>
                        <p class="text-[10px] text-blue-500 font-bold">${doc.id}</p>
                        <p class="text-xs text-slate-400 mt-1"><i class="fas fa-child mr-1"></i> ${hijos}</p>
                    </div>`;
            });
        }

        // --- UTILIDADES ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-'+tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white');
                b.classList.add('text-slate-500');
            });
            event.currentTarget.classList.add('bg-slate-900', 'text-white');
        }

        function buscarEnTabla(inputId, containerId) {
            const q = document.getElementById(inputId).value.toLowerCase();
            document.getElementById(containerId).childNodes.forEach(row => {
                if(row.dataset?.search) {
                    row.style.display = row.dataset.search.toLowerCase().includes(q) ? 'block' : 'none';
                }
            });
        }

        async function eliminarDoc(col, id) {
            if(confirm("¿Eliminar permanentemente?")) {
                await db.collection(col).doc(id).delete();
                location.reload();
            }
        }
    </script>
</body>
</html>
