<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Maestro - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .sidebar-item { cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .sidebar-item.active { background: #1e293b; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #d0d5dd; border-radius: 12px; padding: 12px; width: 100%; margin-bottom: 16px; outline: none; background: white; }
        .input-pro:focus { border-color: #1e293b; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r bg-white p-6 hidden md:flex flex-col sticky top-0 h-screen shadow-sm">
        <div class="mb-10 px-2">
            <h1 class="font-extrabold text-xl text-slate-800 tracking-tighter leading-none">Iosef Caro</h1>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Panel de Control</span>
        </div>
        <nav class="space-y-2">
            <div onclick="switchTab('comunicacion')" id="btn-comunicacion" class="sidebar-item active p-3 text-slate-500 font-bold flex items-center gap-3">
                <i class="fas fa-paper-plane w-5"></i> Comunicación
            </div>
            <div onclick="switchTab('usuarios')" id="btn-usuarios" class="sidebar-item p-3 text-slate-500 font-bold flex items-center gap-3">
                <i class="fas fa-users w-5"></i> Usuarios
            </div>
            <div onclick="switchTab('alumnos')" id="btn-alumnos" class="sidebar-item p-3 text-slate-500 font-bold flex items-center gap-3">
                <i class="fas fa-graduation-cap w-5"></i> Alumnos
            </div>
            <div onclick="switchTab('calendario')" id="btn-calendario" class="sidebar-item p-3 text-slate-500 font-bold flex items-center gap-3">
                <i class="fas fa-calendar-alt w-5"></i> Calendario
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <h2 id="title-display" class="text-3xl font-extrabold mb-8 tracking-tighter">COMUNICACIÓN</h2>

        <div id="tab-comunicacion" class="tab-content active">
            <div class="bg-white p-8 rounded-3xl border max-w-2xl shadow-sm">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Información del Posteo</label>
                <input type="text" id="post-tit" class="input-pro" placeholder="Título del comunicado">
                <textarea id="post-msg" rows="4" class="input-pro" placeholder="Mensaje para las familias..."></textarea>
                
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Multimedia y Enlaces</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="url" id="post-link" class="input-pro" placeholder="Link Fotos/Videos (Drive)">
                    <input type="url" id="post-form" class="input-pro" placeholder="Link Formulario (Google)">
                </div>

                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Destinatarios</label>
                <select id="post-tag" class="input-pro">
                    <option value="TODOS">Toda la Escuela</option>
                    <option value="SALA 5">Sala 5</option>
                    <option value="1er GRADO">1er Grado</option>
                </select>

                <button onclick="enviarComunicado()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-upload"></i> Publicar en el Muro
                </button>
            </div>
        </div>

        <div id="tab-usuarios" class="tab-content">
            <div class="bg-white p-8 rounded-3xl border max-w-xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">Registrar Docente</h3>
                <input type="text" id="doc-nom" class="input-pro" placeholder="Nombre completo">
                <input type="email" id="doc-mail" class="input-pro" placeholder="Email de acceso">
                <input type="text" id="doc-cursos" class="input-pro" placeholder="Cursos asignados (Ej: SALA 5, 1A)">
                <button onclick="crearDocente()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Guardar Docente</button>
            </div>
        </div>

        <div id="tab-alumnos" class="tab-content">
            <div class="bg-white p-8 rounded-3xl border max-w-xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">Alta de Alumno</h3>
                <input type="text" id="alum-nom" class="input-pro" placeholder="Nombre completo">
                <select id="alum-curso" class="input-pro">
                    <option value="SALA 5">SALA 5</option>
                    <option value="1er GRADO">1er GRADO</option>
                </select>
                <button onclick="crearAlumno()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold">Cargar al Sistema</button>
            </div>
        </div>

        <div id="tab-calendario" class="tab-content">
            <div class="bg-white p-8 rounded-3xl border max-w-xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">Nuevo Evento en Agenda</h3>
                <input type="text" id="event-tit" class="input-pro" placeholder="Nombre del evento">
                <input type="date" id="event-fecha" class="input-pro">
                <select id="event-tipo" class="input-pro">
                    <option value="EVENTO">Evento Especial</option>
                    <option value="FERIADO">Feriado / Sin Actividad</option>
                    <option value="PRUEBA">Evaluación</option>
                </select>
                <button onclick="crearEvento()" class="w-full bg-orange-500 text-white p-4 rounded-xl font-bold">Agregar a la Agenda</button>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            document.getElementById('title-display').innerText = id.toUpperCase();
        }

        async function enviarComunicado() {
            const tit = document.getElementById('post-tit').value;
            const msg = document.getElementById('post-msg').value;
            const link = document.getElementById('post-link').value;
            const form = document.getElementById('post-form').value;
            const tag = document.getElementById('post-tag').value;

            if(!tit || !msg) return alert("El título y el mensaje son obligatorios");

            try {
                await db.collection('comunicados').add({
                    titulo: tit,
                    texto: msg,
                    link: link || "",
                    form: form || "",
                    tag: tag,
                    creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("¡Comunicado publicado con éxito!");
                location.reload();
            } catch(e) { alert("Error al publicar: " + e.message); }
        }

        async function crearDocente() {
            const nom = document.getElementById('doc-nom').value;
            const mail = document.getElementById('doc-mail').value.toLowerCase().trim();
            const cursos = document.getElementById('doc-cursos').value.split(',').map(c => c.trim().toUpperCase());
            
            if(!nom || !mail) return alert("Faltan datos del docente");
            
            try {
                await db.collection('usuarios').doc(mail).set({ nombre: nom, rol: 'docente', cursos: cursos });
                alert("Docente registrado correctamente.");
            } catch(e) { alert("Error: " + e.message); }
        }

        async function crearAlumno() {
            const nom = document.getElementById('alum-nom').value;
            const cur = document.getElementById('alum-curso').value;
            if(!nom) return alert("Falta el nombre del alumno");
            await db.collection('alumnos').add({ nombre: nom, curso: cur });
            alert("Alumno cargado.");
        }

        async function crearEvento() {
            const tit = document.getElementById('event-tit').value;
            const fec = document.getElementById('event-fecha').value;
            const tip = document.getElementById('event-tipo').value;
            if(!tit || !fec) return alert("Faltan datos del evento");
            await db.collection('eventos').add({ titulo: tit, fecha: fec, tipo: tip });
            alert("Evento agendado.");
        }
    </script>
</body>
</html>
