<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Maestro - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.8rem 1rem; width: 100%; margin-bottom: 1rem; outline: none; background: white; font-size: 16px; }
        .nav-active { color: #1e293b; border-top: 3px solid #1e293b; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white p-6 border-b sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="font-extrabold text-xl tracking-tighter">Iosef Caro</h1>
            <p id="tab-title" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Comunicación</p>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        
        <section id="comunicacion" class="tab-content active">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-bullhorn text-blue-500"></i> Nuevo Posteo</h3>
                <input type="text" id="post-tit" class="input-pro" placeholder="Título del comunicado">
                <textarea id="post-msg" rows="4" class="input-pro" placeholder="Mensaje..."></textarea>
                <input type="url" id="post-link" class="input-pro" placeholder="Link Fotos/Video">
                <input type="url" id="post-form" class="input-pro" placeholder="Link Encuesta">
                <input type="text" id="post-tag" class="input-pro" placeholder="Destinatarios (SALA 5 o TODOS)" value="TODOS">
                <button onclick="enviarComunicado()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">Publicar</button>
            </div>
        </section>

        <section id="usuarios" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-chalkboard-teacher text-indigo-500"></i> Registrar Docente</h3>
                <input type="text" id="doc-nom" class="input-pro" placeholder="Nombre completo">
                <input type="email" id="doc-mail" class="input-pro" placeholder="Email de acceso">
                <input type="text" id="doc-cursos" class="input-pro" placeholder="Cursos (Ej: SALA 4, 1A)">
                <button onclick="crearUser('docente')" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Alta Docente</button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-users text-rose-500"></i> Registrar Familia</h3>
                <input type="text" id="fam-nom" class="input-pro" placeholder="Nombre Madre/Padre">
                <input type="email" id="fam-mail" class="input-pro" placeholder="Email de acceso">
                <div class="p-4 bg-rose-50 rounded-2xl mb-4 border border-rose-100">
                    <label class="text-[10px] font-black text-rose-400 uppercase block mb-2">Vínculo con Alumno</label>
                    <input type="text" id="fam-hijo" class="input-pro mb-0" placeholder="Nombre completo del alumno">
                    <p class="text-[9px] text-rose-400 mt-2"> Debe coincidir exacto con el nombre cargado en 'Alumnos'.</p>
                </div>
                <button onclick="crearUser('familia')" class="w-full bg-rose-500 text-white p-4 rounded-2xl font-bold">Alta Familia</button>
            </div>
        </section>

        <section id="alumnos" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-user-graduate text-emerald-500"></i> Nuevo Alumno</h3>
                <input type="text" id="alum-nom" class="input-pro" placeholder="Nombre completo del niño/a">
                <input type="text" id="alum-curso" class="input-pro" placeholder="Curso (Ej: SALA 5)">
                <button onclick="crearAlumno()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold">Guardar Alumno</button>
            </div>
        </section>

        <section id="calendario" class="tab-content space-y-4">
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-calendar-star text-orange-500"></i> Evento</h3>
                <input type="text" id="event-tit" class="input-pro" placeholder="Nombre del evento">
                <input type="date" id="event-fecha" class="input-pro">
                <button onclick="crearEvento()" class="w-full bg-orange-500 text-white p-4 rounded-2xl font-bold">Agendar</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50">
        <button onclick="switchTab('comunicacion')" class="nav-btn p-3 flex flex-col items-center gap-1 text-slate-400 nav-active">
            <i class="fas fa-comment-alt"></i><span class="text-[9px] font-bold">MURO</span>
        </button>
        <button onclick="switchTab('usuarios')" class="nav-btn p-3 flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-user-friends"></i><span class="text-[9px] font-bold">USERS</span>
        </button>
        <button onclick="switchTab('alumnos')" class="nav-btn p-3 flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-graduation-cap"></i><span class="text-[9px] font-bold">ALUMNOS</span>
        </button>
        <button onclick="switchTab('calendario')" class="nav-btn p-3 flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-calendar-day"></i><span class="text-[9px] font-bold">AGENDA</span>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            event.currentTarget.classList.add('nav-active');
            document.getElementById('tab-title').innerText = id.toUpperCase();
        }

        async function crearUser(rol) {
            const nom = (rol === 'docente') ? document.getElementById('doc-nom').value : document.getElementById('fam-nom').value;
            const mail = (rol === 'docente') ? document.getElementById('doc-mail').value.toLowerCase().trim() : document.getElementById('fam-mail').value.toLowerCase().trim();
            
            if(!nom || !mail) return alert("Faltan datos");

            let data = { nombre: nom, rol: rol };
            
            if(rol === 'docente') {
                data.cursos = document.getElementById('doc-cursos').value.split(',').map(c => c.trim().toUpperCase());
            } else {
                // AQUÍ SE GUARDA EL VÍNCULO CON EL HIJO
                const hijo = document.getElementById('fam-hijo').value.trim().toUpperCase();
                if(!hijo) return alert("Debes vincular a un alumno");
                data.hijoReferencia = hijo;
            }

            await db.collection('usuarios').doc(mail).set(data);
            alert("Usuario guardado con éxito.");
            location.reload();
        }

        async function crearAlumno() {
            const nom = document.getElementById('alum-nom').value.trim().toUpperCase();
            const cur = document.getElementById('alum-curso').value.trim().toUpperCase();
            if(!nom || !cur) return alert("Faltan datos");
            await db.collection('alumnos').add({ nombre: nom, curso: cur });
            alert("Alumno guardado.");
        }

        async function enviarComunicado() {
            const tit = document.getElementById('post-tit').value;
            const msg = document.getElementById('post-msg').value;
            if(!tit || !msg) return alert("Faltan datos");
            await db.collection('comunicados').add({
                titulo: tit, texto: msg,
                tag: document.getElementById('post-tag').value.toUpperCase(),
                link: document.getElementById('post-link').value || "",
                form: document.getElementById('post-form').value || "",
                creadoEn: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Publicado.");
        }

        async function crearEvento() {
            const tit = document.getElementById('event-tit').value;
            const fec = document.getElementById('event-fecha').value;
            if(!tit || !fec) return alert("Faltan datos");
            await db.collection('eventos').add({ titulo: tit, fecha: fec });
            alert("Agendado.");
        }
    </script>
</body>
</html>
