<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión Maestro - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #0f172a; ring: 2px ring-slate-100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Overlay de Seguridad */
        #login-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center">
            <div class="w-20 h-20 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Panel Maestro</h1>
            <p class="text-slate-400 font-bold mt-1 uppercase text-[10px] tracking-[0.3em] mb-8">Gestión Administrativa</p>
            
            <div class="space-y-4">
                <input type="email" id="log-email" placeholder="Usuario / Email" class="input-pro">
                <input type="password" id="log-pass" placeholder="Contraseña" class="input-pro">
                <button onclick="validarIngreso()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black transition shadow-lg">Entrar al Sistema</button>
            </div>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <nav class="bg-white border-b p-4 flex gap-2 sticky top-0 z-50 overflow-x-auto shadow-sm">
            <button onclick="switchTab('familias')" class="nav-btn bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Familias</button>
            <button onclick="switchTab('alumnos')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Alumnos</button>
            <button onclick="switchTab('materias')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Materias</button>
            <button onclick="switchTab('staff')" class="nav-btn text-slate-500 px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap">Staff/Docentes</button>
            <button onclick="cerrarSesion()" class="ml-auto text-rose-500 p-2"><i class="fas fa-power-off"></i></button>
        </nav>

        <main class="p-4 max-w-5xl mx-auto space-y-6">
            
            <section id="tab-familias" class="tab-content active space-y-4">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="font-black text-xl mb-4">Alta de Familia</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="fam-nombre" placeholder="Nombre de la Familia" class="input-pro">
                        <input type="email" id="fam-email" placeholder="Email (Usuario)" class="input-pro">
                        <input type="text" id="fam-pass" placeholder="Contraseña" class="input-pro">
                        <button onclick="crearFamilia()" class="md:col-span-2 bg-blue-600 text-white p-4 rounded-2xl font-bold">Crear Familia</button>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b">
                        <input type="text" onkeyup="buscar('search-fam', 'lista-familias')" id="search-fam" placeholder="Buscar familia..." class="input-pro">
                    </div>
                    <div id="lista-familias" class="divide-y max-h-[500px] overflow-y-auto"></div>
                </div>
            </section>

            <section id="tab-alumnos" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="font-black text-xl mb-4">Nuevo Alumno</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="alu-nombre" placeholder="Nombre completo" class="input-pro">
                        <input type="text" id="alu-curso" placeholder="Curso (ej: 1A, 2B)" class="input-pro">
                        <select id="alu-familia" class="input-pro"></select>
                        <button onclick="crearAlumno()" class="md:col-span-2 bg-emerald-600 text-white p-4 rounded-2xl font-bold">Vincular Alumno</button>
                    </div>
                </div>
                <div id="lista-alumnos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="tab-materias" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl border shadow-sm text-center">
                    <h2 class="font-black text-xl mb-2">Materias</h2>
                    <input type="text" id="new-materia" placeholder="Nombre de la materia" class="input-pro mb-4">
                    <button onclick="crearMateria()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">Agregar Materia</button>
                </div>
                <div id="lista-materias" class="flex flex-wrap gap-2 justify-center"></div>
            </section>

            <section id="tab-staff" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="font-black text-xl mb-4">Personal Staff / Docentes</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="staff-nombre" placeholder="Nombre" class="input-pro">
                        <input type="email" id="staff-email" placeholder="Email" class="input-pro">
                        <input type="text" id="staff-pass" placeholder="Contraseña" class="input-pro">
                        <select id="staff-rol" class="input-pro">
                            <option value="docente">Docente</option>
                            <option value="comunicacion">Comunicación / Prensa</option>
                            <option value="admin">Administrador</option>
                        </select>
                        <button onclick="crearStaff()" class="md:col-span-2 bg-slate-900 text-white p-4 rounded-2xl font-bold">Dar de Alta</button>
                    </div>
                </div>
                <div id="lista-staff" class="grid grid-cols-1 gap-3"></div>
            </section>

        </main>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", 
            authDomain: "app-iosefcaro.firebaseapp.com", 
            projectId: "app-iosefcaro", 
            storageBucket: "app-iosefcaro.firebasestorage.app", 
            messagingSenderId: "651320124248", 
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- SISTEMA DE ACCESO (PROTEGIDO) ---
        async function validarIngreso() {
            const email = document.getElementById('log-email').value.trim().toLowerCase();
            const pass = document.getElementById('log-pass').value.trim();

            if (!email || !pass) return alert("Completa los datos");

            // ACCESO MAESTRO (Entra siempre)
            if(email === "uriel.bacher@gmail.com" && pass === "Gallardo10") {
                autorizar("admin");
                return;
            }

            try {
                const doc = await db.collection('usuarios').doc(email).get();
                if(doc.exists) {
                    const u = doc.data();
                    if(u.pass === pass && u.rol === 'admin') {
                        autorizar("admin");
                    } else {
                        alert("Acceso denegado: Se requiere rango Admin.");
                    }
                } else {
                    alert("Usuario no registrado en el sistema.");
                }
            } catch(e) {
                console.error(e);
                alert("Error de conexión. Reintenta.");
            }
        }

        function autorizar(rol) {
            sessionStorage.setItem('iosef_admin_session', rol);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            refrescarTodo();
        }

        window.onload = () => {
            if(sessionStorage.getItem('iosef_admin_session')) {
                autorizar("admin");
            }
        };

        function cerrarSesion() {
            sessionStorage.clear();
            location.reload();
        }

        // --- LÓGICA DE DATOS ---
        async function refrescarTodo() {
            // Cada carga en su propio bloque para que una no pise a la otra
            try { cargarFamilias(); } catch(e) { console.error("Error Familias:", e); }
            try { cargarAlumnos(); } catch(e) { console.error("Error Alumnos:", e); }
            try { cargarMaterias(); } catch(e) { console.error("Error Materias:", e); }
            try { cargarStaff(); } catch(e) { console.error("Error Staff:", e); }
        }

        async function cargarFamilias() {
            const snap = await db.collection('usuarios').where('rol','==','familia').get();
            const cont = document.getElementById('lista-familias');
            const sel = document.getElementById('alu-familia');
            cont.innerHTML = "";
            sel.innerHTML = `<option value="">Seleccionar Familia...</option>`;
            
            snap.forEach(doc => {
                const f = doc.data();
                let hijosTxt = "Sin hijos";
                if(f.hijos && Array.isArray(f.hijos)) {
                    hijosTxt = f.hijos.map(h => h.nombre).join(", ");
                }
                
                cont.innerHTML += `
                    <div class="p-4 flex justify-between items-center" data-search="${f.nombre} ${doc.id}">
                        <div>
                            <p class="font-bold text-slate-800">${f.nombre}</p>
                            <p class="text-[10px] text-blue-500 font-bold uppercase">${doc.id}</p>
                            <p class="text-[10px] text-slate-400">Hijos: ${hijosTxt}</p>
                        </div>
                        <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="text-rose-300 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                    </div>`;
                sel.innerHTML += `<option value="${doc.id}">${f.nombre}</option>`;
            });
        }

        async function crearFamilia() {
            const n = document.getElementById('fam-nombre').value;
            const e = document.getElementById('fam-email').value.toLowerCase().trim();
            const p = document.getElementById('fam-pass').value;
            if(!n || !e || !p) return alert("Completa todos los campos");
            await db.collection('usuarios').doc(e).set({ nombre: n, pass: p, rol: 'familia', hijos: [] });
            location.reload();
        }

        async function cargarAlumnos() {
            const snap = await db.collection('alumnos').get();
            const cont = document.getElementById('lista-alumnos');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const a = doc.data();
                cont.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                        <div>
                            <p class="font-bold">${a.nombre}</p>
                            <p class="text-xs text-slate-400">${a.curso} • ${a.familiaNombre || 'Sin familia'}</p>
                        </div>
                        <button onclick="eliminarDoc('alumnos', '${doc.id}')" class="text-rose-200"><i class="fas fa-times-circle"></i></button>
                    </div>`;
            });
        }

        async function crearAlumno() {
            const n = document.getElementById('alu-nombre').value;
            const c = document.getElementById('alu-curso').value.toUpperCase();
            const fId = document.getElementById('alu-familia').value;
            const fNom = document.getElementById('alu-familia').options[document.getElementById('alu-familia').selectedIndex].text;
            if(!n || !c || !fId) return alert("Completa todos los datos");

            const aluRef = await db.collection('alumnos').add({ nombre: n, curso: c, familiaId: fId, familiaNombre: fNom });
            const famDoc = await db.collection('usuarios').doc(fId).get();
            const hijos = famDoc.data().hijos || [];
            hijos.push({ id: aluRef.id, nombre: n, curso: c });
            await db.collection('usuarios').doc(fId).update({ hijos: hijos });
            location.reload();
        }

        async function cargarMaterias() {
            const snap = await db.collection('materias').get();
            const cont = document.getElementById('lista-materias');
            cont.innerHTML = "";
            snap.forEach(doc => {
                cont.innerHTML += `<span class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                    ${doc.data().nombre} 
                    <i onclick="eliminarDoc('materias', '${doc.id}')" class="fas fa-times cursor-pointer text-slate-400"></i>
                </span>`;
            });
        }

        async function crearMateria() {
            const n = document.getElementById('new-materia').value;
            if(!n) return;
            await db.collection('materias').add({ nombre: n });
            location.reload();
        }

        async function cargarStaff() {
            const snap = await db.collection('usuarios').where('rol', 'in', ['admin', 'docente', 'comunicacion']).get();
            const cont = document.getElementById('lista-staff');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                cont.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                        <div>
                            <p class="font-bold">${s.nombre}</p>
                            <p class="text-[10px] uppercase font-black text-blue-500">${s.rol}</p>
                        </div>
                        <button onclick="eliminarDoc('usuarios', '${doc.id}')" class="text-rose-300"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });
        }

        async function crearStaff() {
            const n = document.getElementById('staff-nombre').value;
            const m = document.getElementById('staff-email').value.toLowerCase().trim();
            const p = document.getElementById('staff-pass').value;
            const r = document.getElementById('staff-rol').value;
            if(!n || !m || !p) return alert("Completar campos");
            await db.collection('usuarios').doc(m).set({ nombre: n, pass: p, rol: r });
            location.reload();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white'); b.classList.add('text-slate-500');
            });
            event.currentTarget.classList.add('bg-slate-900', 'text-white');
        }

        function buscar(inpId, contId) {
            const q = document.getElementById(inpId).value.toLowerCase();
            const cont = document.getElementById(contId);
            Array.from(cont.children).forEach(row => {
                const text = row.getAttribute('data-search') || "";
                row.style.display = text.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        async function eliminarDoc(col, id) {
            if(confirm("¿Eliminar este registro permanentemente?")) { 
                await db.collection(col).doc(id).delete(); 
                location.reload(); 
            }
        }
    </script>
</body>
</html>
