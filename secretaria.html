<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secretaría - Iosef Caro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
*{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;padding-bottom:100px}
.tab-content{display:none}.tab-content.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav-btn.active{color:#0f172a}.nav-btn.active i{transform:translateY(-4px);color:#0ea5e9}
.input-pro{border:1.5px solid #e2e8f0;border-radius:1rem;padding:.75rem;outline:none;width:100%;font-size:14px;font-family:inherit;background:white;transition:border-color .2s}
.input-pro:focus{border-color:#0f172a;box-shadow:0 0 0 3px rgba(15,23,42,.08)}
/* Mensajería */
.mb-w{display:flex;flex-direction:column;max-width:80%;margin-bottom:4px}
.mb-w.yo{align-self:flex-end;align-items:flex-end}
.mb-w.otro{align-self:flex-start;align-items:flex-start}
.mb{padding:10px 15px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word}
.mb.yo{background:#0f172a;color:white;border-bottom-right-radius:4px}
.mb.otro{background:white;color:#1e293b;border:1px solid #e2e8f0;border-bottom-left-radius:4px}
.mb-meta{font-size:10px;color:#94a3b8;font-weight:700;margin-top:3px}
/* Etiquetas conversación */
.conv-tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase}
.tag-urgente{background:#fee2e2;color:#991b1b}
.tag-pendiente{background:#fef3c7;color:#92400e}
.tag-resuelto{background:#d1fae5;color:#065f46}
</style>
</head>
<body>

<!-- Header -->
<header class="bg-white border-b px-5 py-4 sticky top-0 z-50 flex items-center justify-between shadow-sm">
  <div>
    <h1 class="font-black text-xl text-slate-900 tracking-tight" id="sec-nombre">Secretaría</h1>
    <p class="text-[10px] text-slate-400 font-bold uppercase" id="sec-nivel-label">Cargando...</p>
  </div>
  <div class="flex items-center gap-2">
    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
    <span class="text-[10px] text-slate-400 font-bold">EN LÍNEA</span>
    <button onclick="window.location.href='index.html'" class="ml-3 text-slate-400 hover:text-slate-600"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</header>

<main class="p-4 max-w-2xl mx-auto">

  <!-- MENSAJES -->
  <section id="tab-mensajes" class="tab-content active" style="height:calc(100vh - 185px)">
    <!-- Lista de conversaciones -->
    <div id="sec-lista-conv">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-black text-xl">Mensajes</h2>
        <div class="flex gap-2">
          <select id="filtro-etiqueta" onchange="renderConvsSec()" class="input-pro text-xs" style="max-width:130px">
            <option value="">Todas</option>
            <option value="urgente">Urgente</option>
            <option value="pendiente">Pendiente</option>
            <option value="resuelto">Resuelto</option>
          </select>
          <input type="text" id="buscar-conv" onkeyup="renderConvsSec()" placeholder="Buscar..." class="input-pro text-xs" style="max-width:140px">
        </div>
      </div>
      <div id="convs-list" class="space-y-2"></div>
    </div>

    <!-- Chat individual -->
    <div id="sec-chat" class="hidden flex-col" style="height:calc(100vh - 185px)">
      <div class="flex items-center gap-3 p-4 bg-white rounded-2xl border mb-3 shadow-sm">
        <button onclick="volverListaSec()" class="text-slate-400 text-xl"><i class="fas fa-chevron-left"></i></button>
        <div class="flex-1 min-w-0">
          <p class="font-black text-sm truncate" id="chat-nombre-fam">Familia</p>
          <p class="text-[10px] text-slate-400 font-bold" id="chat-alumno-fam"></p>
        </div>
        <select id="chat-etiqueta-sel" onchange="cambiarEtiqueta()" class="input-pro text-xs" style="max-width:120px">
          <option value="">Sin etiqueta</option>
          <option value="urgente">🔴 Urgente</option>
          <option value="pendiente">🟡 Pendiente</option>
          <option value="resuelto">🟢 Resuelto</option>
        </select>
      </div>
      <div id="chat-mensajes" class="flex-1 overflow-y-auto flex flex-col gap-2 bg-white rounded-2xl p-4 border shadow-sm" style="scroll-behavior:smooth"></div>
      <div class="bg-white border rounded-2xl p-3 mt-3 flex gap-2 items-end shadow-sm">
        <textarea id="chat-input" rows="1" placeholder="Escribí tu respuesta..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm resize-none outline-none" style="max-height:100px;font-family:inherit" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarMensajeSec()}"></textarea>
        <button onclick="enviarMensajeSec()" class="w-11 h-11 bg-slate-900 rounded-xl flex items-center justify-center text-white flex-shrink-0 active:scale-95 transition-all"><i class="fas fa-paper-plane text-sm"></i></button>
      </div>
    </div>
  </section>

  <!-- JUSTIFICACIONES -->
  <section id="tab-justificaciones" class="tab-content space-y-5">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <h2 class="font-black text-xl">Justificaciones</h2>
      <select id="just-filtro" onchange="cargarJustSec()" class="input-pro text-xs" style="max-width:160px">
        <option value="pendiente">Pendientes</option>
        <option value="aprobada">Aprobadas</option>
        <option value="rechazada">Rechazadas</option>
        <option value="todas">Todas</option>
      </select>
    </div>
    <div id="lista-just" class="space-y-3">
      <p class="text-slate-400 text-sm text-center py-6"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando...</p>
    </div>
  </section>

  <!-- LLAMADAS -->
  <section id="tab-llamadas" class="tab-content space-y-5">
    <h2 class="font-black text-xl">Registro de Llamadas</h2>
    <!-- Formulario nueva llamada -->
    <div class="bg-white p-5 rounded-3xl border shadow-sm space-y-3">
      <h3 class="font-black text-sm flex items-center gap-2"><i class="fas fa-plus-circle text-sky-500"></i> Nueva llamada</h3>
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="text-[9px] font-black text-slate-400 uppercase">Familia</label>
          <input type="text" id="call-familia" placeholder="Buscar familia..." class="input-pro mt-1" oninput="buscarFamiliaCall(this.value)">
          <div id="call-sugerencias" class="mt-1 space-y-1"></div>
        </div>
        <div>
          <label class="text-[9px] font-black text-slate-400 uppercase">Fecha y hora</label>
          <input type="datetime-local" id="call-fecha" class="input-pro mt-1">
        </div>
        <div>
          <label class="text-[9px] font-black text-slate-400 uppercase">Tipo</label>
          <select id="call-tipo" class="input-pro mt-1">
            <option value="llamada_entrante">📞 Entrante</option>
            <option value="llamada_saliente">📲 Saliente</option>
            <option value="whatsapp">💬 WhatsApp</option>
            <option value="presencial">🤝 Presencial</option>
            <option value="email">📧 Email</option>
          </select>
        </div>
        <div>
          <label class="text-[9px] font-black text-slate-400 uppercase">Resultado</label>
          <select id="call-resultado" class="input-pro mt-1">
            <option value="comunicado">✅ Comunicado</option>
            <option value="no_contesta">❌ No contesta</option>
            <option value="pendiente">⏳ Pendiente</option>
            <option value="buzon">📬 Buzón</option>
          </select>
        </div>
        <div>
          <label class="text-[9px] font-black text-slate-400 uppercase">Alumno (opcional)</label>
          <input type="text" id="call-alumno" placeholder="Nombre del alumno" class="input-pro mt-1">
        </div>
        <div class="col-span-2">
          <label class="text-[9px] font-black text-slate-400 uppercase">Motivo / detalle</label>
          <textarea id="call-motivo" placeholder="Describí el motivo y lo que se habló..." class="input-pro mt-1 h-16 resize-none"></textarea>
        </div>
      </div>
      <button onclick="guardarLlamada()" class="w-full bg-sky-600 text-white p-4 rounded-2xl font-bold shadow-lg"><i class="fas fa-save mr-2"></i>REGISTRAR CONTACTO</button>
    </div>
    <!-- Filtros y lista -->
    <div class="flex gap-2 flex-wrap">
      <input type="text" id="call-search" placeholder="Buscar..." class="input-pro text-sm" style="max-width:200px" oninput="filtrarLlamadas()">
      <select id="call-filter-resultado" onchange="filtrarLlamadas()" class="input-pro text-sm" style="max-width:160px">
        <option value="">Todos los resultados</option>
        <option value="comunicado">Comunicado</option>
        <option value="no_contesta">No contesta</option>
        <option value="pendiente">Pendiente</option>
      </select>
    </div>
    <div id="lista-llamadas" class="space-y-3"></div>
  </section>

  <!-- AUTORIZACIONES -->
  <section id="tab-autorizaciones-sec" class="tab-content space-y-5">
    <h2 class="font-black text-xl">Autorizaciones</h2>
    <p class="text-slate-400 text-sm -mt-2">Solicitudes de retiro anticipado y cambios de modalidad de salida.</p>
    <div id="lista-aut-sec" class="space-y-3">
      <p class="text-slate-400 text-sm text-center py-6"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando...</p>
    </div>
  </section>

</main>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-lg">
  <button onclick="switchTabSec('mensajes')" id="nav-mensajes" class="nav-btn active flex flex-col items-center gap-1 font-bold text-[8px] text-slate-400 py-1 px-3">
    <div class="relative"><i class="fas fa-comments text-xl"></i><span id="badge-msg-sec" class="hidden absolute -top-1 -right-2 bg-red-500 text-white text-[8px] font-black px-1 rounded-full">!</span></div>
    <span>MENSAJES</span>
  </button>
  <button onclick="switchTabSec('justificaciones')" id="nav-justificaciones" class="nav-btn flex flex-col items-center gap-1 font-bold text-[8px] text-slate-400 py-1 px-3">
    <div class="relative"><i class="fas fa-file-medical text-xl"></i><span id="badge-just-sec" class="hidden absolute -top-1 -right-2 bg-amber-500 text-white text-[8px] font-black px-1 rounded-full">!</span></div>
    <span>JUSTIF.</span>
  </button>
  <button onclick="switchTabSec('llamadas')" id="nav-llamadas" class="nav-btn flex flex-col items-center gap-1 font-bold text-[8px] text-slate-400 py-1 px-3">
    <i class="fas fa-phone-alt text-xl"></i><span>LLAMADAS</span>
  </button>
  <button onclick="switchTabSec('autorizaciones-sec')" id="nav-autorizaciones-sec" class="nav-btn flex flex-col items-center gap-1 font-bold text-[8px] text-slate-400 py-1 px-3">
    <div class="relative"><i class="fas fa-clipboard-check text-xl"></i><span id="badge-aut-sec" class="hidden absolute -top-1 -right-2 bg-violet-500 text-white text-[8px] font-black px-1 rounded-full">!</span></div>
    <span>AUTORIZAC.</span>
  </button>
</nav>

<script>
const FB={apiKey:"AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",authDomain:"app-iosefcaro.firebaseapp.com",projectId:"app-iosefcaro",storageBucket:"app-iosefcaro.firebasestorage.app",messagingSenderId:"651320124248",appId:"1:651320124248:web:97c8ca00e29114e1983b2d"};
firebase.initializeApp(FB);
const db=firebase.firestore();

let staffEmail='',staffNombre='',staffRol='',staffNiveles=[];
let todasLasConvs=[],convActualId=null,unsubChat=null;
let todasLasLlamadas=[],todasLasJust=[];

// ── INIT ──
async function init(){
  // Leer sesión desde index.html
  staffEmail=sessionStorage.getItem('iosef_email')||'';
  staffRol=sessionStorage.getItem('iosef_rol')||'';
  staffNombre=sessionStorage.getItem('iosef_nombre')||'Secretaría';

  if(!staffEmail||!staffRol){window.location.href='index.html';return;}

  document.getElementById('sec-nombre').textContent=staffNombre;
  const nivelMap={secretaria_inicial:'Nivel Inicial',secretaria_primario:'Nivel Primario',secretaria_secundario:'Nivel Secundario'};
  document.getElementById('sec-nivel-label').textContent=nivelMap[staffRol]||staffRol;

  // Leer niveles del usuario
  const userDoc=await db.collection('usuarios').doc(staffEmail).get();
  if(userDoc.exists) staffNiveles=userDoc.data().niveles||[];
  if(!staffNiveles.length){
    const nivelSingle=staffRol.replace('secretaria_','');
    if(nivelSingle) staffNiveles=[nivelSingle];
  }

  // Datetime default
  const now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  document.getElementById('call-fecha').value=now.toISOString().slice(0,16);

  // Cargar todo
  escucharConversaciones();
  cargarJustSec();
  cargarLlamadas();
  cargarAutorizacionesSec();
}

// ════ MENSAJERÍA ════
function escucharConversaciones(){
  db.collection('conversaciones').where('emailSecretaria','==',staffEmail).onSnapshot(snap=>{
    todasLasConvs=[];let nl=0;
    snap.forEach(doc=>{const d=doc.data();todasLasConvs.push({id:doc.id,...d});if((d.noLeidos||{})[staffEmail]>0)nl++;});
    todasLasConvs.sort((a,b)=>{const ta=a.ultimoTimestamp?.seconds||0,tb=b.ultimoTimestamp?.seconds||0;return tb-ta;});
    renderConvsSec();
    document.getElementById('badge-msg-sec').classList.toggle('hidden',nl===0);
  });
}

function renderConvsSec(){
  const cont=document.getElementById('convs-list');
  const filtroEtiq=document.getElementById('filtro-etiqueta')?.value||'';
  const busq=(document.getElementById('buscar-conv')?.value||'').toLowerCase();
  let lista=todasLasConvs;
  if(filtroEtiq) lista=lista.filter(c=>c.etiqueta===filtroEtiq);
  if(busq) lista=lista.filter(c=>(c.nombreOtro||'').toLowerCase().includes(busq)||(c.ultimoMensaje||'').toLowerCase().includes(busq));
  if(!lista.length){cont.innerHTML='<p class="text-slate-400 text-sm text-center py-8">Sin conversaciones aún.</p>';return;}
  cont.innerHTML=lista.map(c=>{
    const nl=(c.noLeidos||{})[staffEmail]||0;
    const hora=c.ultimoTimestamp?new Date(c.ultimoTimestamp.seconds*1000).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    const tagHtml=c.etiqueta?`<span class="conv-tag tag-${c.etiqueta}">${c.etiqueta}</span>`:'';
    return`<div onclick="abrirChat('${c.id}')" class="bg-white p-4 rounded-2xl border cursor-pointer hover:border-sky-300 hover:shadow-sm transition-all flex items-center gap-3 ${nl>0?'border-sky-200 bg-sky-50':''}">
      <div class="w-11 h-11 bg-slate-900 text-white rounded-xl flex items-center justify-center font-black flex-shrink-0 text-sm">${(c.nombreOtro||'F').charAt(0).toUpperCase()}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-0.5"><p class="font-black text-sm truncate">${c.nombreOtro||'Familia'}</p>${tagHtml}</div>
        <p class="text-slate-400 text-xs truncate">${c.ultimoMensaje||''}</p>
      </div>
      <div class="flex flex-col items-end gap-1 flex-shrink-0">
        <span class="text-[9px] text-slate-400">${hora.split(', ')[1]||hora}</span>
        ${nl>0?`<span class="bg-sky-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">${nl}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

async function abrirChat(convId){
  convActualId=convId;
  const conv=todasLasConvs.find(c=>c.id===convId);if(!conv)return;
  document.getElementById('chat-nombre-fam').textContent=conv.nombreOtro||'Familia';
  document.getElementById('chat-alumno-fam').textContent=conv.emailOtro||'';
  document.getElementById('chat-etiqueta-sel').value=conv.etiqueta||'';
  document.getElementById('sec-lista-conv').classList.add('hidden');
  document.getElementById('sec-chat').classList.remove('hidden');
  document.getElementById('sec-chat').classList.add('flex');
  // Marcar leídos
  await db.collection('conversaciones').doc(convId).update({[`noLeidos.${staffEmail}`]:0});
  // Escuchar mensajes
  if(unsubChat)unsubChat();
  unsubChat=db.collection('conversaciones').doc(convId).collection('mensajes').orderBy('timestamp','asc').onSnapshot(snap=>{
    const cont=document.getElementById('chat-mensajes');let html='';
    snap.forEach(doc=>{const m=doc.data();const eM=m.autorEmail===staffEmail||m.autorRol==='sistema';const esSistema=m.autorRol==='sistema';const hora=m.timestamp?new Date(m.timestamp.seconds*1000).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'';
      if(esSistema){html+=`<div style="text-align:center;margin:4px 0"><span style="background:#f1f5f9;color:#94a3b8;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block">${m.texto}</span></div>`;return;}
      html+=`<div class="mb-w ${eM?'yo':'otro'}"><div class="mb ${eM?'yo':'otro'}">${(m.texto||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div><span class="mb-meta">${hora} · ${eM?'Vos':(m.autorNombre||'Familia')}</span></div>`;
    });
    cont.innerHTML=html||'<p class="text-center text-slate-300 text-sm py-6">Comenzá la conversación</p>';cont.scrollTop=cont.scrollHeight;
  });
}

async function enviarMensajeSec(){
  if(!convActualId)return;const inp=document.getElementById('chat-input');const texto=inp.value.trim();if(!texto)return;inp.value='';
  const conv=todasLasConvs.find(c=>c.id===convActualId);const emailOtro=conv?.emailOtro||'';
  const batch=db.batch();const convRef=db.collection('conversaciones').doc(convActualId);const msgRef=convRef.collection('mensajes').doc();
  batch.set(msgRef,{texto,autorEmail:staffEmail,autorNombre:staffNombre,autorRol:staffRol,timestamp:firebase.firestore.FieldValue.serverTimestamp(),leido:false});
  batch.update(convRef,{ultimoMensaje:texto,ultimoTimestamp:firebase.firestore.FieldValue.serverTimestamp(),[`noLeidos.${emailOtro}`]:firebase.firestore.FieldValue.increment(1)});
  await batch.commit();
  // Iosi: aprender de esta respuesta
  await aprenderRespuestaIosi(texto,conv);
}

// Iosi aprende de las respuestas de secretaría
async function aprenderRespuestaIosi(respuesta,conv){
  // Buscar el último mensaje de la familia como "pregunta"
  const msgs=await db.collection('conversaciones').doc(conv.id).collection('mensajes').orderBy('timestamp','desc').limit(5).get();
  let pregunta='';msgs.forEach(doc=>{if(!pregunta&&doc.data().autorRol==='familia')pregunta=doc.data().texto;});
  if(pregunta&&respuesta&&respuesta.length>15){
    // Guardar par pregunta-respuesta para Iosi
    const claveHash=pregunta.slice(0,30).toLowerCase().replace(/\s+/g,'_');
    await db.collection('iosi_conocimiento').doc(claveHash).set({pregunta,respuesta,fecha:new Date().toISOString()},{merge:true});
  }
}

async function cambiarEtiqueta(){
  if(!convActualId)return;const val=document.getElementById('chat-etiqueta-sel').value;
  await db.collection('conversaciones').doc(convActualId).update({etiqueta:val||null});
}

function volverListaSec(){
  document.getElementById('sec-lista-conv').classList.remove('hidden');
  document.getElementById('sec-chat').classList.add('hidden');
  document.getElementById('sec-chat').classList.remove('flex');
  if(unsubChat){unsubChat();unsubChat=null;}convActualId=null;
}

// ════ JUSTIFICACIONES ════
async function cargarJustSec(){
  const filtro=document.getElementById('just-filtro')?.value||'pendiente';
  const cont=document.getElementById('lista-just');
  cont.innerHTML='<p class="text-slate-400 text-sm text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando...</p>';
  const snap=await db.collection('justificaciones').orderBy('fechaEnvio','desc').limit(100).get();
  todasLasJust=[];
  snap.forEach(doc=>{const d=doc.data();if(staffRol!=='admin'&&d.nivel&&!staffNiveles.includes(d.nivel))return;todasLasJust.push({id:doc.id,...d});});
  const lista=filtro==='todas'?todasLasJust:todasLasJust.filter(j=>j.estado===filtro);
  const pend=todasLasJust.filter(j=>j.estado==='pendiente').length;
  document.getElementById('badge-just-sec').classList.toggle('hidden',pend===0);
  if(!lista.length){cont.innerHTML=`<p class="text-slate-400 text-sm text-center py-6">Sin justificaciones ${filtro!=='todas'?filtro+'s':''}.</p>`;return;}
  const motivos={medico:'Certificado médico',familiar:'Causa familiar',viaje:'Viaje',otro:'Otro'};
  const colEst={pendiente:'border-amber-200 bg-amber-50',aprobada:'border-emerald-200 bg-emerald-50',rechazada:'border-rose-200 bg-rose-50'};
  cont.innerHTML=lista.map(j=>{const d=new Date(j.fechaEnvio).toLocaleDateString('es-AR');
    return`<div class="bg-white p-5 rounded-2xl border-2 ${colEst[j.estado]||'border-slate-100'} shadow-sm">
      <div class="flex items-start justify-between flex-wrap gap-2 mb-2">
        <div><p class="font-black text-slate-900">${j.alumnoNombre}</p><p class="text-[10px] text-slate-400 font-bold">Falta: ${j.fecha} · ${motivos[j.motivo]||j.motivo}</p><p class="text-[10px] text-slate-400">Familia: ${j.familiaNombre}</p></div>
        <span class="text-[9px] font-black px-2 py-0.5 rounded-full ${j.estado==='pendiente'?'bg-amber-100 text-amber-700':j.estado==='aprobada'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${j.estado}</span>
      </div>
      ${j.detalle?`<p class="text-sm text-slate-600 mb-3">${j.detalle}</p>`:''}
      ${j.urlCertificado?`<a href="${j.urlCertificado}" target="_blank" class="text-[10px] font-black text-blue-600 flex items-center gap-1 mb-3"><i class="fas fa-external-link-alt"></i> Ver certificado</a>`:''}
      <p class="text-[9px] text-slate-400">Enviada el ${d}</p>
      ${j.estado==='pendiente'?`<div class="flex gap-2 mt-3">
        <button onclick="resolverJust('${j.id}','aprobada')" class="flex-1 bg-emerald-600 text-white py-2 rounded-xl text-xs font-black"><i class="fas fa-check mr-1"></i>Aprobar</button>
        <button onclick="resolverJust('${j.id}','rechazada')" class="flex-1 bg-rose-500 text-white py-2 rounded-xl text-xs font-black"><i class="fas fa-times mr-1"></i>Rechazar</button>
      </div>`:''}
    </div>`;
  }).join('');
}

async function resolverJust(justId,estado){
  const j=todasLasJust.find(x=>x.id===justId);if(!j)return;
  await db.collection('justificaciones').doc(justId).update({estado,resueltaPor:staffEmail,fechaResolucion:new Date().toISOString()});
  if(estado==='aprobada'){
    await db.collection('notificaciones_docentes').add({mensaje:`✅ Justificación APROBADA: ${j.alumnoNombre}, falta del ${j.fecha} (${j.motivo}). Aprobada por ${staffNombre}.`,nivel:j.nivel||'primario',tipo:'justificacion',fecha:new Date().toISOString(),leida:false});
  }
  j.estado=estado;cargarJustSec();
}

// ════ LLAMADAS ════
async function cargarLlamadas(){
  const snap=await db.collection('registro_llamadas').orderBy('fecha','desc').limit(100).get();
  todasLasLlamadas=[];snap.forEach(doc=>{const d=doc.data();if(staffRol!=='admin'&&d.nivel&&!staffNiveles.includes(d.nivel))return;todasLasLlamadas.push({id:doc.id,...d});});
  filtrarLlamadas();
}

function filtrarLlamadas(){
  const busq=(document.getElementById('call-search')?.value||'').toLowerCase();
  const result=document.getElementById('call-filter-resultado')?.value||'';
  const lista=todasLasLlamadas.filter(l=>{if(result&&l.resultado!==result)return false;if(busq&&!((l.familia||'').toLowerCase().includes(busq)||(l.alumno||'').toLowerCase().includes(busq)||(l.motivo||'').toLowerCase().includes(busq)))return false;return true;});
  const cont=document.getElementById('lista-llamadas');
  if(!lista.length){cont.innerHTML='<p class="text-slate-400 text-sm text-center py-4">Sin registros.</p>';return;}
  const iconos={llamada_entrante:'📞',llamada_saliente:'📲',whatsapp:'💬',presencial:'🤝',email:'📧'};
  const colRes={comunicado:'bg-emerald-100 text-emerald-700',no_contesta:'bg-rose-100 text-rose-600',pendiente:'bg-amber-100 text-amber-700',buzon:'bg-slate-100 text-slate-600'};
  cont.innerHTML=lista.map(l=>{const d=l.fecha?new Date(l.fecha).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    return`<div class="bg-white p-5 rounded-2xl border shadow-sm">
      <div class="flex items-start justify-between flex-wrap gap-2 mb-2">
        <div class="flex items-center gap-2"><span class="text-xl">${iconos[l.tipo]||'📞'}</span><div><p class="font-black text-slate-900">${l.familia||'Sin nombre'}</p>${l.alumno?`<p class="text-[10px] text-slate-400">${l.alumno}</p>`:''}</div></div>
        <div class="flex items-center gap-2"><span class="text-[9px] font-black px-2 py-0.5 rounded-full ${colRes[l.resultado]||'bg-slate-100 text-slate-600'}">${(l.resultado||'').replace('_',' ')}</span><span class="text-[9px] text-slate-400">${d}</span></div>
      </div>
      ${l.motivo?`<p class="text-sm text-slate-600 mt-1">${l.motivo}</p>`:''}
    </div>`;
  }).join('');
}

async function guardarLlamada(){
  const familia=document.getElementById('call-familia').value.trim();const fecha=document.getElementById('call-fecha').value;const tipo=document.getElementById('call-tipo').value;const resultado=document.getElementById('call-resultado').value;const motivo=document.getElementById('call-motivo').value.trim();const alumno=document.getElementById('call-alumno').value.trim();
  if(!familia)return alert('Ingresá el nombre de la familia.');if(!fecha)return alert('Ingresá la fecha y hora.');
  await db.collection('registro_llamadas').add({familia,fecha,tipo,resultado,motivo,alumno:alumno||null,staffEmail,staffNombre,staffRol,nivel:staffNiveles[0]||'',creadoEn:new Date().toISOString()});
  alert('✅ Contacto registrado.');
  document.getElementById('call-familia').value='';document.getElementById('call-motivo').value='';document.getElementById('call-alumno').value='';
  await cargarLlamadas();
}

async function buscarFamiliaCall(q){
  const cont=document.getElementById('call-sugerencias');if(q.length<2){cont.innerHTML='';return;}
  const snap=await db.collection('usuarios').where('rol','==','familia').get();const res=[];
  snap.forEach(doc=>{if(doc.data().nombre.toLowerCase().includes(q.toLowerCase()))res.push(doc.data().nombre);});
  cont.innerHTML=res.slice(0,5).map(n=>`<div onclick="document.getElementById('call-familia').value='${n}';document.getElementById('call-sugerencias').innerHTML=''" class="bg-white border p-2 rounded-xl text-sm font-bold cursor-pointer hover:bg-slate-50">${n}</div>`).join('');
}

// ════ AUTORIZACIONES ════
async function cargarAutorizacionesSec(){
  const snap=await db.collection('autorizaciones').orderBy('fecha','desc').limit(50).get();
  const cont=document.getElementById('lista-aut-sec');cont.innerHTML='';let pend=0;
  const items=[];snap.forEach(doc=>{const a=doc.data();if(staffRol!=='admin'&&a.nivel&&!staffNiveles.includes(a.nivel))return;items.push({id:doc.id,...a});if(a.estado==='pendiente')pend++;});
  document.getElementById('badge-aut-sec').classList.toggle('hidden',pend===0);
  if(!items.length){cont.innerHTML='<p class="text-slate-400 text-sm text-center py-6">Sin autorizaciones.</p>';return;}
  const colores={retiro:'border-amber-200 bg-amber-50',modalidad:'border-blue-200 bg-blue-50'};
  cont.innerHTML=items.map(a=>{const d=new Date(a.fecha).toLocaleDateString('es-AR');const ec=a.estado==='pendiente'?'text-amber-600':a.estado==='aprobado'?'text-emerald-600':'text-rose-500';
    return`<div class="bg-white p-5 rounded-2xl border-2 ${colores[a.tipo]||'border-slate-100'} shadow-sm">
      <div class="flex items-start justify-between flex-wrap gap-2 mb-2">
        <div><p class="font-black text-slate-900">${a.alumnoNombre}</p><p class="text-[10px] text-slate-400">Familia: ${a.familiaNombre} · ${d}</p></div>
        <span class="text-[9px] font-black uppercase ${ec}">${a.estado||'pendiente'}</span>
      </div>
      <div class="flex items-center gap-2 mb-2"><i class="fas ${a.tipo==='retiro'?'fa-walking text-amber-500':'fa-door-open text-blue-500'}"></i><p class="font-bold text-sm">${a.tipo==='retiro'?'Retiro anticipado':'Cambio de modalidad'}</p></div>
      <p class="text-sm text-slate-600">${a.detalle||''}</p>
      ${a.estado==='pendiente'?`<div class="flex gap-2 mt-3">
        <button onclick="resolverAut('${a.id}','aprobado')" class="flex-1 bg-emerald-600 text-white py-2 rounded-xl text-xs font-black"><i class="fas fa-check mr-1"></i>Aprobar</button>
        <button onclick="resolverAut('${a.id}','rechazado')" class="flex-1 bg-rose-500 text-white py-2 rounded-xl text-xs font-black"><i class="fas fa-times mr-1"></i>Rechazar</button>
      </div>`:''}
    </div>`;
  }).join('');
}

async function resolverAut(autId,estado){
  await db.collection('autorizaciones').doc(autId).update({estado,resueltaPor:staffEmail,fechaResolucion:new Date().toISOString()});
  cargarAutorizacionesSec();
}

// ════ UTILS ════
function switchTabSec(tab){
  document.querySelectorAll('.tab-content,.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  if(document.getElementById('nav-'+tab))document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='justificaciones')cargarJustSec();
  if(tab==='llamadas')cargarLlamadas();
  if(tab==='autorizaciones-sec')cargarAutorizacionesSec();
}

init();
</script>
