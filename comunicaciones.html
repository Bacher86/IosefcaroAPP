<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicaciones - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; padding-bottom: 40px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; font-family: inherit; }
        .input-pro:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nivel-pill { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; }
        .nivel-inicial    { background: #fce7f3; color: #9d174d; }
        .nivel-primario   { background: #dbeafe; color: #1e40af; }
        .nivel-secundario { background: #d1fae5; color: #065f46; }
        .input-pro{border:1px solid #e2e8f0;border-radius:1rem;padding:.75rem;outline:none;width:100%;transition:all .2s;font-size:14px;font-family:inherit;background:white}
        .input-pro:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    </style>
</head>
<body>

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <div class="w-20 h-20 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-6"><i class="fas fa-bullhorn"></i></div>
            <h1 class="text-3xl font-black tracking-tighter">Panel de Comunicación</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1 mb-8">Iosef Caro</p>
            <div class="space-y-4">
                <input type="email" id="log-email" placeholder="Tu email" class="input-pro">
                <input type="password" id="log-pass" placeholder="Contraseña" class="input-pro">
                <button onclick="loginComunicacion()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black transition">ACCEDER</button>
            </div>
            <p id="login-err" class="text-red-500 text-xs font-bold mt-4 hidden"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="bg-white border-b p-3 flex gap-2 sticky top-0 z-50 shadow-sm overflow-x-auto" id="main-nav">
            <button onclick="switchTab('noticias')" id="navbtn-noticias" class="nav-btn font-bold px-4 py-2 rounded-xl bg-blue-50 text-blue-600 whitespace-nowrap text-sm">
                <i class="fas fa-bullhorn mr-2"></i>Noticias
            </button>
            <button onclick="switchTab('calendario')" id="navbtn-calendario" class="nav-btn font-bold px-4 py-2 rounded-xl text-slate-500 whitespace-nowrap text-sm">
                <i class="fas fa-calendar-star mr-2"></i>Calendario
            </button>
            <div class="ml-auto flex items-center gap-2">
                <span id="user-label" class="text-[10px] font-black text-slate-400 uppercase hidden"></span>
                <button onclick="location.reload()" class="text-rose-500 font-bold p-2 hover:bg-rose-50 rounded-xl transition"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <main class="p-4 max-w-5xl mx-auto">

            <section id="tab-noticias" class="tab-content active space-y-6">
                <div id="form-noticias" class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 id="noticia-form-title" class="font-black text-xl mb-4 text-slate-800">Nueva Publicación</h2>
                    <input type="hidden" id="noticia-id">
                    <div class="grid grid-cols-1 gap-4">
                        <input type="text" id="not-titulo" placeholder="Asunto o Título" class="input-pro">
                        <textarea id="not-texto" placeholder="Escribe el cuerpo del mensaje..." class="input-pro h-32"></textarea>
                        <div class="bg-slate-50 p-4 rounded-2xl grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Programar Publicación</label>
                                <input type="datetime-local" id="not-programacion" class="input-pro">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Cursos Destinatarios</label>
                                <div id="cursos-noticia" class="flex flex-wrap gap-2 mt-1"><span class="text-xs text-slate-400 italic">Cargando cursos...</span></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="border border-slate-200 rounded-xl p-3 bg-slate-50">
                              <label class="text-[9px] font-black text-slate-400 uppercase block mb-2">📷 Imagen / Foto</label>
                              <div class="flex gap-2 items-center">
                                <input type="file" id="not-img-file" accept="image/*" class="hidden" onchange="previewMedia('img',this)">
                                <button type="button" onclick="document.getElementById('not-img-file').click()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-xs font-bold flex-shrink-0"><i class="fas fa-upload mr-1"></i>Subir imagen</button>
                                <input type="text" id="not-img" placeholder="o pegar URL de imagen" class="input-pro text-xs" style="font-size:11px">
                              </div>
                              <div id="prev-img" class="mt-2 hidden"><img id="prev-img-el" class="w-full h-28 object-cover rounded-xl" src=""></div>
                              <div id="upload-prog-img" class="hidden mt-2"><div class="bg-slate-200 rounded-full h-1.5"><div id="prog-bar-img" class="bg-blue-600 h-1.5 rounded-full transition-all" style="width:0%"></div></div><p id="prog-txt-img" class="text-[9px] text-slate-400 mt-1">Subiendo...</p></div>
                            </div>
                            <div class="border border-slate-200 rounded-xl p-3 bg-slate-50">
                              <label class="text-[9px] font-black text-slate-400 uppercase block mb-2">🎬 Video</label>
                              <div class="flex gap-2 items-center">
                                <input type="file" id="not-video-file" accept="video/*" class="hidden" onchange="previewMedia('video',this)">
                                <button type="button" onclick="document.getElementById('not-video-file').click()" class="bg-purple-600 text-white px-3 py-2 rounded-xl text-xs font-bold flex-shrink-0"><i class="fas fa-video mr-1"></i>Subir video</button>
                                <input type="text" id="not-video" placeholder="o URL YouTube/Vimeo" class="input-pro text-xs" style="font-size:11px">
                              </div>
                              <div id="prev-video" class="mt-2 hidden"><video id="prev-video-el" class="w-full h-28 object-cover rounded-xl" controls src=""></video></div>
                              <div id="upload-prog-video" class="hidden mt-2"><div class="bg-slate-200 rounded-full h-1.5"><div id="prog-bar-video" class="bg-purple-600 h-1.5 rounded-full transition-all" style="width:0%"></div></div><p id="prog-txt-video" class="text-[9px] text-slate-400 mt-1">Subiendo...</p></div>
                            </div>
                            <div class="border border-slate-200 rounded-xl p-3 bg-slate-50">
                              <label class="text-[9px] font-black text-slate-400 uppercase block mb-2">📄 Archivo / PDF</label>
                              <div class="flex gap-2 items-center">
                                <input type="file" id="not-pdf-file" accept=".pdf,.doc,.docx,.xls,.xlsx" class="hidden" onchange="previewMedia('pdf',this)">
                                <button type="button" onclick="document.getElementById('not-pdf-file').click()" class="bg-red-600 text-white px-3 py-2 rounded-xl text-xs font-bold flex-shrink-0"><i class="fas fa-file-pdf mr-1"></i>Subir archivo</button>
                                <input type="text" id="not-pdf" placeholder="o pegar URL de PDF/archivo" class="input-pro text-xs" style="font-size:11px">
                              </div>
                              <p id="prev-pdf-nombre" class="text-xs font-bold text-red-600 mt-1 hidden"></p>
                              <div id="upload-prog-pdf" class="hidden mt-2"><div class="bg-slate-200 rounded-full h-1.5"><div id="prog-bar-pdf" class="bg-red-600 h-1.5 rounded-full transition-all" style="width:0%"></div></div><p id="prog-txt-pdf" class="text-[9px] text-slate-400 mt-1">Subiendo...</p></div>
                            </div>
                            <input type="text" id="not-link" placeholder="🔗 Enlace externo (opcional)" class="input-pro text-sm">
                        </div>
                        <div class="flex gap-2 mt-2">
                            <button onclick="guardarNoticia()" id="btn-noticia" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Publicar y Enviar Mail</button>
                            <button onclick="resetFormNoticia()" id="btn-cancel-noticia" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">Cancelar</button>
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="font-black text-lg text-slate-800 ml-2 mb-4">Historial de Publicaciones</h3>
                    <div id="lista-noticias" class="space-y-4"></div>
                </div>
            </section>

            <section id="tab-calendario" class="tab-content space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 id="cal-form-title" class="font-black text-xl mb-4 text-slate-800">Agendar al Calendario</h2>
                    <input type="hidden" id="cal-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2"><input type="text" id="cal-titulo" placeholder="Título del evento" class="input-pro"></div>
                        <textarea id="cal-desc" placeholder="Breve descripción..." class="input-pro md:col-span-2 h-20"></textarea>
                        <input type="date" id="cal-fecha" class="input-pro">
                        <select id="cal-tipo" class="input-pro">
                            <option value="evento">Evento General</option>
                            <option value="examen">Examen / Entrega</option>
                            <option value="feriado">Feriado / Sin Actividad</option>
                        </select>
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Visible para:</label>
                            <div id="cursos-calendario" class="flex flex-wrap gap-2 mt-1"></div>
                        </div>
                        <div class="md:col-span-2 flex gap-2">
                            <button onclick="guardarCalendario()" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700">Guardar Evento</button>
                            <button onclick="resetFormCalendario()" id="btn-cancel-cal" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">X</button>
                        </div>
                    </div>
                </div>
                <div id="lista-calendario" class="space-y-3"></div>
            </section>

        </main>
    </div>

    <script>
        (function(){
            emailjs.init("hDKMmExBMzhAWF_KH");
        })();

        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.appspot.com",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let staffEmail = "";
        let staffNombre = "";
        let staffRol = ""; 
        let cursosListaGlobal = [];

        // ═══ LOGIN Y CONTROL DE ACCESO ═══
        async function loginComunicacion() {
            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-pass').value;
            const err = document.getElementById('login-err');

            if (!email || !pass) {
                err.innerText = "Por favor completa todos los campos.";
                err.classList.remove('hidden');
                return;
            }

            try {
                const snap = await db.collection('usuarios')
                    .where('email', '==', email.toLowerCase())
                    .where('password', '==', pass)
                    .get();

                if (snap.empty) {
                    err.innerText = "Credenciales incorrectas.";
                    err.classList.remove('hidden');
                    return;
                }

                let userDoc = null;
                snap.forEach(d => userDoc = d.data());

                if (userDoc.rol !== 'admin' && userDoc.rol !== 'secretaria') {
                    err.innerText = "No tienes permisos de comunicación.";
                    err.classList.remove('hidden');
                    return;
                }

                staffEmail = userDoc.email;
                staffNombre = userDoc.nombre;
                staffRol = userDoc.rol;

                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');

                const label = document.getElementById('user-label');
                label.innerText = `${staffNombre} (${staffRol})`;
                label.classList.remove('hidden');

                inicializarModulo();

            } catch (e) {
                console.error(e);
                err.innerText = "Error de conexión.";
                err.classList.remove('hidden');
            }
        }

        async function inicializarModulo() {
            await cargarCursosMaestros();
            cargarNoticias();
            cargarEventosCalendario();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-blue-600', 'bg-emerald-50', 'text-emerald-600');
                btn.classList.add('text-slate-500');
            });

            document.getElementById(`tab-${tabId}`).classList.add('active');
            const btnActivo = document.getElementById(`navbtn-${tabId}`);

            if (tabId === 'noticias') {
                btnActivo.classList.add('bg-blue-50', 'text-blue-600');
            } else if (tabId === 'calendario') {
                btnActivo.classList.add('bg-emerald-50', 'text-emerald-600');
            }
        }

        // Cargar cursos desde Firestore para los Checkboxes
        async function cargarCursosMaestros() {
            try {
                const snap = await db.collection('cursos').orderBy('nombre', 'asc').get();
                const contNoticias = document.getElementById('cursos-noticia');
                const contCalendario = document.getElementById('cursos-calendario');

                let html = `<label class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border text-xs font-bold cursor-pointer hover:bg-slate-50">
                    <input type="checkbox" id="chk-todos-not" onchange="toggleTodosCursos('noticia', this.checked)"> Todos los cursos
                </label>`;
                let htmlCal = `<label class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border text-xs font-bold cursor-pointer hover:bg-slate-50">
                    <input type="checkbox" id="chk-todos-cal" onchange="toggleTodosCursos('calendario', this.checked)"> Todos los cursos
                </label>`;

                cursosListaGlobal = [];
                snap.forEach(doc => {
                    const c = doc.data().nombre;
                    cursosListaGlobal.push(c);
                    html += `
                    <label class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border text-xs font-bold cursor-pointer hover:bg-slate-50">
                        <input type="checkbox" value="${c}" class="check-cursos-noticia"> ${c}
                    </label>`;
                    htmlCal += `
                    <label class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border text-xs font-bold cursor-pointer hover:bg-slate-50">
                        <input type="checkbox" value="${c}" class="check-cursos-cal"> ${c}
                    </label>`;
                });

                contNoticias.innerHTML = html;
                contCalendario.innerHTML = htmlCal;
            } catch(e) {
                console.error("Error cargando cursos:", e);
            }
        }

        function toggleTodosCursos(contexto, isChecked) {
            const selector = contexto === 'noticia' ? '.check-cursos-noticia' : '.check-cursos-cal';
            document.querySelectorAll(selector).forEach(checkbox => {
                checkbox.checked = isChecked;
            });
        }

        // Subida de archivos a Firebase Storage
        async function uploadFileToStorage(file, folder) {
            const fileRef = storage.ref().child(`comunicados/${folder}/${Date.now()}_${file.name}`);
            return fileRef.put(file);
        }

        async function previewMedia(type, input) {
            const file = input.files[0];
            if (!file) return;

            const previewImg = document.getElementById('prev-img');
            const previewImgEl = document.getElementById('prev-img-el');
            const previewVideo = document.getElementById('prev-video');
            const previewVideoEl = document.getElementById('prev-video-el');
            const previewPdfNombre = document.getElementById('prev-pdf-nombre');

            const progDiv = document.getElementById(`upload-prog-${type}`);
            const progBar = document.getElementById(`prog-bar-${type}`);
            const progTxt = document.getElementById(`prog-txt-${type}`);

            progDiv.classList.remove('hidden');
            progBar.style.width = '0%';
            progTxt.innerText = "Subiendo archivo...";

            try {
                const uploadTask = await uploadFileToStorage(file, type === 'img' ? 'imgs' : type === 'video' ? 'videos' : 'pdfs');
                const downloadURL = await uploadTask.ref.getDownloadURL();

                progBar.style.width = '100%';
                progTxt.innerText = "¡Subido con éxito!";

                if (type === 'img') {
                    document.getElementById('not-img').value = downloadURL;
                    previewImgEl.src = downloadURL;
                    previewImg.classList.remove('hidden');
                } else if (type === 'video') {
                    document.getElementById('not-video').value = downloadURL;
                    previewVideoEl.src = downloadURL;
                    previewVideo.classList.remove('hidden');
                } else if (type === 'pdf') {
                    document.getElementById('not-pdf').value = downloadURL;
                    previewPdfNombre.innerText = `📄 ${file.name}`;
                    previewPdfNombre.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                progTxt.innerText = "Error al subir.";
            }
        }

        // ═══ NOTICIAS / COMUNICADOS ═══
        async function cargarNoticias() {
            const snap = await db.collection('noticias').orderBy('fecha', 'desc').get();
            const cont = document.getElementById('lista-noticias');
            cont.innerHTML = "";

            snap.forEach(doc => {
                const n = doc.data();
                const id = doc.id;
                const progStr = n.programada ? `<span class="bg-amber-100 text-amber-800 text-[9px] font-black uppercase px-2 py-1 rounded">Programada: ${new Date(n.programada).toLocaleString()}</span>` : '';
                const cursStr = n.cursos && n.cursos.length ? n.cursos.map(c => `<span class="bg-slate-100 text-slate-700 text-[9px] font-bold px-2 py-1 rounded">${c}</span>`).join(' ') : '<span class="bg-blue-50 text-blue-700 text-[9px] font-bold px-2 py-1 rounded">Todos</span>';

                let mediaHtml = "";
                if (n.img) mediaHtml += `<img src="${n.img}" class="w-full h-48 object-cover rounded-2xl mb-4">`;
                if (n.video) {
                    if (n.video.includes('youtube.com') || n.video.includes('youtu.be')) {
                        mediaHtml += `<div class="aspect-video w-full mb-4"><iframe class="w-full h-full rounded-2xl" src="${n.video.replace('watch?v=', 'embed/')}" frameborder="0" allowfullscreen></iframe></div>`;
                    } else {
                        mediaHtml += `<video src="${n.video}" controls class="w-full rounded-2xl mb-4 max-h-80 bg-black"></video>`;
                    }
                }
                if (n.pdf) mediaHtml += `<a href="${n.pdf}" target="_blank" class="inline-flex items-center gap-2 bg-red-50 text-red-600 font-bold px-4 py-2.5 rounded-xl border border-red-100 text-xs hover:bg-red-100 transition mb-4"><i class="fas fa-file-pdf text-lg"></i> Descargar Documento Adjunto</a>`;
                if (n.link) mediaHtml += `<a href="${n.link}" target="_blank" class="inline-flex items-center gap-2 bg-blue-50 text-blue-600 font-bold px-4 py-2.5 rounded-xl border border-blue-100 text-xs hover:bg-blue-100 transition mb-4 ml-2"><i class="fas fa-link"></i> Enlace de Interés</a>`;

                cont.innerHTML += `
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-black text-lg text-slate-800 leading-tight">${n.titulo}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Por ${n.autor || 'Staff'} • ${new Date(n.fecha).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editarNoticia('${id}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded-xl text-xs font-bold transition"><i class="fas fa-edit"></i></button>
                            <button onclick="eliminarNoticia('${id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-xl text-xs font-bold transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <p class="text-slate-600 text-sm whitespace-pre-wrap leading-relaxed mb-4">${n.texto}</p>
                    ${mediaHtml}
                    <div class="flex flex-wrap gap-1 items-center border-t pt-3 mt-2">
                        <span class="text-[9px] text-slate-400 font-black uppercase mr-1">Visibilidad:</span>
                        ${cursStr}
                        ${progStr}
                    </div>
                </div>`;
            });
        }

        async function guardarNoticia() {
            const id = document.getElementById('noticia-id').value;
            const titulo = document.getElementById('not-titulo').value.trim();
            const texto = document.getElementById('not-texto').value.trim();
            const programada = document.getElementById('not-programacion').value;
            const img = document.getElementById('not-img').value.trim();
            const video = document.getElementById('not-video').value.trim();
            const pdf = document.getElementById('not-pdf').value.trim();
            const link = document.getElementById('not-link').value.trim();

            const selectedCursos = [];
            document.querySelectorAll('.check-cursos-noticia:checked').forEach(cb => selectedCursos.push(cb.value));

            if (!titulo || !texto) {
                alert("Completa título y texto.");
                return;
            }

            const payload = {
                titulo,
                texto,
                fecha: new Date().toISOString(),
                autor: staffNombre,
                cursos: selectedCursos,
                img: img || null,
                video: video || null,
                pdf: pdf || null,
                link: link || null,
                programada: programada ? new Date(programada).toISOString() : null
            };

            try {
                if (id) {
                    await db.collection('noticias').doc(id).update(payload);
                } else {
                    await db.collection('noticias').add(payload);
                    
                    // Solo enviar mails a familias si es un comunicado inmediato y no es editado
                    if (!programada) {
                        await enviarAvisoMailFamilias(titulo, texto, selectedCursos);
                    }
                }

                resetFormNoticia();
                cargarNoticias();
            } catch (e) {
                console.error(e);
                alert("Error al guardar.");
            }
        }

        async function enviarAvisoMailFamilias(titulo, texto, cursosDest) {
            try {
                let usuariosSnap;
                if (cursosDest.length === 0 || document.getElementById('chk-todos-not')?.checked) {
                    usuariosSnap = await db.collection('usuarios').where('rol', '==', 'familia').get();
                } else {
                    // Filtrar por los alumnos que pertenezcan a los cursos destinados
                    const alumnosSnap = await db.collection('alumnos').where('curso', 'in', cursosDest).get();
                    const responsemails = new Set();
                    alumnosSnap.forEach(doc => {
                        const data = doc.data();
                        if (data.responsableEmail) responsemails.add(data.responsableEmail.toLowerCase());
                    });
                    
                    if (responsemails.size === 0) return;
                    
                    // Buscar en usuarios
                    usuariosSnap = await db.collection('usuarios')
                        .where('rol', '==', 'familia')
                        .get();
                }

                usuariosSnap.forEach(async (uDoc) => {
                    const u = uDoc.data();
                    // Si filtramos por curso específico, verificar si el mail del tutor está incluido
                    if (cursosDest.length > 0 && !document.getElementById('chk-todos-not')?.checked) {
                        const alumnosSnap = await db.collection('alumnos').where('curso', 'in', cursosDest).get();
                        const emailsPermitidos = [];
                        alumnosSnap.forEach(a => emailsPermitidos.push(a.data().responsableEmail?.toLowerCase()));
                        if (!emailsPermitidos.includes(u.email?.toLowerCase())) return;
                    }

                    emailjs.send("service_x9r2b6e", "template_noticia", {
                        to_email: u.email,
                        to_name: u.nombre,
                        noticia_titulo: titulo,
                        noticia_texto: texto.substring(0, 300) + "..."
                    });
                });

            } catch (e) {
                console.error("Error enviando mails:", e);
            }
        }

        async function editarNoticia(id) {
            const doc = await db.collection('noticias').doc(id).get();
            if (!doc.exists) return;
            const n = doc.data();

            document.getElementById('noticia-id').value = id;
            document.getElementById('not-titulo').value = n.titulo;
            document.getElementById('not-texto').value = n.texto;
            document.getElementById('not-programacion').value = n.programada ? n.programada.substring(0, 16) : "";
            document.getElementById('not-img').value = n.img || "";
            document.getElementById('not-video').value = n.video || "";
            document.getElementById('not-pdf').value = n.pdf || "";
            document.getElementById('not-link').value = n.link || "";

            // Reset media previews
            document.getElementById('prev-img').classList.add('hidden');
            document.getElementById('prev-video').classList.add('hidden');
            document.getElementById('prev-pdf-nombre').classList.add('hidden');

            if (n.img) {
                document.getElementById('prev-img-el').src = n.img;
                document.getElementById('prev-img').classList.remove('hidden');
            }
            if (n.video) {
                document.getElementById('prev-video-el').src = n.video;
                document.getElementById('prev-video').classList.remove('hidden');
            }
            if (n.pdf) {
                document.getElementById('prev-pdf-nombre').innerText = "📄 Archivo cargado";
                document.getElementById('prev-pdf-nombre').classList.remove('hidden');
            }

            document.querySelectorAll('.check-cursos-noticia').forEach(cb => {
                cb.checked = n.cursos && n.cursos.includes(cb.value);
            });

            document.getElementById('noticia-form-title').innerText = "Editando Publicación";
            document.getElementById('btn-cancel-noticia').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetFormNoticia() {
            document.getElementById('noticia-id').value = "";
            document.getElementById('not-titulo').value = "";
            document.getElementById('not-texto').value = "";
            document.getElementById('not-programacion').value = "";
            document.getElementById('not-img').value = "";
            document.getElementById('not-video').value = "";
            document.getElementById('not-pdf').value = "";
            document.getElementById('not-link').value = "";
            
            document.getElementById('prev-img').classList.add('hidden');
            document.getElementById('prev-video').classList.add('hidden');
            document.getElementById('prev-pdf-nombre').classList.add('hidden');
            
            document.getElementById('upload-prog-img').classList.add('hidden');
            document.getElementById('upload-prog-video').classList.add('hidden');
            document.getElementById('upload-prog-pdf').classList.add('hidden');

            document.querySelectorAll('.check-cursos-noticia').forEach(cb => cb.checked = false);
            if(document.getElementById('chk-todos-not')) document.getElementById('chk-todos-not').checked = false;
            
            document.getElementById('noticia-form-title').innerText = "Nueva Publicación";
            document.getElementById('btn-cancel-noticia').classList.add('hidden');
        }

        async function eliminarNoticia(id) {
            if (confirm("¿Estás seguro de que deseas eliminar este comunicado?")) {
                await db.collection('noticias').doc(id).delete();
                cargarNoticias();
            }
        }

        // ═══ CALENDARIO ═══
        async function cargarEventosCalendario() {
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            const cont = document.getElementById('lista-calendario');
            cont.innerHTML = "";

            snap.forEach(doc => {
                const e = doc.data();
                const id = doc.id;
                const dateParsed = new Date(e.fecha + 'T00:00:00').toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

                let badgeColor = "bg-blue-100 text-blue-800";
                if (e.tipo === 'examen') badgeColor = "bg-rose-100 text-rose-800";
                if (e.tipo === 'feriado') badgeColor = "bg-slate-100 text-slate-800";

                const visStr = e.cursos && e.cursos.length ? e.cursos.map(c => `<span class="bg-slate-100 text-slate-700 text-[9px] font-bold px-2 py-0.5 rounded">${c}</span>`).join(' ') : '<span class="bg-emerald-50 text-emerald-700 text-[9px] font-bold px-2 py-0.5 rounded">Todos</span>';

                cont.innerHTML += `
                <div class="bg-white p-5 rounded-2xl border shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1 flex-wrap">
                            <span class="${badgeColor} text-[10px] font-bold uppercase px-2.5 py-0.5 rounded-full">${e.tipo}</span>
                            <span class="text-xs text-slate-400 font-bold capitalize">${dateParsed}</span>
                        </div>
                        <h4 class="font-black text-base text-slate-800 leading-snug">${e.titulo}</h4>
                        ${e.descripcion ? `<p class="text-slate-500 text-xs mt-1 leading-relaxed">${e.descripcion}</p>` : ''}
                        <div class="flex flex-wrap gap-1 items-center mt-3 pt-2 border-t">
                            <span class="text-[9px] text-slate-400 font-black uppercase mr-1">Visibilidad:</span>
                            ${visStr}
                        </div>
                    </div>
                    <div class="flex gap-1 self-end md:self-auto">
                        <button onclick="editarCalendario('${id}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded-xl text-xs font-bold transition"><i class="fas fa-edit"></i></button>
                        <button onclick="eliminarCalendario('${id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-xl text-xs font-bold transition"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
            });
        }

        async function guardarCalendario() {
            const id = document.getElementById('cal-id').value;
            const titulo = document.getElementById('cal-titulo').value.trim();
            const descripcion = document.getElementById('cal-desc').value.trim();
            const fecha = document.getElementById('cal-fecha').value;
            const tipo = document.getElementById('cal-tipo').value;

            const selectedCursos = [];
            document.querySelectorAll('.check-cursos-cal:checked').forEach(cb => selectedCursos.push(cb.value));

            if (!titulo || !fecha) {
                alert("Completa el título y la fecha del evento.");
                return;
            }

            const payload = {
                titulo,
                descripcion: descripcion || null,
                fecha,
                tipo,
                cursos: selectedCursos
            };

            try {
                if (id) {
                    await db.collection('eventos').doc(id).update(payload);
                } else {
                    await db.collection('eventos').add(payload);
                }

                resetFormCalendario();
                cargarEventosCalendario();
            } catch (e) {
                console.error(e);
                alert("Error al guardar en el calendario.");
            }
        }

        async function editarCalendario(id) {
            const doc = await db.collection('eventos').doc(id).get();
            if (!doc.exists) return;
            const e = doc.data();

            document.getElementById('cal-id').value = id;
            document.getElementById('cal-titulo').value = e.titulo;
            document.getElementById('cal-desc').value = e.descripcion || "";
            document.getElementById('cal-fecha').value = e.fecha;
            document.getElementById('cal-tipo').value = e.tipo;

            document.querySelectorAll('.check-cursos-cal').forEach(cb => {
                cb.checked = e.cursos && e.cursos.includes(cb.value);
            });

            document.getElementById('cal-form-title').innerText = "Editar Evento";
            document.getElementById('btn-cancel-cal').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetFormCalendario() {
            document.getElementById('cal-id').value = "";
            document.getElementById('cal-titulo').value = "";
            document.getElementById('cal-desc').value = "";
            document.getElementById('cal-fecha').value = "";
            document.getElementById('cal-tipo').value = "evento";

            document.querySelectorAll('.check-cursos-cal').forEach(cb => cb.checked = false);
            if(document.getElementById('chk-todos-cal')) document.getElementById('chk-todos-cal').checked = false;

            document.getElementById('cal-form-title').innerText = "Agendar al Calendario";
            document.getElementById('btn-cancel-cal').classList.add('hidden');
        }

        async function eliminarCalendario(id) {
            if (confirm("¿Estás seguro de eliminar este evento del calendario?")) {
                await db.collection('eventos').doc(id).delete();
                cargarEventosCalendario();
            }
        }
    </script>
