<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicaciones - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <!-- Librería EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; padding-bottom: 40px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="comunicaciones-content">
        <nav class="bg-white border-b p-4 flex gap-4 sticky top-0 z-50 shadow-sm overflow-x-auto">
            <button onclick="switchTab('noticias')" class="nav-btn font-bold px-4 py-2 rounded-xl bg-blue-50 text-blue-600 whitespace-nowrap">
                <i class="fas fa-bullhorn mr-2"></i>Noticias y Avisos
            </button>
            <button onclick="switchTab('calendario')" class="nav-btn font-bold px-4 py-2 rounded-xl text-slate-500 whitespace-nowrap">
                <i class="fas fa-calendar-star mr-2"></i>Calendario Escolar
            </button>
            <button onclick="location.reload()" class="ml-auto text-rose-500 font-bold px-4 py-2 hover:bg-rose-50 rounded-xl transition">
                <i class="fas fa-sync"></i>
            </button>
        </nav>

        <main class="p-4 max-w-5xl mx-auto">
            <section id="tab-noticias" class="tab-content active space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 id="noticia-form-title" class="font-black text-xl mb-4 text-slate-800">Nueva Publicación</h2>
                    <input type="hidden" id="noticia-id">
                    
                    <div class="grid grid-cols-1 gap-4">
                        <input type="text" id="not-titulo" placeholder="Asunto o Título de la noticia" class="input-pro">
                        <textarea id="not-texto" placeholder="Escribe el cuerpo del mensaje..." class="input-pro h-32"></textarea>
                        
                        <div class="bg-slate-50 p-4 rounded-2xl grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Programar Publicación</label>
                                <input type="datetime-local" id="not-programacion" class="input-pro">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Cursos Destinatarios</label>
                                <div id="cursos-noticia" class="flex flex-wrap gap-2 mt-1">
                                    <span class="text-xs text-slate-400 italic">Cargando cursos...</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="not-img" placeholder="URL Imagen (ImgBB)" class="input-pro">
                            <input type="text" id="not-video" placeholder="URL YouTube/Video" class="input-pro">
                            <input type="text" id="not-pdf" placeholder="URL PDF" class="input-pro">
                            <input type="text" id="not-link" placeholder="Enlace Externo" class="input-pro">
                        </div>

                        <div class="flex gap-2 mt-4">
                            <button onclick="guardarNoticia()" id="btn-noticia" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Publicar y Enviar Mail</button>
                            <button onclick="resetFormNoticia()" id="btn-cancel-noticia" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">Cancelar</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="font-black text-lg text-slate-800 ml-2">Historial de Publicaciones</h3>
                    <div id="lista-noticias" class="space-y-4"></div>
                </div>
            </section>

            <section id="tab-calendario" class="tab-content space-y-6">
                <!-- Sección Calendario se mantiene igual -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 id="cal-form-title" class="font-black text-xl mb-4 text-slate-800">Agendar al Calendario</h2>
                    <input type="hidden" id="cal-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <input type="text" id="cal-titulo" placeholder="Título del evento" class="input-pro">
                        </div>
                        <textarea id="cal-desc" placeholder="Breve descripción..." class="input-pro md:col-span-2 h-20"></textarea>
                        <input type="date" id="cal-fecha" class="input-pro">
                        <select id="cal-tipo" class="input-pro">
                            <option value="evento">Evento General</option>
                            <option value="examen">Examen / Entrega</option>
                            <option value="feriado">Feriado / Sin Actividad</option>
                        </select>
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Visible para:</label>
                            <div id="cursos-calendario" class="flex flex-wrap gap-2 mt-1"></div>
                        </div>
                        <div class="md:col-span-2 flex gap-2">
                            <button onclick="guardarCalendario()" id="btn-cal" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700">Guardar Evento</button>
                            <button onclick="resetFormCalendario()" id="btn-cancel-cal" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">X</button>
                        </div>
                    </div>
                </div>
                <div id="lista-calendario" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <script>
    (function(){ emailjs.init("hDKMmExBMzhAWF_KH"); })();

    const firebaseConfig = { 
        apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", 
        authDomain: "app-iosefcaro.firebaseapp.com", 
        projectId: "app-iosefcaro", 
        storageBucket: "app-iosefcaro.firebasestorage.app", 
        messagingSenderId: "651320124248", 
        appId: "1:651320124248:web:97c8ca00e29114e1983b2d" 
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = () => { inicializarApp(); };

    function inicializarApp() {
        cargarCursos();
        cargarNoticias();
        cargarEventosCalendario();
    }

    // --- LOGICA DE CURSOS ---
    async function cargarCursos() {
        try {
            const snap = await db.collection('cursos').get();
            const cursos = snap.docs.map(doc => doc.data().nombre).sort();
            const contNot = document.getElementById('cursos-noticia');
            const contCal = document.getElementById('cursos-calendario');
            [contNot, contCal].forEach(cont => {
                if(!cont) return;
                cont.innerHTML = `<label class="border px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer hover:bg-blue-50"><input type="checkbox" id="all-${cont.id}" onchange="toggleTodos(this, '${cont.id}')"> TODOS</label>`;
                cursos.forEach(c => {
                    cont.innerHTML += `<label class="border px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer hover:bg-slate-50"><input type="checkbox" class="check-${cont.id}" value="${c}"> ${c}</label>`;
                });
            });
        } catch(e) { console.log("Error cursos:", e); }
    }

    function toggleTodos(source, contId) {
        document.querySelectorAll(`.check-${contId}`).forEach(cb => cb.checked = source.checked);
    }

    // --- SECCIÓN NOTICIAS ---
    async function cargarNoticias() {
        const snap = await db.collection('comunicados').orderBy('fechaCreacion', 'desc').get();
        const cont = document.getElementById('lista-noticias');
        cont.innerHTML = "";
        snap.forEach(doc => {
            const n = doc.data();
            cont.innerHTML += `
                <div class="bg-white p-5 rounded-2xl border shadow-sm flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-slate-800">${n.titulo}</h4>
                            <p class="text-xs text-slate-400">${new Date(n.fechaCreacion).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editarNoticia('${doc.id}')" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                            <button onclick="eliminarDoc('comunicados', '${doc.id}')" class="text-rose-400 p-2 hover:bg-rose-50 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 line-clamp-2">${n.texto}</p>
                    <div class="flex flex-wrap gap-1">
                        ${n.curso ? n.curso.map(c => `<span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded text-slate-500">${c}</span>`).join('') : ''}
                    </div>
                </div>`;
        });
    }

    async function guardarNoticia() {
        const id = document.getElementById('noticia-id').value;
        const titulo = document.getElementById('not-titulo').value;
        const texto = document.getElementById('not-texto').value;
        const seleccionados = Array.from(document.querySelectorAll('.check-cursos-noticia:checked')).map(c => c.value);
        const esTodos = document.getElementById('all-cursos-noticia')?.checked;
        
        if(!titulo || !texto || (seleccionados.length === 0 && !esTodos)) return alert("Faltan datos obligatorios.");

        const btn = document.getElementById('btn-noticia');
        btn.disabled = true;
        btn.innerText = "Procesando...";

        const data = {
            titulo, texto, curso: seleccionados,
            programacion: document.getElementById('not-programacion').value || new Date().toISOString(),
            adjuntos: {
                img: document.getElementById('not-img').value,
                video: document.getElementById('not-video').value,
                pdf: document.getElementById('not-pdf').value,
                link: document.getElementById('not-link').value
            },
            fechaCreacion: new Date().toISOString()
        };

        try {
            if(id) {
                await db.collection('comunicados').doc(id).update(data);
                alert("Publicación actualizada.");
            } else {
                await db.collection('comunicados').add(data);
                await enviarAvisosPorEmail(titulo, texto, seleccionados, esTodos);
                alert("Publicado y mails enviados.");
            }
            location.reload();
        } catch(e) {
            alert("Error: " + e.message);
            btn.disabled = false;
        }
    }

    async function editarNoticia(id) {
        const doc = await db.collection('comunicados').doc(id).get();
        const n = doc.data();
        document.getElementById('noticia-id').value = id;
        document.getElementById('not-titulo').value = n.titulo;
        document.getElementById('not-texto').value = n.texto;
        document.getElementById('not-img').value = n.adjuntos?.img || "";
        document.getElementById('not-video').value = n.adjuntos?.video || "";
        document.getElementById('not-pdf').value = n.adjuntos?.pdf || "";
        document.getElementById('not-link').value = n.adjuntos?.link || "";
        
        // Marcar checkboxes guardados
        document.querySelectorAll('.check-cursos-noticia').forEach(cb => {
            cb.checked = n.curso && n.curso.includes(cb.value);
        });

        document.getElementById('noticia-form-title').innerText = "Editando Publicación";
        document.getElementById('btn-cancel-noticia').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetFormNoticia() {
        document.getElementById('noticia-id').value = "";
        document.getElementById('not-titulo').value = "";
        document.getElementById('not-texto').value = "";
        document.querySelectorAll('.check-cursos-noticia').forEach(cb => cb.checked = false);
        document.getElementById('noticia-form-title').innerText = "Nueva Publicación";
        document.getElementById('btn-cancel-noticia').classList.add('hidden');
    }

    // --- SECCIÓN CALENDARIO ---
    async function cargarEventosCalendario() {
        const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
        const cont = document.getElementById('lista-calendario');
        cont.innerHTML = "";
        snap.forEach(doc => {
            const e = doc.data();
            cont.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex items-center gap-4 shadow-sm">
                <div class="flex-1">
                    <p class="text-[10px] font-black uppercase text-slate-400">${e.fecha}</p>
                    <h4 class="font-bold text-slate-800">${e.titulo}</h4>
                </div>
                <div class="flex gap-2">
                    <button onclick="editarCalendario('${doc.id}')" class="text-blue-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                    <button onclick="eliminarDoc('eventos', '${doc.id}')" class="text-rose-200 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        });
    }

    async function guardarCalendario() {
        const id = document.getElementById('cal-id').value;
        const seleccionados = Array.from(document.querySelectorAll('.check-cursos-calendario:checked')).map(c => c.value);
        const data = {
            titulo: document.getElementById('cal-titulo').value,
            descripcion: document.getElementById('cal-desc').value,
            fecha: document.getElementById('cal-fecha').value,
            tipo: document.getElementById('cal-tipo').value,
            tag: seleccionados
        };
        if(!data.titulo || !data.fecha) return alert("Título y Fecha son obligatorios.");

        if(id) await db.collection('eventos').doc(id).update(data);
        else await db.collection('eventos').add(data);
        location.reload();
    }

    async function editarCalendario(id) {
        const doc = await db.collection('eventos').doc(id).get();
        const e = doc.data();
        document.getElementById('cal-id').value = id;
        document.getElementById('cal-titulo').value = e.titulo;
        document.getElementById('cal-desc').value = e.descripcion;
        document.getElementById('cal-fecha').value = e.fecha;
        document.getElementById('cal-tipo').value = e.tipo;
        
        document.querySelectorAll('.check-cursos-calendario').forEach(cb => {
            cb.checked = e.tag && e.tag.includes(cb.value);
        });

        document.getElementById('cal-form-title').innerText = "Editando Evento";
        document.getElementById('btn-cancel-cal').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetFormCalendario() {
        document.getElementById('cal-id').value = "";
        document.getElementById('cal-titulo').value = "";
        document.getElementById('cal-desc').value = "";
        document.getElementById('cal-fecha').value = "";
        document.getElementById('cal-form-title').innerText = "Agendar al Calendario";
        document.getElementById('btn-cancel-cal').classList.add('hidden');
    }

    // --- UTILIDADES ---
    async function enviarAvisosPorEmail(titulo, cuerpo, cursosFiltro, esTodos) {
        try {
            let query = db.collection('usuarios');
            if (!esTodos && cursosFiltro.length > 0) {
                query = query.where('curso', 'in', cursosFiltro);
            }
            const snap = await query.get();
            if (snap.empty) return;

            const promesas = [];
            snap.forEach(doc => {
                const userData = doc.data();
                if (userData.email && userData.email.trim() !== "") {
                    promesas.push(emailjs.send("service_5lf6k9v", "template_noticias", {
                        to_email: "tu-email-real@gmail.com",
                        subject: titulo,
                        message: cuerpo,
                        school_name: "Iosef Caro"
                    }));
                }
            });
            return await Promise.all(promesas);
        } catch(e) { console.error("EmailJS Error:", e); }
    }

    async function eliminarDoc(col, id) {
        if(confirm("¿Eliminar permanentemente?")) { 
            await db.collection(col).doc(id).delete(); 
            location.reload(); 
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+tabId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('bg-blue-50', 'text-blue-600'); b.classList.add('text-slate-500');
        });
        event.currentTarget.classList.add('bg-blue-50', 'text-blue-600');
    }
    </script>
</body>
</html>
