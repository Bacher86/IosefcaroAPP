<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicación Integral - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body>

    <div id="app-content">
        <nav class="bg-white border-b p-3 flex gap-2 sticky top-0 z-50 shadow-sm">
            <button onclick="switchTab('noticias')" id="navbtn-noticias" class="nav-btn font-bold px-4 py-2 rounded-xl bg-blue-50 text-blue-600 text-sm">
                <i class="fas fa-bullhorn mr-2"></i>Noticias
            </button>
            <button onclick="switchTab('calendario')" id="navbtn-calendario" class="nav-btn font-bold px-4 py-2 rounded-xl text-slate-500 text-sm">
                <i class="fas fa-calendar-alt mr-2"></i>Calendario
            </button>
        </nav>

        <main class="p-4 max-w-5xl mx-auto">
            
            <section id="tab-noticias" class="tab-content active space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-black text-xl mb-4 text-slate-800">Crear Comunicado</h2>
                    
                    <div class="grid grid-cols-1 gap-4">
                        <input type="text" id="not-titulo" placeholder="Asunto / Título" class="input-pro font-bold">
                        <textarea id="not-texto" placeholder="Cuerpo del mensaje..." class="input-pro h-32"></textarea>
                        
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Destinatarios (Cursos):</label>
                            <div id="cursos-noticia" class="flex flex-wrap gap-2">
                                </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div class="relative">
                                <i class="fas fa-image absolute left-3 top-3.5 text-slate-400"></i>
                                <input type="text" id="not-img" placeholder="URL Imagen" class="input-pro pl-10 text-xs">
                            </div>
                            <div class="relative">
                                <i class="fas fa-video absolute left-3 top-3.5 text-slate-400"></i>
                                <input type="text" id="not-video" placeholder="URL Video (YouTube/Drive)" class="input-pro pl-10 text-xs">
                            </div>
                            <div class="relative">
                                <i class="fas fa-file-pdf absolute left-3 top-3.5 text-slate-400"></i>
                                <input type="text" id="not-pdf" placeholder="URL PDF / Documento" class="input-pro pl-10 text-xs">
                            </div>
                        </div>

                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                            <label class="text-[10px] font-black uppercase text-blue-500 block mb-1">Programar Publicación:</label>
                            <input type="datetime-local" id="not-programar" class="input-pro">
                            <p class="text-[9px] text-blue-400 mt-1 italic">* Si no seleccionas fecha, se publicará al instante.</p>
                        </div>

                        <button onclick="guardarNoticia()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700">Publicar Comunicado</button>
                    </div>
                </div>
                <div id="lista-noticias" class="space-y-4"></div>
            </section>

            <section id="tab-calendario" class="tab-content space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-black text-xl mb-4 text-slate-800">Nuevo Evento de Calendario</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="cal-titulo" placeholder="Nombre del evento (ej: Examen Historia)" class="input-pro md:col-span-2">
                        <input type="date" id="cal-fecha" class="input-pro">
                        <select id="cal-tipo" class="input-pro">
                            <option value="evento">Evento General</option>
                            <option value="examen">Examen / Entrega</option>
                            <option value="feriado">Feriado / Sin clases</option>
                        </select>
                        
                        <div class="md:col-span-2 bg-slate-50 p-4 rounded-2xl">
                            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Visible para los cursos:</label>
                            <div id="cursos-calendario" class="flex flex-wrap gap-2">
                                </div>
                        </div>

                        <button onclick="guardarCalendario()" class="md:col-span-2 bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700">Agregar al Calendario</button>
                    </div>
                </div>
                <div id="lista-calendario" class="space-y-3"></div>
            </section>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124288",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Al iniciar
        window.onload = () => {
            cargarCursos();
            cargarNoticias();
            cargarCalendario();
        };

        async function cargarCursos() {
            const snap = await db.collection('cursos').get();
            const cursos = snap.docs.map(doc => doc.data().nombre).sort();
            
            const renderCursos = (containerId, prefix) => {
                const cont = document.getElementById(containerId);
                cont.innerHTML = `
                    <label class="border px-3 py-1.5 rounded-xl text-[10px] font-black cursor-pointer hover:bg-white flex items-center gap-1">
                        <input type="checkbox" onchange="document.querySelectorAll('.check-${prefix}').forEach(c=>c.checked=this.checked)"> TODOS
                    </label>
                `;
                cursos.forEach(c => {
                    cont.innerHTML += `
                        <label class="border px-3 py-1.5 rounded-xl text-[10px] font-black cursor-pointer hover:bg-white flex items-center gap-1">
                            <input type="checkbox" class="check-${prefix}" value="${c}"> ${c}
                        </label>
                    `;
                });
            };

            renderCursos('cursos-noticia', 'not');
            renderCursos('cursos-calendario', 'cal');
        }

        async function guardarNoticia() {
            const titulo = document.getElementById('not-titulo').value;
            const texto = document.getElementById('not-texto').value;
            const seleccionados = Array.from(document.querySelectorAll('.check-not:checked')).map(cb => cb.value);
            const fechaProg = document.getElementById('not-programar').value;

            if (!titulo || seleccionados.length === 0) return alert("Falta título o destinatarios.");

            const data = {
                titulo, texto,
                curso: seleccionados,
                fechaCreacion: new Date().toISOString(),
                // Si no hay fecha programada, usa la actual
                fechaPublicacion: fechaProg ? new Date(fechaProg).toISOString() : new Date().toISOString(),
                adjuntos: {
                    img: document.getElementById('not-img').value,
                    video: document.getElementById('not-video').value,
                    pdf: document.getElementById('not-pdf').value
                }
            };

            await db.collection('comunicados').add(data);
            alert("Enviado correctamente.");
            location.reload();
        }

        async function guardarCalendario() {
            const titulo = document.getElementById('cal-titulo').value;
            const fecha = document.getElementById('cal-fecha').value;
            const seleccionados = Array.from(document.querySelectorAll('.check-cal:checked')).map(cb => cb.value);

            if (!titulo || !fecha || seleccionados.length === 0) return alert("Completa todos los campos.");

            await db.collection('eventos').add({
                titulo, fecha,
                tipo: document.getElementById('cal-tipo').value,
                tag: seleccionados
            });
            location.reload();
        }

        // --- Funciones de Carga de Listas y Tabs ---
        async function cargarNoticias() {
            const snap = await db.collection('comunicados').orderBy('fechaCreacion', 'desc').limit(10).get();
            const cont = document.getElementById('lista-noticias');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const n = doc.data();
                cont.innerHTML += `<div class="bg-white p-4 rounded-2xl border text-sm">
                    <div class="flex justify-between font-bold"><span>${n.titulo}</span><button onclick="eliminar('comunicados','${doc.id}')" class="text-rose-400"><i class="fas fa-trash"></i></button></div>
                    <div class="text-[10px] text-slate-400">Para: ${n.curso.join(', ')}</div>
                </div>`;
            });
        }

        async function cargarCalendario() {
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            const cont = document.getElementById('lista-calendario');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                cont.innerHTML += `<div class="bg-white p-3 rounded-xl border flex justify-between items-center text-xs">
                    <div><b>${e.fecha}</b> - ${e.titulo} <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded ml-2">${e.tag.join(', ')}</span></div>
                    <button onclick="eliminar('eventos','${doc.id}')" class="text-slate-300"><i class="fas fa-trash"></i></button>
                </div>`;
            });
        }

        async function eliminar(col, id) {
            if(confirm("¿Eliminar?")) { await db.collection(col).doc(id).delete(); location.reload(); }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('bg-blue-50', 'text-slate-500'));
            document.getElementById('navbtn-' + id).classList.replace('text-slate-500', 'bg-blue-50');
        }
    </script>
</body>
</html>
