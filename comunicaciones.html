<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunicaciones - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; padding-bottom: 40px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .input-pro { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; outline: none; width: 100%; transition: all 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        /* Estilos Seguridad */
        #login-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chip-active { background-color: #dbeafe; border-color: #2563eb; color: #1e40af; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Comunicaciones</h1>
            <p class="text-slate-400 font-bold mt-1 uppercase text-[10px] tracking-[0.3em] mb-8">Acceso de Personal</p>
            
            <div class="space-y-4">
                <input type="email" id="log-email" placeholder="Usuario / Email" class="input-pro">
                <input type="password" id="log-pass" placeholder="Contraseña" class="input-pro">
                <button onclick="validarIngreso()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black transition shadow-lg">Ingresar al Panel</button>
            </div>
        </div>
    </div>

    <div id="comunicaciones-content" class="hidden">
        <nav class="bg-white border-b p-4 flex gap-4 sticky top-0 z-50 shadow-sm overflow-x-auto">
            <button onclick="switchTab('noticias')" class="nav-btn font-bold px-4 py-2 rounded-xl bg-blue-50 text-blue-600 whitespace-nowrap">
                <i class="fas fa-bullhorn mr-2"></i>Noticias y Avisos
            </button>
            <button onclick="switchTab('calendario')" class="nav-btn font-bold px-4 py-2 rounded-xl text-slate-500 whitespace-nowrap">
                <i class="fas fa-calendar-star mr-2"></i>Calendario Escolar
            </button>
            <button onclick="cerrarSesion()" class="ml-auto text-rose-500 font-bold px-4 py-2 hover:bg-rose-50 rounded-xl transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </nav>

        <main class="p-4 max-w-5xl mx-auto">
            <section id="tab-noticias" class="tab-content active space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 id="noticia-form-title" class="font-black text-xl mb-4 text-slate-800">Nueva Publicación</h2>
                    <input type="hidden" id="noticia-id">
                    
                    <div class="grid grid-cols-1 gap-4">
                        <input type="text" id="not-titulo" placeholder="Asunto o Título de la noticia" class="input-pro">
                        <textarea id="not-texto" placeholder="Escribe el cuerpo del mensaje..." class="input-pro h-32"></textarea>
                        
                        <div class="bg-slate-50 p-4 rounded-2xl grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Programar Fecha y Hora</label>
                                <input type="datetime-local" id="not-programacion" class="input-pro">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Cursos Destinatarios</label>
                                <div id="cursos-noticia" class="flex flex-wrap gap-2 mt-1"></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="not-img" placeholder="URL de Imagen" class="input-pro">
                            <input type="text" id="not-video" placeholder="URL de Video" class="input-pro">
                            <input type="text" id="not-pdf" placeholder="URL de Documento PDF" class="input-pro">
                            <input type="text" id="not-link" placeholder="Enlace Externo" class="input-pro">
                        </div>

                        <div class="flex gap-2">
                            <button onclick="guardarNoticia()" id="btn-noticia" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Publicar Ahora</button>
                            <button onclick="resetFormNoticia()" id="btn-cancel-noticia" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">Cancelar</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="font-black text-lg text-slate-800 ml-2">Historial de Publicaciones</h3>
                    <div id="lista-noticias" class="space-y-4"></div>
                </div>
            </section>

            <section id="tab-calendario" class="tab-content space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 id="cal-form-title" class="font-black text-xl mb-4 text-slate-800">Agendar al Calendario</h2>
                    <input type="hidden" id="cal-id">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <input type="text" id="cal-titulo" placeholder="Título del evento" class="input-pro">
                        </div>
                        <textarea id="cal-desc" placeholder="Breve descripción..." class="input-pro md:col-span-2 h-20"></textarea>
                        <input type="date" id="cal-fecha" class="input-pro">
                        <select id="cal-tipo" class="input-pro">
                            <option value="evento">Evento General</option>
                            <option value="examen">Examen / Entrega</option>
                            <option value="feriado">Feriado / Sin Actividad</option>
                        </select>
                        
                        <div class="md:col-span-2">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Visible para:</label>
                            <div id="cursos-calendario" class="flex flex-wrap gap-2 mt-1"></div>
                        </div>

                        <div class="md:col-span-2 flex gap-2">
                            <button onclick="guardarCalendario()" id="btn-cal" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700">Guardar Evento</button>
                            <button onclick="resetFormCalendario()" id="btn-cancel-cal" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">X</button>
                        </div>
                    </div>
                </div>

                <div id="lista-calendario" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", 
            authDomain: "app-iosefcaro.firebaseapp.com", 
            projectId: "app-iosefcaro", 
            storageBucket: "app-iosefcaro.firebasestorage.app", 
            messagingSenderId: "651320124248", 
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- SEGURIDAD ---
        async function validarIngreso() {
            const email = document.getElementById('log-email').value.toLowerCase().trim();
            const pass = document.getElementById('log-pass').value;

            // 1. Acceso Directo Uriel
            if(email === "uriel.bacher@gmail.com" && pass === "Gallardo10") {
                autorizar("admin");
                return;
            }

            // 2. Acceso vía Staff (Firebase)
            try {
                const doc = await db.collection('usuarios').doc(email).get();
                if(doc.exists) {
                    const u = doc.data();
                    if(u.pass === pass && (u.rol === 'admin' || u.rol === 'comunicacion')) {
                        autorizar(u.rol);
                        return;
                    }
                }
                alert("Credenciales incorrectas o sin permisos para Comunicación.");
            } catch(e) {
                alert("Error de conexión");
            }
        }

        function autorizar(rol) {
            sessionStorage.setItem('iosef_session', rol);
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('comunicaciones-content').classList.remove('hidden');
            inicializarApp();
        }

        window.onload = () => {
            if(sessionStorage.getItem('iosef_session')) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('comunicaciones-content').classList.remove('hidden');
                inicializarApp();
            }
        };

        function cerrarSesion() {
            sessionStorage.clear();
            location.reload();
        }

        function inicializarApp() {
            cargarCursos();
            cargarNoticias();
            cargarEventosCalendario();
        }

        // --- LÓGICA DE NEGOCIO (Tus funciones originales) ---
        async function cargarCursos() {
            const snap = await db.collection('alumnos').get();
            const cursos = [...new Set(snap.docs.map(d => d.data().curso))].sort();
            const contNot = document.getElementById('cursos-noticia');
            const contCal = document.getElementById('cursos-calendario');
            [contNot, contCal].forEach(cont => {
                cont.innerHTML = `<label class="border px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer hover:bg-slate-50"><input type="checkbox" onchange="toggleTodos(this, '${cont.id}')"> TODOS</label>`;
                cursos.forEach(c => {
                    cont.innerHTML += `<label class="border px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer hover:bg-slate-50"><input type="checkbox" class="check-${cont.id}" value="${c}"> ${c}</label>`;
                });
            });
        }

        function toggleTodos(source, contId) {
            document.querySelectorAll(`.check-${contId}`).forEach(cb => cb.checked = source.checked);
        }

        async function guardarNoticia() {
            const id = document.getElementById('noticia-id').value;
            const titulo = document.getElementById('not-titulo').value;
            const texto = document.getElementById('not-texto').value;
            const fechaProg = document.getElementById('not-programacion').value;
            const seleccionados = Array.from(document.querySelectorAll('.check-cursos-noticia:checked')).map(c => c.value);

            if(!titulo || !texto || seleccionados.length === 0) return alert("Completa Título, Mensaje y Cursos");

            const data = {
                titulo, texto, curso: seleccionados,
                programacion: fechaProg || new Date().toISOString(),
                adjuntos: {
                    img: document.getElementById('not-img').value,
                    video: document.getElementById('not-video').value,
                    pdf: document.getElementById('not-pdf').value,
                    link: document.getElementById('not-link').value
                },
                fechaCreacion: new Date().toISOString()
            };

            if(id) await db.collection('comunicados').doc(id).update(data);
            else await db.collection('comunicados').add(data);
            location.reload();
        }

        async function cargarNoticias() {
            const snap = await db.collection('comunicados').orderBy('fechaCreacion', 'desc').get();
            const cont = document.getElementById('lista-noticias');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const n = doc.data();
                cont.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border shadow-sm relative">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-lg uppercase">PARA: ${n.curso.join(", ")}</span>
                            <div class="flex gap-2">
                                <button onclick="editarNoticia('${doc.id}')" class="text-slate-400 hover:text-blue-500"><i class="fas fa-edit"></i></button>
                                <button onclick="eliminarDoc('comunicados', '${doc.id}')" class="text-slate-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <h4 class="font-bold text-slate-800">${n.titulo}</h4>
                        <p class="text-sm text-slate-500 line-clamp-2 mt-1">${n.texto}</p>
                    </div>`;
            });
        }

        async function editarNoticia(id) {
            const doc = await db.collection('comunicados').doc(id).get();
            const n = doc.data();
            document.getElementById('noticia-id').value = id;
            document.getElementById('not-titulo').value = n.titulo;
            document.getElementById('not-texto').value = n.texto;
            document.getElementById('not-programacion').value = n.programacion.substring(0,16);
            document.getElementById('noticia-form-title').innerText = "Editando Publicación";
            document.getElementById('btn-cancel-noticia').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        async function guardarCalendario() {
            const id = document.getElementById('cal-id').value;
            const seleccionados = Array.from(document.querySelectorAll('.check-cursos-calendario:checked')).map(c => c.value);
            const data = {
                titulo: document.getElementById('cal-titulo').value,
                descripcion: document.getElementById('cal-desc').value,
                fecha: document.getElementById('cal-fecha').value,
                tipo: document.getElementById('cal-tipo').value,
                tag: seleccionados
            };
            if(id) await db.collection('eventos').doc(id).update(data);
            else await db.collection('eventos').add(data);
            location.reload();
        }

        async function cargarEventosCalendario() {
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            const cont = document.getElementById('lista-calendario');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const e = doc.data();
                cont.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border flex items-center gap-4">
                        <div class="bg-slate-50 w-12 h-12 rounded-xl flex items-center justify-center text-xl text-slate-400">
                            <i class="fas fa-calendar"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-[10px] font-black uppercase text-slate-400">${e.fecha} • ${e.tag?.join(", ") || 'General'}</p>
                            <h4 class="font-bold text-slate-800">${e.titulo}</h4>
                        </div>
                        <button onclick="eliminarDoc('eventos', '${doc.id}')" class="text-rose-300"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-'+tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-blue-50', 'text-blue-600'); b.classList.add('text-slate-500');
            });
            event.currentTarget.classList.add('bg-blue-50', 'text-blue-600');
        }

        async function eliminarDoc(col, id) {
            if(confirm("¿Eliminar registro?")) { await db.collection(col).doc(id).delete(); location.reload(); }
        }

        function resetFormNoticia() { location.reload(); }
        function resetFormCalendario() { location.reload(); }
    </script>
</body>
</html>
