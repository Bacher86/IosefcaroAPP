<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Institucional - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .card-btn { 
            background: white; 
            border-radius: 2.5rem; 
            padding: 2.5rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f5f9;
        }
        .card-btn:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: #e2e8f0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <header class="text-center mb-12">
        <div class="w-20 h-20 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl">
            <i class="fas fa-school"></i>
        </div>
        <h1 class="text-4xl font-black text-slate-800 tracking-tighter">Plataforma Académica</h1>
        <p class="text-slate-400 font-bold mt-2 uppercase text-[10px] tracking-[0.3em]">Seleccione su perfil de acceso</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">
        
        <a href="admin.html" class="card-btn group text-center">
            <div class="w-16 h-16 bg-slate-50 text-slate-400 group-hover:bg-slate-900 group-hover:text-white rounded-2xl flex items-center justify-center text-2xl mx-auto mb-6 transition-colors">
                <i class="fas fa-user-shield"></i>
            </div>
            <h3 class="font-black text-slate-800 text-xl tracking-tight">Administración</h3>
            <p class="text-slate-400 text-xs font-bold mt-2 leading-relaxed">Gestión de usuarios, cursos y comunicados generales.</p>
        </a>

        <a href="docente.html" class="card-btn group text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-400 group-hover:bg-blue-600 group-hover:text-white rounded-2xl flex items-center justify-center text-2xl mx-auto mb-6 transition-colors">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <h3 class="font-black text-slate-800 text-xl tracking-tight">Panel Docente</h3>
            <p class="text-slate-400 text-xs font-bold mt-2 leading-relaxed">Carga de calificaciones, asistencia y muro de curso.</p>
        </a>

        <a href="familia.html" class="card-btn group text-center">
            <div class="w-16 h-16 bg-pink-50 text-pink-400 group-hover:bg-pink-500 group-hover:text-white rounded-2xl flex items-center justify-center text-2xl mx-auto mb-6 transition-colors">
                <i class="fas fa-heart"></i>
            </div>
            <h3 class="font-black text-slate-800 text-xl tracking-tight">Comunidad Familia</h3>
            <p class="text-slate-400 text-xs font-bold mt-2 leading-relaxed">Seguimiento académico, agenda y chat con IOSI.</p>
        </a>

    </div>

    <footer class="mt-16">
        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">© 2026 Sistema de Gestión Educativa</p>
    </footer>

</body>
</html>
