<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Docente - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #2563eb; background: #eff6ff; border-radius: 1rem; }
        .input-nota { width: 100%; height: 50px; text-align: center; border-radius: 1rem; border: 2px solid #f1f5f9; font-weight: 800; outline: none; transition: all 0.2s; }
        .input-nota:focus { border-color: #2563eb; background: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1); }
        .badge-rite { padding: 12px; border-radius: 0.8rem; font-size: 12px; font-weight: 800; flex: 1; text-align: center; border: 2px solid transparent; transition: all 0.2s; cursor: pointer; }
        .avg-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center text-white text-2xl shadow-xl"><i class="fas fa-apple-alt"></i></div>
        <h2 class="text-2xl font-black mb-6">Panel Docente</h2>
        <input type="email" id="login-email" class="w-full max-w-xs p-4 bg-slate-100 rounded-2xl mb-4 font-bold outline-none" placeholder="profe@gmail.com">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Entrar</button>
    </div>

    <header class="p-6 bg-white border-b sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 id="doc-nom" class="font-black text-lg leading-none text-slate-800">Hola, Profe</h1>
            <select id="select-curso" onchange="cargarAlumnos()" class="text-[11px] font-bold text-blue-600 uppercase border-none bg-transparent outline-none cursor-pointer"></select>
        </div>
        <input type="date" id="fecha-hoy" class="bg-slate-100 p-2 rounded-lg text-[10px] font-bold outline-none border-none">
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <section id="tab-notas" class="tab-content active">
            <div class="grid grid-cols-2 gap-2 mb-6">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Materia</label>
                    <select id="select-materia" onchange="cargarAlumnos()" class="w-full p-3 bg-white rounded-xl border shadow-sm font-bold mt-1 outline-none text-xs">
                        <option value="">Cargando materias...</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Modalidad</label>
                    <select id="select-modalidad" onchange="cargarAlumnos()" class="w-full p-3 bg-white rounded-xl border shadow-sm font-bold mt-1 outline-none text-xs text-blue-600">
                        <option value="NUMERICO">📊 Numérico</option>
                        <option value="RITE">📝 RITE</option>
                    </select>
                </div>
            </div>

            <div id="panel-masivo" class="bg-blue-50/50 p-5 rounded-[2rem] mb-6 border-2 border-dashed border-blue-200">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs"><i class="fas fa-bolt"></i></div>
                    <h4 class="text-[11px] font-black text-blue-900 uppercase tracking-wider">Carga Masiva de Informes</h4>
                </div>
                <textarea id="texto-comun" class="w-full p-3 bg-white rounded-xl text-xs border-none shadow-sm outline-none mb-3" placeholder="Escribí el informe común para todos..."></textarea>
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-bold text-slate-500 flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check-sobrescribir" class="w-4 h-4 accent-blue-600"> Sobrescribir cargados
                    </label>
                    <button onclick="aplicarTextoMasivo()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Replicar</button>
                </div>
            </div>

            <div id="lista-notas" class="space-y-4"></div>
        </section>

        <section id="tab-asis" class="tab-content">
            <h3 class="font-black text-xl mb-4 text-slate-800">Pasar Lista</h3>
            <div id="lista-asis" class="space-y-2"></div>
        </section>
    </main>

    <div id="modal-hito" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[3000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="font-black text-xl mb-2 text-slate-800 text-center">Registrar Hito</h3>
            <p id="hito-alumno-nom" class="text-blue-600 font-bold text-xs uppercase mb-6 text-center"></p>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="seleccionarHito('Logro', this)" class="btn-hito p-3 rounded-2xl bg-slate-50 border-2 border-transparent text-[10px] font-black uppercase">🌟 Logro</button>
                <button onclick="seleccionarHito('Obs', this)" class="btn-hito p-3 rounded-2xl bg-slate-50 border-2 border-transparent text-[10px] font-black uppercase">👀 Obs</button>
                <button onclick="seleccionarHito('Sancion', this)" class="btn-hito p-3 rounded-2xl bg-slate-50 border-2 border-transparent text-[10px] font-black uppercase">⚠️ Sanción</button>
            </div>
            <div id="box-sancion" class="hidden mb-4">
                <select id="select-sancion" class="w-full p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none">
                    <option value="Apercibimiento">Apercibimiento</option>
                    <option value="Amonestación">Amonestación</option>
                    <option value="Acta de Compromiso">Acta de Compromiso</option>
                </select>
            </div>
            <textarea id="hito-desc" class="w-full p-4 bg-slate-100 rounded-2xl text-xs min-h-[100px] outline-none mb-6" placeholder="Detalle del evento..."></textarea>
            <div class="flex gap-2">
                <button onclick="cerrarHito()" class="flex-1 p-4 rounded-2xl font-bold text-slate-400">Cancelar</button>
                <button onclick="guardarHitoFirebase()" class="flex-1 p-4 bg-slate-900 text-white rounded-2xl font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-4 right-4 bg-white/80 backdrop-blur-md border shadow-2xl rounded-[2rem] mb-4 flex justify-around p-2 z-[1000]">
        <button onclick="switchTab('notas')" id="btn-notas" class="nav-btn active flex-1 py-3 flex flex-col items-center gap-1 font-bold text-[9px]">
            <i class="fas fa-star text-lg"></i>NOTAS
        </button>
        <button onclick="switchTab('asis')" id="btn-asis" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 font-bold text-[9px]">
            <i class="fas fa-list-check text-lg"></i>ASISTENCIA
        </button>
    </nav>

    <div id="pdf-template" style="display:none; padding: 40px; color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif;">
        <div style="text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 15px; margin-bottom: 20px;">
            <h1 style="margin: 0; font-size: 22px; font-weight: 800; color:#1e293b">INSTITUTO IOSEF CARO</h1>
            <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color:#64748b">Informe Académico</p>
        </div>
        <div style="margin-bottom: 20px; font-size: 12px; display:flex; justify-content:space-between">
            <div>
                <p><strong>Alumno:</strong> <span id="pdf-nombre" style="color:#2563eb"></span></p>
                <p><strong>Curso:</strong> <span id="pdf-curso"></span></p>
            </div>
            <div style="text-align:right">
                <p><strong>Fecha:</strong> <span id="pdf-fecha"></span></p>
            </div>
        </div>
        <table style="width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden;">
            <thead><tr style="background: #3b82f6; color: white;"><th style="padding: 12px; text-align:left;">Materia</th><th style="padding: 12px; text-align:center;">Calif.</th><th style="padding: 12px; text-align:left;">Observaciones</th></tr></thead>
            <tbody id="pdf-body"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", authDomain: "app-iosefcaro.firebaseapp.com", projectId: "app-iosefcaro", storageBucket: "app-iosefcaro.firebasestorage.app", messagingSenderId: "651320124248", appId: "1:651320124248:web:97c8ca00e29114e1983b2d" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let docenteData = null;
        let hitoSeleccionado = { id: '', nombre: '', tipo: '' };

        document.getElementById('fecha-hoy').valueAsDate = new Date();

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();
            if (doc.exists && doc.data().rol === 'docente') {
                docenteData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('doc-nom').innerText = `Hola, ${docenteData.nombre.split(' ')[0]}`;
                
                // 1. Cargamos Cursos del Docente
                const selectC = document.getElementById('select-curso');
                selectC.innerHTML = docenteData.cursos.map(c => `<option value="${c}">${c}</option>`).join('');

                // 2. Cargamos Materias dinámicas desde la colección del Admin
                await cargarMateriasDinamicas();
                
                // 3. Cargamos los alumnos por primera vez
                cargarAlumnos();
            } else { alert("Acceso denegado o usuario no encontrado."); }
        }

        async function cargarMateriasDinamicas() {
            const selectM = document.getElementById('select-materia');
            const snap = await db.collection('materias').orderBy('nombre').get();
            if(!snap.empty) {
                selectM.innerHTML = snap.docs.map(doc => {
                    const m = doc.data();
                    return `<option value="${m.nombre}">${m.nombre}</option>`;
                }).join('');
            } else {
                selectM.innerHTML = `<option value="">Sin materias cargadas</option>`;
            }
        }

        async function cargarAlumnos() {
            const curso = document.getElementById('select-curso').value;
            const materia = document.getElementById('select-materia').value;
            const modalidad = document.getElementById('select-modalidad').value;
            if(!materia) return;

            const snap = await db.collection('alumnos').where('curso', '==', curso).get();
            const containerNotas = document.getElementById('lista-notas');
            const containerAsis = document.getElementById('lista-asis');
            
            containerNotas.innerHTML = "<p class='text-center text-xs p-4'>Buscando...</p>";
            containerAsis.innerHTML = "";

            const promesas = snap.docs.map(async (docAl) => {
                const al = docAl.data();
                const id = docAl.id;
                const notaDoc = await db.collection('alumnos').doc(id).collection('notas').doc(materia).get();
                const n = notaDoc.exists ? notaDoc.data() : {};
                return { id, al, n };
            });

            const resultados = await Promise.all(promesas);
            containerNotas.innerHTML = "";

            resultados.forEach(({id, al, n}) => {
                let inputHtml = "";
                if(modalidad === "NUMERICO") {
                    const v1 = parseFloat(n.n1) || 0; const v2 = parseFloat(n.n2) || 0; const v3 = parseFloat(n.n3) || 0;
                    const c = [v1,v2,v3].filter(v => v > 0);
                    const prom = c.length > 0 ? (c.reduce((a,b)=>a+b,0)/c.length).toFixed(1) : '-';
                    
                    inputHtml = `<div class="grid grid-cols-4 gap-2">
                        <input type="number" value="${n.n1||''}" oninput="calcProm(this)" onchange="guardarNota('${id}','n1',this.value)" class="input-nota n1" placeholder="1B">
                        <input type="number" value="${n.n2||''}" oninput="calcProm(this)" onchange="guardarNota('${id}','n2',this.value)" class="input-nota n2" placeholder="2B">
                        <input type="number" value="${n.n3||''}" oninput="calcProm(this)" onchange="guardarNota('${id}','n3',this.value)" class="input-nota n3" placeholder="3B">
                        <div class="bg-violet-50 rounded-2xl flex flex-col items-center justify-center border-2 border-violet-100 avg-badge">
                            <span class="text-[7px] font-black text-violet-400 uppercase">PROM</span>
                            <span class="text-violet-600 font-black text-sm val-prom">${prom}</span>
                        </div>
                    </div>`;
                } else {
                    inputHtml = `<div class="flex gap-2">
                        ${['TEA','TEP','TED'].map(t => `<button onclick="guardarNota('${id}','rite','${t}',this)" class="badge-rite ${n.rite === t ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}">${t}</button>`).join('')}
                    </div>`;
                }

                containerNotas.innerHTML += `
                    <div class="bg-white p-5 rounded-[2.5rem] border shadow-sm mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <div><h4 class="font-bold text-sm text-slate-800">${al.nombre}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${id}</p></div>
                            <div class="flex gap-3">
                                <button onclick="abrirHito('${id}','${al.nombre}')" class="text-amber-500 text-[9px] font-black uppercase"><i class="fas fa-bolt mr-1"></i>Hito</button>
                                <button onclick="descargarPDF('${id}','${al.nombre}')" class="text-blue-500 text-[9px] font-black uppercase"><i class="fas fa-file-pdf mr-1"></i>PDF</button>
                            </div>
                        </div>
                        ${inputHtml}
                        <textarea onchange="guardarNota('${id}','obs',this.value)" class="w-full mt-3 p-4 bg-slate-50 rounded-2xl text-[11px] outline-none informe-individual" placeholder="Informe individual...">${n.obs || ''}</textarea>
                    </div>`;

                containerAsis.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center border shadow-sm mb-2">
                        <span class="text-xs font-bold text-slate-700">${al.nombre}</span>
                        <div class="flex gap-2">
                            <button onclick="marcarAsis('${id}','P',this)" class="w-10 h-10 rounded-xl bg-slate-100 text-slate-400 font-bold text-xs">P</button>
                            <button onclick="marcarAsis('${id}','A',this)" class="w-10 h-10 rounded-xl bg-slate-100 text-slate-400 font-bold text-xs">A</button>
                        </div>
                    </div>`;
            });
        }

        async function guardarNota(id, campo, val, btn = null) {
            const mat = document.getElementById('select-materia').value;
            if(campo === 'rite' && btn) {
                btn.parentElement.querySelectorAll('button').forEach(b => b.className = "badge-rite bg-slate-100 text-slate-400");
                btn.className = "badge-rite bg-blue-600 text-white shadow-lg";
            }
            await db.collection('alumnos').doc(id).collection('notas').doc(mat).set({
                [campo]: val, materia: mat, fechaUpdate: new Date().toLocaleDateString()
            }, { merge: true });
        }

        async function marcarAsis(id, tipo, btn) {
            const fecha = document.getElementById('fecha-hoy').value;
            const mat = document.getElementById('select-materia').value;
            await db.collection('asistencia').add({ alumnoId: id, estado: tipo, fecha, materia: mat, timestamp: new Date() });
            btn.parentElement.querySelectorAll('button').forEach(b => b.className = "w-10 h-10 rounded-xl bg-slate-100 text-slate-400 font-bold text-xs");
            btn.className = `w-10 h-10 rounded-xl ${tipo === 'P' ? 'bg-emerald-500' : 'bg-rose-500'} text-white font-bold text-xs shadow-md scale-105 transition-all`;
        }

        function calcProm(el) {
            const card = el.closest('div.grid');
            const n1 = parseFloat(card.querySelector('.n1').value) || 0;
            const n2 = parseFloat(card.querySelector('.n2').value) || 0;
            const n3 = parseFloat(card.querySelector('.n3').value) || 0;
            const vals = [n1,n2,n3].filter(v => v > 0);
            const prom = vals.length > 0 ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '-';
            card.querySelector('.val-prom').innerText = prom;
        }

        function aplicarTextoMasivo() {
            const txt = document.getElementById('texto-comun').value;
            const obsr = document.getElementById('check-sobrescribir').checked;
            if(!txt) return alert("Escribí algo primero.");
            document.querySelectorAll('.informe-individual').forEach(ta => {
                if(obsr || ta.value.trim() === "") {
                    ta.value = txt;
                    ta.dispatchEvent(new Event('change'));
                }
            });
        }

        function abrirHito(id, nombre) {
            hitoSeleccionado = { id, nombre, tipo: '' };
            document.getElementById('hito-alumno-nom').innerText = nombre;
            document.getElementById('modal-hito').classList.remove('hidden');
        }

        function seleccionarHito(tipo, btn) {
            hitoSeleccionado.tipo = tipo;
            document.querySelectorAll('.btn-hito').forEach(b => b.classList.remove('border-blue-600', 'bg-blue-50'));
            btn.classList.add('border-blue-600', 'bg-blue-50');
            document.getElementById('box-sancion').classList.toggle('hidden', tipo !== 'Sancion');
        }

        async function guardarHitoFirebase() {
            const desc = document.getElementById('hito-desc').value;
            if(!hitoSeleccionado.tipo || !desc) return alert("Completa todos los campos");
            await db.collection('alumnos').doc(hitoSeleccionado.id).collection('convivencia').add({
                tipo: hitoSeleccionado.tipo,
                descripcion: desc,
                subtipo: hitoSeleccionado.tipo === 'Sancion' ? document.getElementById('select-sancion').value : '',
                fecha: new Date().toLocaleDateString(),
                docente: docenteData.nombre
            });
            cerrarHito();
            alert("Hito registrado con éxito");
        }

        function cerrarHito() { 
            document.getElementById('modal-hito').classList.add('hidden'); 
            document.getElementById('hito-desc').value = "";
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        async function descargarPDF(id, nombre) {
            const curso = document.getElementById('select-curso').value;
            const snap = await db.collection('alumnos').doc(id).collection('notas').get();
            document.getElementById('pdf-nombre').innerText = nombre;
            document.getElementById('pdf-curso').innerText = curso;
            document.getElementById('pdf-fecha').innerText = new Date().toLocaleDateString();
            
            const body = document.getElementById('pdf-body');
            body.innerHTML = "";
            
            if(snap.empty) return alert("No hay notas registradas para este alumno.");

            snap.forEach(doc => {
                const n = doc.data();
                const calif = n.rite || (n.n1 ? `1B:${n.n1} 2B:${n.n2||'-'} 3B:${n.n3||'-'}` : '-');
                body.innerHTML += `
                    <tr>
                        <td style="border-bottom:1px solid #f1f5f9; padding:10px; font-size:11px; font-weight:700;">${n.materia}</td>
                        <td style="border-bottom:1px solid #f1f5f9; padding:10px; text-align:center; font-size:11px; font-weight:800; color:#2563eb;">${calif}</td>
                        <td style="border-bottom:1px solid #f1f5f9; padding:10px; font-size:10px; color:#64748b;">${n.obs||'-'}</td>
                    </tr>`;
            });

            const element = document.getElementById('pdf-template');
            element.style.display = 'block';
            const opt = { margin: 0.5, filename: `Informe_${nombre}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save().then(() => element.style.display = 'none');
        }
    </script>
</body>
</html>
