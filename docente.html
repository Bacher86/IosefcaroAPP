<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Docente - Iosef Caro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
*{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;padding-bottom:120px}
.tab-content{display:none}
.tab-content.active{display:block}
.nav-btn.active{color:#2563eb;background:#eff6ff;border-radius:1rem}
.input-pro{border:1px solid #e2e8f0;border-radius:1rem;padding:.75rem;outline:none;width:100%;transition:all .2s;font-size:14px;background:white}
.input-pro:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
</style>
</head>
<body>

<div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center p-6">
  <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
    <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-6"><i class="fas fa-chalkboard-teacher"></i></div>
    <h1 class="text-3xl font-black tracking-tighter">Panel Docente</h1>
    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1 mb-8">Iosef Caro</p>
    <div class="space-y-4">
      <input type="email" id="log-email" placeholder="Email institucional" class="input-pro">
      <input type="password" id="log-pass" placeholder="Contraseña" class="input-pro">
      <button onclick="loginDocente()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition">ACCEDER</button>
    </div>
    <p id="login-err" class="text-rose-500 text-xs font-bold mt-4 hidden"></p>
  </div>
</div>

<div id="app-content" class="hidden">
  <header class="bg-white border-b px-4 py-3 sticky top-0 z-50 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-lg"><i class="fas fa-graduation-cap"></i></div>
      <div>
        <h2 id="docente-nombre-ui" class="font-black text-sm text-slate-800 leading-none">Cargando...</h2>
        <span class="text-[10px] text-slate-400 font-bold uppercase">Docente</span>
      </div>
    </div>
    <button onclick="location.reload()" class="bg-rose-50 text-rose-500 p-2.5 rounded-xl hover:bg-rose-100 transition"><i class="fas fa-power-off"></i></button>
  </header>

  <main class="max-w-4xl mx-auto p-4 space-y-6">

    <section id="tab-academico" class="tab-content active space-y-4">
      <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
        <h3 class="font-black text-xl text-slate-800">Carga de Calificaciones</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Curso / División</label>
            <select id="aca-curso" onchange="actualizarMateriasDocente(); resetPlanillaNotas();" class="input-pro mt-1">
              <option value="">Selecciona Curso</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Materia</label>
            <select id="aca-materia" onchange="cargarAlumnosNotas()" class="input-pro mt-1">
              <option value="">Selecciona Materia</option>
            </select>
          </div>
        </div>
      </div>

      <div id="planilla-notas-card" class="bg-white p-6 rounded-3xl border shadow-sm hidden space-y-4">
        <div class="flex justify-between items-center flex-wrap gap-2">
          <h4 class="font-black text-lg text-slate-800">Planilla de Notas</h4>
          <span id="modalidad-nota-badge" class="bg-blue-50 text-blue-700 text-[10px] font-black uppercase px-3 py-1 rounded-full"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b text-slate-400 text-[10px] uppercase font-black">
                <th class="py-3">Alumno</th>
                <th class="py-3 px-2">Nota Actual / RITE</th>
                <th class="py-3 px-2">Modificar Nota</th>
              </tr>
            </thead>
            <tbody id="tabla-carga-notas" class="divide-y text-sm"></tbody>
          </table>
        </div>
        <button onclick="guardarNotasPlanilla()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Guardar Calificaciones</button>
      </div>
    </section>

    <section id="tab-asistencia" class="tab-content space-y-4">
      <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
        <h3 class="font-black text-xl text-slate-800">Control de Inasistencias</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Fecha</label>
            <input type="date" id="asis-fecha" class="input-pro mt-1">
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Curso</label>
            <select id="asis-curso" onchange="actualizarMateriasAsistencia(); resetPlanillaAsistencia();" class="input-pro mt-1">
              <option value="">Selecciona Curso</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Materia</label>
            <select id="asis-materia" onchange="cargarPlanillaAsistencia()" class="input-pro mt-1">
              <option value="">Selecciona Materia</option>
            </select>
          </div>
        </div>
      </div>

      <div id="planilla-asistencia-card" class="bg-white p-6 rounded-3xl border shadow-sm hidden space-y-4">
        <div class="flex justify-between items-center">
          <h4 class="font-black text-lg text-slate-800">Registro de Alumnos</h4>
          <span class="text-xs text-slate-400 font-bold">Inasistencias Acumuladas</span>
        </div>
        <div class="divide-y" id="lista-planilla-asistencia"></div>
        <button onclick="guardarAsistencia()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition">Guardar Registro de Asistencia</button>
      </div>
    </section>

    <section id="tab-evaluaciones" class="tab-content space-y-4">
      <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
        <h3 id="form-eva-title" class="font-black text-xl text-slate-800">Agendar Evaluación / Prueba</h3>
        <input type="hidden" id="eva-id">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="md:col-span-2">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Título de la Evaluación</label>
            <input type="text" id="eva-titulo" placeholder="Ej: Evaluación Semestral de Álgebra" class="input-pro mt-1">
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Fecha de Prueba</label>
            <input type="date" id="eva-fecha" class="input-pro mt-1">
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Curso</label>
            <select id="eva-curso" onchange="actualizarMateriasEvaluacion()" class="input-pro mt-1">
              <option value="">Selecciona Curso</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Materia</label>
            <select id="eva-materia" class="input-pro mt-1">
              <option value="">Selecciona Materia</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Tipo de Instancia</label>
            <select id="eva-tipo" class="input-pro mt-1">
              <option value="examen">Examen Presencial</option>
              <option value="entrega">Entrega de Trabajo</option>
            </select>
          </div>
          <div class="md:col-span-3">
            <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Descripción o Temario</label>
            <textarea id="eva-desc" placeholder="Temas a evaluar, materiales permitidos..." class="input-pro mt-1 h-20"></textarea>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="guardarEvaluacion()" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-md hover:bg-blue-700 transition">Guardar Evaluación</button>
          <button id="btn-cancelar-eva" onclick="resetFormEvaluacion()" class="hidden bg-slate-100 text-slate-500 px-6 rounded-2xl font-bold">X</button>
        </div>
      </div>

      <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
        <h4 class="font-black text-lg text-slate-800">Evaluaciones Agendadas</h4>
        <div id="lista-evaluaciones-agendadas" class="space-y-3"></div>
      </div>
    </section>

  </main>

  <nav class="fixed bottom-0 inset-x-0 bg-white border-t p-3 flex justify-around items-center z-50">
    <button onclick="switchTab('academico')" id="nav-academico" class="nav-btn active flex-1 py-2 flex flex-col items-center text-slate-400 font-bold text-[10px]">
      <i class="fas fa-star text-lg mb-1"></i>Calificaciones
    </button>
    <button onclick="switchTab('asistencia')" id="nav-asistencia" class="nav-btn flex-1 py-2 flex flex-col items-center text-slate-400 font-bold text-[10px]">
      <i class="fas fa-user-check text-lg mb-1"></i>Asistencia
    </button>
    <button onclick="switchTab('evaluaciones')" id="nav-evaluaciones" class="nav-btn flex-1 py-2 flex flex-col items-center text-slate-400 font-bold text-[10px]">
      <i class="fas fa-calendar-alt text-lg mb-1"></i>Pruebas
    </button>
  </nav>
</div>

<script>
// ═══ CONFIGURACIÓN FIREBASE ═══
const firebaseConfig = {
    apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
    authDomain: "app-iosefcaro.firebaseapp.com",
    projectId: "app-iosefcaro",
    storageBucket: "app-iosefcaro.appspot.com",
    messagingSenderId: "651320124248",
    appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ═══ VARIABLES GLOBALES ═══
let docenteEmail = "";
let docenteNombre = "";
let docenteMaterias = []; // Estructura: [{curso, materia}]

// Configuración inicial de fecha hoy
document.getElementById('asis-fecha').value = new Date().toISOString().substring(0, 10);

// ═══ SISTEMA DE TABS ═══
function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

    document.getElementById(`tab-${tabId}`).classList.add('active');
    document.getElementById(`nav-${tabId}`).classList.add('active');

    if (tabId === 'evaluaciones') cargarEvaluaciones();
}

// ═══ LOGIN Y CONTROL DE ACCESO ═══
async function loginDocente() {
    const email = document.getElementById('log-email').value.trim();
    const pass = document.getElementById('log-pass').value;
    const err = document.getElementById('login-err');

    if (!email || !pass) {
        err.innerText = "Ingresá tus credenciales.";
        err.classList.remove('hidden');
        return;
    }

    try {
        const snap = await db.collection('usuarios')
            .where('email', '==', email.toLowerCase())
            .where('password', '==', pass)
            .get();

        if (snap.empty) {
            err.innerText = "Credenciales incorrectas.";
            err.classList.remove('hidden');
            return;
        }

        let userDoc = null;
        snap.forEach(d => userDoc = d.data());

        if (userDoc.rol !== 'docente') {
            err.innerText = "Este acceso es solo para personal docente.";
            err.classList.remove('hidden');
            return;
        }

        docenteEmail = userDoc.email;
        docenteNombre = userDoc.nombre;
        docenteMaterias = userDoc.materias || [];

        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('docente-nombre-ui').innerText = docenteNombre;

        inicializarSelects();

    } catch (e) {
        console.error(e);
        err.innerText = "Error de conexión al servidor.";
        err.classList.remove('hidden');
    }
}

// Inicializar selectores basados en las materias asignadas al docente
function inicializarSelects() {
    const cursosUnicos = [...new Set(docenteMaterias.map(m => m.curso))].sort();

    const selectAca = document.getElementById('aca-curso');
    const selectAsis = document.getElementById('asis-curso');
    const selectEva = document.getElementById('eva-curso');

    let options = `<option value="">Selecciona Curso</option>`;
    cursosUnicos.forEach(c => {
        options += `<option value="${c}">${c}</option>`;
    });

    selectAca.innerHTML = options;
    selectAsis.innerHTML = options;
    selectEva.innerHTML = options;
}

// Actualizar materias por curso dinámicamente
function actualizarMateriasDocente() {
    const cursoSel = document.getElementById('aca-curso').value;
    const selectMat = document.getElementById('aca-materia');
    
    if (!cursoSel) {
        selectMat.innerHTML = `<option value="">Selecciona Materia</option>`;
        return;
    }

    const filtradas = docenteMaterias.filter(m => m.curso === cursoSel).map(m => m.materia);
    let options = `<option value="">Selecciona Materia</option>`;
    filtradas.forEach(m => {
        options += `<option value="${m}">${m}</option>`;
    });
    selectMat.innerHTML = options;
}

function actualizarMateriasAsistencia() {
    const cursoSel = document.getElementById('asis-curso').value;
    const selectMat = document.getElementById('asis-materia');

    if (!cursoSel) {
        selectMat.innerHTML = `<option value="">Selecciona Materia</option>`;
        return;
    }

    const filtradas = docenteMaterias.filter(m => m.curso === cursoSel).map(m => m.materia);
    let options = `<option value="">Selecciona Materia</option>`;
    filtradas.forEach(m => {
        options += `<option value="${m}">${m}</option>`;
    });
    selectMat.innerHTML = options;
}

function actualizarMateriasEvaluacion() {
    const cursoSel = document.getElementById('eva-curso').value;
    const selectMat = document.getElementById('eva-materia');

    if (!cursoSel) {
        selectMat.innerHTML = `<option value="">Selecciona Materia</option>`;
        return;
    }

    const filtradas = docenteMaterias.filter(m => m.curso === cursoSel).map(m => m.materia);
    let options = `<option value="">Selecciona Materia</option>`;
    filtradas.forEach(m => {
        options += `<option value="${m}">${m}</option>`;
    });
    selectMat.innerHTML = options;
}

// ═══ LÓGICA DE CARGA DE NOTAS ═══
let modalidadCursoActual = "num"; // "num" o "rite"
let alumnosCargadosNotas = [];

function resetPlanillaNotas() {
    document.getElementById('planilla-notas-card').classList.add('hidden');
    document.getElementById('tabla-carga-notas').innerHTML = "";
}

async function cargarAlumnosNotas() {
    const curso = document.getElementById('aca-curso').value;
    const materia = document.getElementById('aca-materia').value;

    if (!curso || !materia) {
        resetPlanillaNotas();
        return;
    }

    try {
        // Consultar modalidad del curso para definir la calificación
        const cursoDoc = await db.collection('cursos').where('nombre', '==', curso).get();
        modalidadCursoActual = "num";
        cursoDoc.forEach(d => {
            if (d.data().modalidad === 'rite') modalidadCursoActual = "rite";
        });

        document.getElementById('modalidad-nota-badge').innerText = modalidadCursoActual === 'rite' ? "Escala RITE" : "Escala Numérica";

        // Traer alumnos del curso
        const snapAlumnos = await db.collection('alumnos').where('curso', '==', curso).get();
        alumnosCargadosNotas = [];
        snapAlumnos.forEach(d => {
            alumnosCargadosNotas.push({ id: d.id, ...d.data() });
        });

        // Ordenar por apellido/nombre
        alumnosCargadosNotas.sort((a, b) => a.nombre.localeCompare(b.nombre));

        const tbody = document.getElementById('tabla-carga-notas');
        tbody.innerHTML = "";

        alumnosCargadosNotas.forEach(al => {
            // Buscar si ya tiene nota cargada para esta materia
            const notasArray = al.notas || [];
            const notaMateriaObj = notasArray.find(n => n.materia.toLowerCase() === materia.toLowerCase());
            let currentDisplay = "Sin calificar";
            let valAct = "";

            if (notaMateriaObj) {
                if (modalidadCursoActual === 'rite') {
                    currentDisplay = notaMateriaObj.rite || "Sin calificar";
                    valAct = notaMateriaObj.rite || "";
                } else {
                    const notasNum = Object.entries(notaMateriaObj)
                        .filter(([k]) => k.startsWith('nota_') && notaMateriaObj[k] !== undefined)
                        .map(([k, v]) => `${k.replace('nota_', 'P')}: ${v}`);
                    currentDisplay = notasNum.length ? notasNum.join(' | ') : "Sin calificar";
                }
            }

            let inputHtml = "";
            if (modalidadCursoActual === 'rite') {
                inputHtml = `
                <select class="input-pro text-xs not-inp-ctrl" data-id="${al.id}">
                    <option value="">-- Sin Calificar --</option>
                    <option value="TEA" ${valAct === 'TEA' ? 'selected' : ''}>TEA</option>
                    <option value="TEP" ${valAct === 'TEP' ? 'selected' : ''}>TEP</option>
                    <option value="TED" ${valAct === 'TED' ? 'selected' : ''}>TED</option>
                </select>`;
            } else {
                // Escala numérica típica con 3 notas cargables
                const n1 = notaMateriaObj?.nota_1 || "";
                const n2 = notaMateriaObj?.nota_2 || "";
                const n3 = notaMateriaObj?.nota_3 || "";
                inputHtml = `
                <div class="flex gap-1" data-id="${al.id}">
                    <input type="number" min="1" max="10" placeholder="P1" value="${n1}" class="input-pro p-1 text-center text-xs not-num-1">
                    <input type="number" min="1" max="10" placeholder="P2" value="${n2}" class="input-pro p-1 text-center text-xs not-num-2">
                    <input type="number" min="1" max="10" placeholder="P3" value="${n3}" class="input-pro p-1 text-center text-xs not-num-3">
                </div>`;
            }

            tbody.innerHTML += `
            <tr class="hover:bg-slate-50 transition">
                <td class="py-3 font-bold text-slate-800">${al.nombre}</td>
                <td class="py-3 px-2 font-semibold text-slate-500">${currentDisplay}</td>
                <td class="py-3 px-2">${inputHtml}</td>
            </tr>`;
        });

        document.getElementById('planilla-notas-card').classList.remove('hidden');

    } catch (e) {
        console.error(e);
        alert("Error al cargar la planilla.");
    }
}

async function guardarNotasPlanilla() {
    const materia = document.getElementById('aca-materia').value;
    const batch = db.batch();

    try {
        if (modalidadCursoActual === 'rite') {
            const inputs = document.querySelectorAll('.not-inp-ctrl');
            for (let select of inputs) {
                const alId = select.getAttribute('data-id');
                const val = select.value;
                if (!val) continue;

                const alumnoObj = alumnosCargadosNotas.find(a => a.id === alId);
                const notasOriginales = alumnoObj.notas || [];
                const otrasNotas = notasOriginales.filter(n => n.materia.toLowerCase() !== materia.toLowerCase());
                
                otrasNotas.push({ materia, rite: val });

                const ref = db.collection('alumnos').doc(alId);
                batch.update(ref, { notas: otrasNotas });
            }
        } else {
            const inputsContainer = document.querySelectorAll('[data-id]');
            for (let container of inputsContainer) {
                const alId = container.getAttribute('data-id');
                const n1 = container.querySelector('.not-num-1').value.trim();
                const n2 = container.querySelector('.not-num-2').value.trim();
                const n3 = container.querySelector('.not-num-3').value.trim();

                const alumnoObj = alumnosCargadosNotas.find(a => a.id === alId);
                const notasOriginales = alumnoObj.notas || [];
                const otrasNotas = notasOriginales.filter(n => n.materia.toLowerCase() !== materia.toLowerCase());

                const notaMateriaObj = { materia };
                if (n1 !== "") notaMateriaObj.nota_1 = Number(n1);
                if (n2 !== "") notaMateriaObj.nota_2 = Number(n2);
                if (n3 !== "") notaMateriaObj.nota_3 = Number(n3);

                otrasNotas.push(notaMateriaObj);

                const ref = db.collection('alumnos').doc(alId);
                batch.update(ref, { notas: otrasNotas });
            }
        }

        await batch.commit();
        alert("¡Calificaciones guardadas exitosamente!");
        cargarAlumnosNotas();

    } catch (e) {
        console.error(e);
        alert("Error al guardar calificaciones.");
    }
}

// ═══ LÓGICA DE CONTROL DE INASISTENCIAS ═══
let alumnosCargadosAsistencia = [];

function resetPlanillaAsistencia() {
    document.getElementById('planilla-asistencia-card').classList.add('hidden');
    document.getElementById('lista-planilla-asistencia').innerHTML = "";
}

async function cargarPlanillaAsistencia() {
    const fecha = document.getElementById('asis-fecha').value;
    const curso = document.getElementById('asis-curso').value;
    const materia = document.getElementById('asis-materia').value;

    if (!fecha || !curso || !materia) {
        resetPlanillaAsistencia();
        return;
    }

    try {
        // Traer alumnos del curso
        const snapAlumnos = await db.collection('alumnos').where('curso', '==', curso).get();
        alumnosCargadosAsistencia = [];
        snapAlumnos.forEach(d => {
            alumnosCargadosAsistencia.push({ id: d.id, ...d.data() });
        });

        alumnosCargadosAsistencia.sort((a, b) => a.nombre.localeCompare(b.nombre));

        // Buscar si ya existe registro cargado en la fecha para esa materia
        const snapAsisExistente = await db.collection('asistencias')
            .where('fecha', '==', fecha)
            .where('materia', '==', materia)
            .where('curso', '==', curso)
            .get();

        let inasistenciasPrevias = {};
        snapAsisExistente.forEach(d => {
            inasistenciasPrevias = d.data().alumnosInasistentes || {}; 
            // Formato guardado: { alumnoId: valorInasistencia (1, 0.5, etc) }
        });

        const listCont = document.getElementById('lista-planilla-asistencia');
        listCont.innerHTML = "";

        alumnosCargadosAsistencia.forEach(al => {
            const inasistenciasAcumuladas = al.inasistencias || 0;
            const preVal = inasistenciasPrevias[al.id] !== undefined ? inasistenciasPrevias[al.id] : 0;

            listCont.innerHTML += `
            <div class="py-4 flex justify-between items-center flex-wrap gap-2">
                <div>
                    <p class="font-bold text-slate-800">${al.nombre}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">Acumuladas: ${inasistenciasAcumuladas} faltas</p>
                </div>
                <div>
                    <select class="input-pro text-xs w-44 control-asistencia-select" data-id="${al.id}" data-previa="${preVal}">
                        <option value="0" ${preVal === 0 ? 'selected' : ''}>Presente</option>
                        <option value="1" ${preVal === 1 ? 'selected' : ''}>Ausente (1 Falta)</option>
                        <option value="0.5" ${preVal === 0.5 ? 'selected' : ''}>Media Falta (0.5)</option>
                        <option value="0.25" ${preVal === 0.25 ? 'selected' : ''}>Cuarta Falta (0.25)</option>
                    </select>
                </div>
            </div>`;
        });

        document.getElementById('planilla-asistencia-card').classList.remove('hidden');

    } catch (e) {
        console.error(e);
        alert("Error al cargar la planilla de asistencia.");
    }
}

async function guardarAsistencia() {
    const fecha = document.getElementById('asis-fecha').value;
    const curso = document.getElementById('asis-curso').value;
    const materia = document.getElementById('asis-materia').value;

    const selectores = document.querySelectorAll('.control-asistencia-select');
    const alumnosInasistentes = {};

    const batch = db.batch();

    try {
        for (let sel of selectores) {
            const alId = sel.getAttribute('data-id');
            const valorActual = Number(sel.value);
            const valorPrevio = Number(sel.getAttribute('data-previa'));

            if (valorActual > 0) {
                alumnosInasistentes[alId] = valorActual;
            }

            // Calcular diferencia para ajustar el acumulador del alumno
            const diferencia = valorActual - valorPrevio;
            if (diferencia !== 0) {
                const alumnoObj = alumnosCargadosAsistencia.find(a => a.id === alId);
                const refAl = db.collection('alumnos').doc(alId);
                const nuevoAcumulado = Math.max(0, (alumnoObj.inasistencias || 0) + diferencia);
                
                batch.update(refAl, { inasistencias: nuevoAcumulado });
            }
        }

        // Buscar ID del documento de asistencia si ya existía para actualizarlo, o crear uno nuevo
        const snapExistente = await db.collection('asistencias')
            .where('fecha', '==', fecha)
            .where('materia', '==', materia)
            .where('curso', '==', curso)
            .get();

        let docId = null;
        snapExistente.forEach(d => docId = d.id);

        const payloadAsis = {
            fecha,
            curso,
            materia,
            docente: docenteNombre,
            alumnosInasistentes
        };

        if (docId) {
            batch.update(db.collection('asistencias').doc(docId), payloadAsis);
        } else {
            const nuevaRef = db.collection('asistencias').doc();
            batch.set(nuevaRef, payloadAsis);
        }

        await batch.commit();
        alert("¡Registro de asistencia guardado exitosamente!");
        cargarPlanillaAsistencia();

    } catch (e) {
        console.error(e);
        alert("Error al guardar la asistencia.");
    }
}

// ═══ LÓGICA DE CALENDARIO DE EVALUACIONES ═══
async function cargarEvaluaciones() {
    const cont = document.getElementById('lista-evaluaciones-agendadas');
    cont.innerHTML = `<p class="text-xs text-slate-400 italic">Cargando evaluaciones agendadas...</p>`;

    try {
        // Obtenemos todos los cursos del docente
        const cursosDocente = [...new Set(docenteMaterias.map(m => m.curso))];
        if (cursosDocente.length === 0) {
            cont.innerHTML = `<p class="text-xs text-slate-400 italic">No tienes cursos asignados.</p>`;
            return;
        }

        // Cargamos todas las evaluaciones de los cursos correspondientes
        const snap = await db.collection('eventos')
            .where('tipo', 'in', ['examen', 'entrega'])
            .orderBy('fecha', 'asc')
            .get();

        const listaFiltrada = [];
        snap.forEach(doc => {
            const ev = doc.data();
            // Filtrar eventos de cursos que el docente tiene asignados
            const esDeCursoAsignado = ev.cursos && ev.cursos.some(c => cursosDocente.includes(c));
            if (esDeCursoAsignado) {
                listaFiltrada.push({ id: doc.id, ...ev });
            }
        });

        if (listaFiltrada.length === 0) {
            cont.innerHTML = `<p class="text-xs text-slate-400 italic">No hay evaluaciones agendadas para tus cursos.</p>`;
            return;
        }

        cont.innerHTML = "";
        listaFiltrada.forEach(ev => {
            const dateParsed = new Date(ev.fecha + 'T00:00:00').toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            const badgeColor = ev.tipo === 'examen' ? 'bg-rose-50 text-rose-700' : 'bg-purple-50 text-purple-700';
            const visStr = ev.cursos ? ev.cursos.join(', ') : 'Todos';

            cont.innerHTML += `
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-start gap-4">
                <div class="space-y-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="${badgeColor} text-[9px] font-black uppercase px-2 py-0.5 rounded-md">${ev.tipo}</span>
                        <span class="text-[10px] text-slate-400 font-bold capitalize">${dateParsed}</span>
                    </div>
                    <h5 class="font-bold text-sm text-slate-800">${ev.titulo}</h5>
                    <p class="text-xs text-slate-500 font-bold">Curso: ${visStr} • Materia: ${ev.materia || 'General'}</p>
                    ${ev.descripcion ? `<p class="text-xs text-slate-500 mt-1 leading-relaxed">${ev.descripcion}</p>` : ''}
                </div>
                <div class="flex gap-1">
                    <button onclick="editarEvaluacion('${ev.id}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded-xl text-xs font-bold transition"><i class="fas fa-edit"></i></button>
                    <button onclick="eliminarEvaluacion('${ev.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-xl text-xs font-bold transition"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>`;
        });

    } catch (e) {
        console.error(e);
        cont.innerHTML = `<p class="text-xs text-red-500 font-bold">Error al cargar las evaluaciones del servidor.</p>`;
    }
}

async function guardarEvaluacion() {
    const id = document.getElementById('eva-id').value;
    const titulo = document.getElementById('eva-titulo').value.trim();
    const fecha = document.getElementById('eva-fecha').value;
    const curso = document.getElementById('eva-curso').value;
    const materia = document.getElementById('eva-materia').value;
    const tipo = document.getElementById('eva-tipo').value;
    const descripcion = document.getElementById('eva-desc').value.trim();

    if (!titulo || !fecha || !curso || !materia) {
        alert("Completa todos los campos obligatorios para guardar la evaluación.");
        return;
    }

    const payload = {
        titulo,
        fecha,
        tipo,
        descripcion: descripcion || null,
        materia,
        cursos: [curso],
        creadoPor: docenteNombre
    };

    try {
        if (id) {
            await db.collection('eventos').doc(id).update(payload);
        } else {
            await db.collection('eventos').add(payload);
        }

        resetFormEvaluacion();
        cargarEvaluaciones();
        alert("¡Evaluación agendada exitosamente!");
    } catch (e) {
        console.error(e);
        alert("Error al agendar la evaluación.");
    }
}

async function editarEvaluacion(id) {
    try {
        const doc = await db.collection('eventos').doc(id).get();
        if (!doc.exists) return;
        const ev = doc.data();

        document.getElementById('eva-id').value = id;
        document.getElementById('eva-titulo').value = ev.titulo;
        document.getElementById('eva-fecha').value = ev.fecha;
        document.getElementById('eva-tipo').value = ev.tipo;
        document.getElementById('eva-desc').value = ev.descripcion || "";

        // Establecer curso y actualizar selector de materias
        document.getElementById('eva-curso').value = ev.cursos && ev.cursos.length ? ev.cursos[0] : "";
        actualizarMateriasEvaluacion();
        document.getElementById('eva-materia').value = ev.materia || "";

        document.getElementById('form-eva-title').innerText = "Editar Evaluación";
        document.getElementById('btn-cancelar-eva').classList.remove('hidden');

        // Scroll suave al formulario
        window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (e) {
        console.error(e);
    }
}

function resetFormEvaluacion() {
    document.getElementById('eva-id').value = "";
    document.getElementById('eva-titulo').value = "";
    document.getElementById('eva-fecha').value = "";
    document.getElementById('eva-curso').value = "";
    document.getElementById('eva-materia').innerHTML = `<option value="">Selecciona Materia</option>`;
    document.getElementById('eva-desc').value = "";
    document.getElementById('form-eva-title').innerText = "Agendar Evaluación / Prueba";
    document.getElementById('btn-cancelar-eva').classList.add('hidden');
}

async function eliminarEvaluacion(id) {
    if (confirm("¿Estás seguro de que deseas eliminar este evento de evaluación?")) {
        try {
            await db.collection('eventos').doc(id).delete();
            cargarEvaluaciones();
        } catch (e) {
            console.error(e);
            alert("Error al intentar eliminar el evento.");
        }
    }
}
