<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Docente - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02); }
        input, select { background: #f1f5f9; border: none; border-radius: 1.2rem; padding: 1rem; font-weight: 700; width: 100%; outline: none; margin-bottom: 1rem; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        #login-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 2rem; }
    </style>
</head>
<body class="pb-32">

    <div id="login-screen" class="hidden">
        <div class="max-w-md mx-auto w-full text-center">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-[2.5rem] flex items-center justify-center text-3xl mx-auto mb-8 shadow-sm"><i class="fas fa-chalkboard-teacher"></i></div>
            <h1 class="font-black text-3xl text-slate-800 tracking-tighter mb-2">Panel Docente</h1>
            <p class="text-slate-400 font-bold mb-8 text-sm">Ingresá tu correo para gestionar notas</p>
            <input type="email" id="loginEmail" placeholder="tu-correo@escuela.com" class="text-center">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-5 rounded-[1.8rem] font-black text-xs uppercase tracking-widest shadow-xl">Ingresar</button>
        </div>
    </div>

    <div id="app">
        <header class="p-8">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 id="docName" class="font-black text-3xl text-slate-800 tracking-tighter">Hola, Profe</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Gestión de Calificaciones</p>
                </div>
                <button onclick="cerrarSesion()" class="w-12 h-12 bg-white rounded-2xl border flex items-center justify-center text-slate-300 shadow-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="space-y-2">
                <select id="selectCurso" onchange="cargarAlumnos(this.value)">
                    <option value="">Seleccionar Curso</option>
                </select>
                <div class="grid grid-cols-2 gap-2">
                    <select id="selectMateria">
                        <option value="Matemática">Matemática</option>
                        <option value="Lengua">Lengua</option>
                        <option value="Ciencias Naturales">Ciencias Naturales</option>
                        <option value="Ciencias Sociales">Ciencias Sociales</option>
                        <option value="Inglés">Inglés</option>
                        <option value="Música">Música</option>
                    </select>
                    <select id="selectTrimestre">
                        <option value="1Trim">1° Trimestre</option>
                        <option value="2Trim">2° Trimestre</option>
                        <option value="3Trim">3° Trimestre</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="px-6 max-w-2xl mx-auto">
            <div id="lista-alumnos" class="space-y-4">
                <p class="text-center text-slate-400 text-xs font-bold py-10">Seleccioná un curso para empezar a cargar</p>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURACION FIREBASE (Usa la tuya)
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentDocEmail = localStorage.getItem('docEmail');

        window.onload = () => {
            if (!currentDocEmail) {
                document.getElementById('login-screen').classList.remove('hidden');
            } else {
                iniciarDocente();
            }
        };

        async function login() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();
            if (doc.exists && doc.data().rol === 'docente') {
                localStorage.setItem('docEmail', email);
                location.reload();
            } else {
                alert("Correo no registrado como docente.");
            }
        }

        async function iniciarDocente() {
            const doc = await db.collection('usuarios').doc(currentDocEmail).get();
            const data = doc.data();
            document.getElementById('docName').innerText = "Hola, " + data.nombre;
            
            const selector = document.getElementById('selectCurso');
            data.cursos.forEach(curso => {
                selector.innerHTML += `<option value="${curso}">${curso}</option>`;
            });
        }

        async function cargarAlumnos(curso) {
            if(!curso) return;
            const snap = await db.collection('alumnos').where('curso', '==', curso).get();
            const container = document.getElementById('lista-alumnos');
            container.innerHTML = "";

            snap.forEach(doc => {
                const alum = doc.data();
                container.innerHTML += `
                    <div class="card flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-user text-xs"></i></div>
                            <span class="font-black text-sm text-slate-700">${alum.nombre}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="number" id="nota-${doc.id}" placeholder="1-10" min="1" max="10" class="!w-20 !mb-0 text-center !bg-slate-50 border border-slate-100">
                            <button onclick="guardarNota('${doc.id}')" class="bg-blue-600 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95 transition-all">Guardar</button>
                            <button onclick="marcarFalta('${doc.id}')" class="bg-rose-50 text-rose-500 w-12 h-12 rounded-2xl flex items-center justify-center border border-rose-100"><i class="fas fa-user-times"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function guardarNota(alumnoID) {
            const notaVal = document.getElementById(`nota-${alumnoID}`).value;
            const materia = document.getElementById('selectMateria').value;
            const trimestre = document.getElementById('selectTrimestre').value;

            if(!notaVal || notaVal < 1 || notaVal > 10) return alert("Ingresá una nota válida entre 1 y 10");

            const ref = db.collection('calificaciones').doc(alumnoID);
            
            await ref.set({
                notas: {
                    [materia]: {
                        [trimestre]: notaVal
                    }
                }
            }, { merge: true });

            alert("Nota guardada");
        }

        async function marcarFalta(alumnoID) {
            const hoy = new Date().toISOString().split('T')[0];
            const ref = db.collection('calificaciones').doc(alumnoID);
            
            if(confirm("¿Marcar inasistencia para hoy?")) {
                await ref.update({
                    fechasFaltas: firebase.firestore.FieldValue.arrayUnion(hoy)
                }).catch(async () => {
                    await ref.set({ fechasFaltas: [hoy] }, { merge: true });
                });
                alert("Inasistencia cargada");
            }
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
