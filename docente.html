<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Docente - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }
        .card-alumno { background: white; border-radius: 2rem; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-nota { width: 100%; height: 50px; text-align: center; border: 2px solid #f1f5f9; border-radius: 1rem; font-weight: 800; font-size: 1.1rem; outline: none; transition: 0.2s; background: #f8fafc; }
        .input-nota:focus { border-color: #2563eb; background: #white; }
        .input-pro { border: 2px solid #white; border-radius: 1.2rem; padding: 1rem; width: 100%; outline: none; background: white; font-weight: 600; shadow: 0 2px 4px rgba(0,0,0,0.02); }
    </style>
</head>
<body class="pb-10">

    <div id="login-screen" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center p-6">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center text-white text-2xl shadow-xl shadow-blue-200">
            <i class="fas fa-apple-alt"></i>
        </div>
        <h2 class="text-2xl font-black tracking-tighter mb-2">Acceso Docente</h2>
        <p class="text-slate-400 text-sm mb-8 text-center">Ingresá con tu email para gestionar tus cursos</p>
        <input type="email" id="login-email" class="w-full max-w-xs p-4 border-2 border-slate-100 rounded-2xl mb-4 outline-none focus:border-blue-500 font-bold" placeholder="profe@gmail.com">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">Entrar al Aula</button>
    </div>

    <header class="bg-white/80 backdrop-blur-md p-6 border-b sticky top-0 z-50 flex justify-between items-center">
        <div>
            <span id="docente-nombre" class="font-black text-lg block leading-none">Hola, Profe</span>
            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Gestión Docente</span>
        </div>
        <button onclick="location.reload()" class="w-10 h-10 bg-slate-50 rounded-xl text-slate-400 flex items-center justify-center">
            <i class="fas fa-power-off"></i>
        </button>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div>
                <label class="text-[10px] font-black text-slate-400 ml-2 uppercase mb-2 block">Curso</label>
                <select id="select-curso" onchange="cargarAlumnos()" class="input-pro"></select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 ml-2 uppercase mb-2 block">Materia</label>
                <select id="select-materia" class="input-pro">
                    <option value="General">General</option>
                    <option value="Lengua">Lengua</option>
                    <option value="Matemática">Matemática</option>
                    <option value="Inglés">Inglés</option>
                </select>
            </div>
        </div>

        <div id="lista-alumnos" class="space-y-4">
            <p class="text-center text-slate-400 py-20">Seleccioná un curso para comenzar</p>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let docenteData = null;

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();

            if (doc.exists && doc.data().rol === 'docente') {
                docenteData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('docente-nombre').innerText = docenteData.nombre;
                
                const select = document.getElementById('select-curso');
                select.innerHTML = '<option value="">Elegir...</option>';
                docenteData.cursos.forEach(c => {
                    select.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } else {
                alert("Email no registrado como docente.");
            }
        }

        async function cargarAlumnos() {
            const curso = document.getElementById('select-curso').value;
            if(!curso) return;

            const container = document.getElementById('lista-alumnos');
            container.innerHTML = '<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-blue-500 text-3xl"></i></div>';

            const snap = await db.collection('alumnos').where('curso', '==', curso).get();
            container.innerHTML = "";

            snap.forEach(doc => {
                const al = doc.data();
                const id = doc.id;
                
                container.innerHTML += `
                    <div class="card-alumno">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="font-black text-slate-800 text-lg">${al.nombre}</h3>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${curso}</p>
                            </div>
                            <button onclick="tomarAsistencia('${id}', this)" class="px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-tighter bg-emerald-50 text-emerald-600 transition-colors">
                                <i class="fas fa-check-circle mr-1"></i> Presente
                            </button>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-3">
                            <div class="space-y-1">
                                <span class="text-[9px] font-black text-slate-400 uppercase ml-1">1° Trim</span>
                                <input type="number" value="${al.n1 || ''}" onchange="guardarNota('${id}', 'n1', this.value)" class="input-nota" placeholder="-">
                            </div>
                            <div class="space-y-1">
                                <span class="text-[9px] font-black text-slate-400 uppercase ml-1">2° Trim</span>
                                <input type="number" value="${al.n2 || ''}" onchange="guardarNota('${id}', 'n2', this.value)" class="input-nota" placeholder="-">
                            </div>
                            <div class="space-y-1">
                                <span class="text-[9px] font-black text-slate-400 uppercase ml-1">3° Trim</span>
                                <input type="number" value="${al.n3 || ''}" onchange="guardarNota('${id}', 'n3', this.value)" class="input-nota" placeholder="-">
                            </div>
                        </div>

                        <button onclick="verObs('${id}', '${al.nombre}')" class="w-full mt-4 py-3 bg-slate-50 rounded-xl text-slate-400 text-xs font-bold flex items-center justify-center gap-2">
                            <i class="fas fa-comment-dots"></i> Observaciones
                        </button>
                    </div>
                `;
            });
        }

        async function guardarNota(id, campo, valor) {
            let upd = {};
            upd[campo] = valor;
            await db.collection('alumnos').doc(id).update(upd);
        }

        async function tomarAsistencia(id, btn) {
            const esPresente = btn.innerText.includes("PRESENTE");
            const nuevoEstado = esPresente ? "AUSENTE" : "PRESENTE";
            
            // Guardamos el registro de asistencia con la fecha de hoy
            await db.collection('asistencia').add({
                alumnoId: id,
                estado: nuevoEstado,
                fecha: new Date().toISOString().split('T')[0],
                docente: docenteData.nombre
            });

            if(nuevoEstado === "AUSENTE") {
                btn.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Ausente';
                btn.className = "px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-tighter bg-rose-50 text-rose-600 transition-colors";
            } else {
                btn.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Presente';
                btn.className = "px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-tighter bg-emerald-50 text-emerald-600 transition-colors";
            }
        }

        function verObs(id, nombre) {
            const obs = prompt("Observación para " + nombre + ":");
            if(obs !== null) {
                db.collection('alumnos').doc(id).update({ observaciones: obs });
                alert("Guardado correctamente.");
            }
        }
    </script>
</body>
</html>
