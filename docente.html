<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Docente - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #2563eb; background: #eff6ff; border-radius: 1rem; }
        .input-nota { width: 100%; height: 50px; text-align: center; border-radius: 1rem; border: 2px solid #f1f5f9; font-weight: 800; outline: none; transition: all 0.2s; }
        .input-nota:focus { border-color: #2563eb; background: white; shadow: 0 4px 12px rgba(37, 99, 235, 0.1); }
        .badge-rite { padding: 10px; border-radius: 0.8rem; font-size: 11px; font-weight: 800; flex: 1; text-align: center; border: 2px solid transparent; transition: all 0.2s; }
        /* Animación para el promedio sugerido */
        .avg-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mb-6 flex items-center justify-center text-white text-2xl shadow-xl"><i class="fas fa-apple-alt"></i></div>
        <h2 class="text-2xl font-black mb-6">Panel Docente</h2>
        <input type="email" id="login-email" class="w-full max-w-xs p-4 bg-slate-100 rounded-2xl mb-4 font-bold outline-none" placeholder="profe@gmail.com">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-4 rounded-2xl font-bold">Entrar</button>
    </div>

    <header class="p-6 bg-white border-b sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 id="doc-nom" class="font-black text-lg leading-none">Hola, Profe</h1>
            <select id="select-curso" onchange="cargarAlumnos()" class="text-[10px] font-bold text-blue-600 uppercase border-none bg-transparent outline-none"></select>
        </div>
        <input type="date" id="fecha-hoy" class="bg-slate-100 p-2 rounded-lg text-[10px] font-bold outline-none">
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <section id="tab-notas" class="tab-content active">
            <div class="grid grid-cols-2 gap-2 mb-6">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Materia</label>
                    <select id="select-materia" onchange="cargarAlumnos()" class="w-full p-3 bg-white rounded-xl border shadow-sm font-bold mt-1 outline-none text-xs">
                        <option value="MATEMATICA">Matemática</option>
                        <option value="LENGUA">Lengua</option>
                        <option value="INGLES">Inglés</option>
                        <option value="CIENCIAS">Ciencias</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Modalidad</label>
                    <select id="select-modalidad" onchange="cargarAlumnos()" class="w-full p-3 bg-white rounded-xl border shadow-sm font-bold mt-1 outline-none text-xs text-blue-600">
                        <option value="NUMERICO">📊 Numérico</option>
                        <option value="RITE">📝 RITE</option>
                    </select>
                </div>
            </div>

            <div id="panel-masivo" class="bg-blue-50 p-5 rounded-[2rem] mb-6 border-2 border-dashed border-blue-200">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <h4 class="text-[11px] font-black text-blue-900 uppercase">Carga Masiva de Informes</h4>
                </div>
                <textarea id="texto-comun" class="w-full p-3 bg-white rounded-xl text-xs border-none shadow-sm outline-none mb-3" 
                          placeholder="Escribí aquí los contenidos comunes o logros del curso..."></textarea>
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-bold text-slate-500 flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="check-sobrescribir" class="w-4 h-4 accent-blue-600"> Sobrescribir cargados
                    </label>
                    <button onclick="aplicarTextoMasivo()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-200">
                        Replicar
                    </button>
                </div>
            </div>

            <div id="lista-notas" class="space-y-4"></div>
        </section>

        <section id="tab-asis" class="tab-content">
            <h3 class="font-black text-xl mb-4 text-slate-800">Pasar Lista</h3>
            <div id="lista-asis" class="space-y-2"></div>
            <button onclick="alert('Asistencia guardada correctamente')" class="w-full mt-6 bg-emerald-500 text-white p-4 rounded-2xl font-bold shadow-lg shadow-emerald-100">Finalizar Lista</button>
        </section>
    </main>

    <div id="modal-hito" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[3000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="font-black text-xl mb-2 text-slate-800">Registrar Hito</h3>
            <p id="hito-alumno-nom" class="text-blue-600 font-bold text-xs uppercase mb-6"></p>
            
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="seleccionarHito('Logro', this)" class="btn-hito p-3 rounded-2xl bg-slate-50 border-2 border-transparent text-[10px] font-black uppercase">🌟 Logro</button>
                <button onclick="seleccionarHito('Obs', this)" class="btn-hito p-3 rounded-2xl bg-slate-50 border-2 border-transparent text-[10px] font-black uppercase">👀 Obs</button>
                <button onclick="seleccionarHito('Sancion', this)" class="btn-hito p-3 rounded-2xl bg-slate-50 border-2 border-transparent text-[10px] font-black uppercase">⚠️ Sanción</button>
            </div>

            <div id="box-sancion" class="hidden mb-4">
                <select id="select-sancion" class="w-full p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none border-none">
                    <option value="Apercibimiento">Apercibimiento</option>
                    <option value="Amonestación">Amonestación</option>
                    <option value="Acta de Compromiso">Acta de Compromiso</option>
                </select>
            </div>

            <textarea id="hito-desc" class="w-full p-4 bg-slate-100 rounded-2xl text-xs min-h-[100px] outline-none mb-6" placeholder="Detalle del suceso..."></textarea>
            
            <div class="flex gap-2">
                <button onclick="cerrarHito()" class="flex-1 p-4 rounded-2xl font-bold text-slate-400 text-sm">Cancelar</button>
                <button onclick="guardarHitoFirebase()" class="flex-1 p-4 bg-slate-900 text-white rounded-2xl font-bold text-sm shadow-xl">Guardar</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-4 right-4 bg-white/80 backdrop-blur-md border shadow-2xl rounded-[2rem] mb-4 flex justify-around p-2 z-[1000]">
        <button onclick="switchTab('notas')" id="btn-notas" class="nav-btn active flex-1 py-3 flex flex-col items-center gap-1 font-bold text-[9px]">
            <i class="fas fa-star text-lg"></i>NOTAS
        </button>
        <button onclick="switchTab('asis')" id="btn-asis" class="nav-btn flex-1 py-3 flex flex-col items-center gap-1 font-bold text-[9px]">
            <i class="fas fa-list-check text-lg"></i>ASISTENCIA
        </button>
    </nav>

    <div id="pdf-template" style="display:none; padding: 40px; color: #1e293b; font-family: sans-serif;">
        <div style="text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 15px; margin-bottom: 20px;">
            <h1 style="margin: 0; font-size: 22px; font-weight: 800;">INSTITUTO IOSEF CARO</h1>
            <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">Informe de Trayectoria Educativa</p>
        </div>
        <div style="margin-bottom: 20px; font-size: 12px;">
            <p><strong>Alumno/a:</strong> <span id="pdf-nombre"></span></p>
            <p><strong>Curso:</strong> <span id="pdf-curso"></span> | <strong>Fecha:</strong> <span id="pdf-fecha"></span></p>
        </div>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f1f5f9;">
                    <th style="border: 1px solid #e2e8f0; padding: 10px; text-align: left;">Área Curricular</th>
                    <th style="border: 1px solid #e2e8f0; padding: 10px; text-align: center;">Calificación</th>
                    <th style="border: 1px solid #e2e8f0; padding: 10px; text-align: left;">Observaciones</th>
                </tr>
            </thead>
            <tbody id="pdf-body"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", authDomain: "app-iosefcaro.firebaseapp.com", projectId: "app-iosefcaro", storageBucket: "app-iosefcaro.firebasestorage.app", messagingSenderId: "651320124248", appId: "1:651320124248:web:97c8ca00e29114e1983b2d" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let docenteData = null;
        let hitoSeleccionado = { id: '', nombre: '', tipo: '' };

        document.getElementById('fecha-hoy').valueAsDate = new Date();

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();
            if (doc.exists && doc.data().rol === 'docente') {
                docenteData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('doc-nom').innerText = docenteData.nombre;
                const select = document.getElementById('select-curso');
                select.innerHTML = docenteData.cursos.map(c => `<option value="${c}">${c}</option>`).join('');
                cargarAlumnos();
            } else { alert("Acceso denegado. Solo docentes autorizados."); }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        async function cargarAlumnos() {
            const curso = document.getElementById('select-curso').value;
            const materia = document.getElementById('select-materia').value;
            const modalidad = document.getElementById('select-modalidad').value;
            const snap = await db.collection('alumnos').where('curso', '==', curso).get();
            
            const containerNotas = document.getElementById('lista-notas');
            const containerAsis = document.getElementById('lista-asis');
            containerNotas.innerHTML = ""; containerAsis.innerHTML = "";

            snap.forEach(async (docAl) => {
                const al = docAl.data();
                const id = docAl.id;
                const notaDoc = await db.collection('alumnos').doc(id).collection('notas').doc(materia).get();
                const n = notaDoc.exists ? notaDoc.data() : {};

                // MEJORA 1: PROMEDIO SUGERIDO (COLOR VIOLETA)
                let inputHtml = "";
                if(modalidad === "NUMERICO") {
                    const notasArray = [n.n1, n.n2, n.n3].filter(v => v && !isNaN(v));
                    const prom = notasArray.length > 0 ? (notasArray.reduce((a,b)=>parseFloat(a)+parseFloat(b),0)/notasArray.length).toFixed(2) : '-';
                    
                    inputHtml = `<div class="grid grid-cols-4 gap-2">
                        <input type="number" value="${n.n1||''}" onchange="guardarNota('${id}','n1',this.value)" class="input-nota" placeholder="1B">
                        <input type="number" value="${n.n2||''}" onchange="guardarNota('${id}','n2',this.value)" class="input-nota" placeholder="2B">
                        <input type="number" value="${n.n3||''}" onchange="guardarNota('${id}','n3',this.value)" class="input-nota" placeholder="3B">
                        <div class="bg-violet-50 rounded-2xl flex flex-col items-center justify-center border-2 border-violet-100 avg-badge">
                            <span class="text-[7px] font-black text-violet-400 uppercase">Promedio</span>
                            <span class="text-violet-600 font-black text-sm">${prom}</span>
                        </div>
                    </div>`;
                } else {
                    inputHtml = `<div class="flex gap-2">
                        ${['TEA','TEP','TED'].map(t => `
                            <button onclick="guardarNota('${id}','rite','${t}',this)" 
                            class="badge-rite ${n.rite === t ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}">${t}</button>
                        `).join('')}
                    </div>`;
                }

                containerNotas.innerHTML += `
                    <div class="bg-white p-5 rounded-[2.5rem] border shadow-sm transition-all hover:shadow-md">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h4 class="font-bold text-sm text-slate-800">${al.nombre}</h4>
                                <p class="text-[8px] text-slate-400 uppercase font-bold tracking-widest">${id}</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="abrirHito('${id}','${al.nombre}')" class="text-amber-500 text-[9px] font-black uppercase">
                                    <i class="fas fa-triangle-exclamation mr-1"></i>Hito
                                </button>
                                <button onclick="descargarPDF('${id}','${al.nombre}')" class="text-blue-500 text-[9px] font-black uppercase">
                                    <i class="fas fa-file-pdf mr-1"></i>PDF
                                </button>
                            </div>
                        </div>
                        ${inputHtml}
                        <textarea onchange="guardarNota('${id}','obs',this.value)" 
                            class="w-full mt-3 p-4 bg-slate-50 rounded-2xl text-[11px] border-none outline-none informe-individual" 
                            placeholder="Observación pedagógica...">${n.obs || ''}</textarea>
                    </div>`;

                containerAsis.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                        <span class="text-xs font-bold text-slate-700 w-1/2">${al.nombre}</span>
                        <div class="flex gap-1">
                            <button onclick="marcarAsis('${id}','P',this)" class="w-11 h-11 rounded-xl bg-slate-50 text-slate-400 font-bold text-xs">P</button>
                            <button onclick="marcarAsis('${id}','A',this)" class="w-11 h-11 rounded-xl bg-slate-50 text-slate-400 font-bold text-xs">A</button>
                            <button onclick="marcarAsis('${id}','T',this)" class="w-11 h-11 rounded-xl bg-slate-50 text-slate-400 font-bold text-xs">T</button>
                        </div>
                    </div>`;
            });
        }

        async function guardarNota(id, campo, val, btn = null) {
            const mat = document.getElementById('select-materia').value;
            if(campo === 'rite' && btn) {
                btn.parentElement.querySelectorAll('button').forEach(b => b.className = "badge-rite bg-slate-100 text-slate-400");
                btn.className = "badge-rite bg-blue-600 text-white shadow-lg";
            }
            await db.collection('alumnos').doc(id).collection('notas').doc(mat).set({
                [campo]: val, materia: mat, fechaUpdate: new Date().toLocaleDateString()
            }, { merge: true });
            
            // Si es numérico, refrescamos para actualizar el promedio sugerido
            if(campo !== 'obs' && campo !== 'rite') cargarAlumnos();
        }

        // MEJORA 2: FUNCIONALIDAD CARGA MASIVA
        function aplicarTextoMasivo() {
            const texto = document.getElementById('texto-comun').value;
            const sobrescribir = document.getElementById('check-sobrescribir').checked;
            const textareas = document.querySelectorAll('.informe-individual');

            if(!texto) return alert("Escribí algo primero.");

            textareas.forEach(ta => {
                if (sobrescribir || ta.value.trim() === "") {
                    ta.value = texto;
                    // Disparamos el onchange para que se guarde en Firebase
                    ta.dispatchEvent(new Event('change'));
                }
            });
            alert("Informes actualizados.");
        }

        // MEJORA 3: ASISTENCIA INTELIGENTE (Cruza con horario de materia)
        async function marcarAsis(id, tipo, btn) {
            const fecha = document.getElementById('fecha-hoy').value;
            const ahora = new Date();
            const mat = document.getElementById('select-materia').value;
            let estadoFinal = tipo;

            // Lógica: Si el docente pasa lista después de los 15 min de inicio (aprox 08:15)
            if(tipo === 'P' && ahora.getHours() >= 8 && ahora.getMinutes() > 15) {
                if(confirm("Ya pasaron más de 15 minutos. ¿Marcar como Llegada Tarde?")) estadoFinal = 'T';
            }

            await db.collection('asistencia').add({ 
                alumnoId: id, estado: estadoFinal, fecha: fecha, materia: mat, hora: ahora.toLocaleTimeString() 
            });

            btn.parentElement.querySelectorAll('button').forEach(b => b.className = "w-11 h-11 rounded-xl bg-slate-50 text-slate-400 font-bold text-xs");
            const color = estadoFinal === 'P' ? 'bg-emerald-500 text-white' : estadoFinal === 'A' ? 'bg-rose-500 text-white' : 'bg-amber-500 text-white';
            btn.className = `w-11 h-11 rounded-xl ${color} font-bold text-xs shadow-lg scale-110 transition-transform`;
        }

        // MEJORA 4: HITOS DE CONVIVENCIAS
        function abrirHito(id, nombre) {
            hitoSeleccionado = { id, nombre, tipo: '' };
            document.getElementById('hito-alumno-nom').innerText = nombre;
            document.getElementById('modal-hito').classList.remove('hidden');
            document.getElementById('modal-hito').classList.add('flex');
        }

        function seleccionarHito(tipo, btn) {
            hitoSeleccionado.tipo = tipo;
            document.querySelectorAll('.btn-hito').forEach(b => b.classList.remove('border-blue-600', 'bg-blue-50'));
            btn.classList.add('border-blue-600', 'bg-blue-50');
            document.getElementById('box-sancion').classList.toggle('hidden', tipo !== 'Sancion');
        }

        async function guardarHitoFirebase() {
            const desc = document.getElementById('hito-desc').value;
            const subtipo = hitoSeleccionado.tipo === 'Sancion' ? document.getElementById('select-sancion').value : '';
            
            if(!hitoSeleccionado.tipo || !desc) return alert("Faltan datos");

            await db.collection('alumnos').doc(hitoSeleccionado.id).collection('convivencia').add({
                tipo: hitoSeleccionado.tipo,
                subtipo: subtipo,
                descripcion: desc,
                fecha: new Date().toLocaleDateString(),
                docente: docenteData.nombre
            });

            alert("Hito guardado exitosamente");
            cerrarHito();
        }

        function cerrarHito() {
            document.getElementById('modal-hito').classList.add('hidden');
            document.getElementById('hito-desc').value = "";
        }

        async function descargarPDF(id, nombre) {
            const curso = document.getElementById('select-curso').value;
            const snap = await db.collection('alumnos').doc(id).collection('notas').get();
            document.getElementById('pdf-nombre').innerText = nombre;
            document.getElementById('pdf-curso').innerText = curso;
            document.getElementById('pdf-fecha').innerText = new Date().toLocaleDateString();
            const body = document.getElementById('pdf-body');
            body.innerHTML = "";
            snap.forEach(doc => {
                const n = doc.data();
                const calif = n.rite ? n.rite : `${n.n1||'-'} / ${n.n2||'-'} / ${n.n3||'-'}`;
                body.innerHTML += `<tr><td style="border:1px solid #e2e8f0;padding:10px;font-weight:bold;">${n.materia}</td><td style="border:1px solid #e2e8f0;padding:10px;text-align:center;font-weight:800;color:#2563eb;">${calif}</td><td style="border:1px solid #e2e8f0;padding:10px;font-size:9px;">${n.obs||''}</td></tr>`;
            });
            const element = document.getElementById('pdf-template');
            element.style.display = 'block';
            html2pdf().set({ margin: 0.5, filename: `Boletin_${nombre}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } }).from(element).save().then(() => element.style.display = 'none');
        }
    </script>
</body>
</html>
