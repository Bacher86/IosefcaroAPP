<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Familias - Comunidad Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 110px; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #iosi-modal { position: fixed; bottom: 100px; right: 20px; width: 340px; max-width: calc(100% - 40px); height: 500px; background: #0f172a; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 6000; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #iosi-chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #0f172a; scroll-behavior: smooth; }
        .bubble-iosi { background: #1e293b; color: #f1f5f9; padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 4px; align-self: flex-start; font-size: 13px; line-height: 1.5; border: 1px solid #334155; max-width: 85%; }
        .bubble-user { background: #2563eb; color: white; padding: 12px 16px; border-radius: 20px; border-bottom-right-radius: 4px; align-self: flex-end; font-size: 13px; font-weight: 500; max-width: 85%; }
        .iosi-btn { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #0f172a; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); z-index: 5000; cursor: pointer; transition: transform 0.3s; }
        .read-post { opacity: 0.6; filter: grayscale(0.5); }
        .nav-btn.active { color: #0f172a; }
        .nav-btn.active i { transform: translateY(-5px); color: #2563eb; }
        .switch-bg { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[7000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-slate-900 rounded-[2rem] mb-6 flex items-center justify-center text-white text-3xl"><i class="fas fa-university"></i></div>
        <h2 class="text-3xl font-black mb-2 tracking-tighter text-slate-900">Portal de Familias</h2>
        <p class="text-slate-400 text-sm mb-8 font-medium">Accedé con tu email registrado</p>
        <input type="email" id="login-email" class="w-full max-w-xs p-5 bg-slate-50 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-slate-900 font-bold" placeholder="Tu email">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-xl">Entrar al Portal</button>
    </div>

    <header class="p-6 bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b flex justify-between items-center">
        <div>
            <h1 id="user-display-name" class="font-black text-xl italic text-slate-900">Hola...</h1>
            <select id="select-hijo" onchange="cambiarHijo(this.value)" class="mt-2 bg-blue-50 text-blue-700 font-black text-[10px] uppercase px-3 py-1.5 rounded-lg outline-none"></select>
        </div>
        <button onclick="switchTab('perfil')" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 shadow-inner">
            <i class="fas fa-cog"></i>
        </button>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <section id="tab-muro" class="tab-content active space-y-4"></section>

        <section id="tab-agenda" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic text-slate-900">Calendario Institucional</h3>
            <div id="container-agenda" class="space-y-3"></div>
        </section>

        <section id="tab-academico" class="tab-content space-y-6">
            <div class="flex justify-between items-end">
                <h3 class="font-black text-2xl italic text-slate-900">Desempeño</h3>
                <button onclick="generarBoletinPDF()" class="bg-blue-600 text-white text-[10px] font-bold px-4 py-2 rounded-xl shadow-lg uppercase"><i class="fas fa-file-pdf mr-1"></i> Exportar</button>
            </div>
            <div class="relative bg-slate-200 p-1 rounded-2xl flex items-center">
                <div id="switch-selector" class="absolute w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white rounded-xl shadow-sm switch-bg left-1"></div>
                <button onclick="setModalidad('num')" class="relative flex-1 py-3 text-[10px] font-black uppercase z-10 transition-colors" id="txt-num">Numérico</button>
                <button onclick="setModalidad('rite')" class="relative flex-1 py-3 text-[10px] font-black uppercase z-10 text-slate-500 transition-colors" id="txt-rite">RITE</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-3xl border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Faltas</p>
                    <p id="count-faltas" class="text-3xl font-black text-slate-900">0</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Tardanzas</p>
                    <p id="count-tardes" class="text-3xl font-black text-slate-900">0</p>
                </div>
            </div>
            <div id="container-notas" class="space-y-4"></div>
        </section>

        <section id="tab-convivencia" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic text-slate-900 uppercase tracking-tighter">Hoja de Vida</h3>
            <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase">Seguimiento de Logros y Observaciones</p>
            <div id="lista-convivencia" class="space-y-4"></div>
        </section>

        <section id="tab-perfil" class="tab-content space-y-6">
            <h3 class="font-black text-2xl italic text-slate-900">Mi Perfil</h3>
            <div class="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nombre Completo</label>
                    <input type="text" id="perfil-nombre" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Teléfono de Contacto</label>
                    <input type="text" id="perfil-tel" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700">
                </div>
                <button onclick="guardarPerfil()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg shadow-blue-100">Guardar Cambios</button>
                <button onclick="location.reload()" class="w-full text-slate-400 text-xs font-bold">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around p-4 z-[1000]">
        <button onclick="switchTab('muro')" id="nav-muro" class="nav-btn active flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-home text-xl"></i><span>MURO</span></button>
        <button onclick="switchTab('agenda')" id="nav-agenda" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-calendar-check text-xl"></i><span>AGENDA</span></button>
        <button onclick="switchTab('convivencia')" id="nav-convivencia" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-heart text-xl"></i><span>VIDA</span></button>
        <button onclick="switchTab('academico')" id="nav-academico" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-star text-xl"></i><span>BOLETÍN</span></button>
    </nav>

    <div id="modal-noticia" class="fixed inset-0 bg-slate-900/90 z-[8000] hidden flex-col p-4 backdrop-blur-sm">
        <div class="flex justify-end p-2"><button onclick="cerrarNoticia()" class="text-white text-4xl">&times;</button></div>
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg mx-auto overflow-y-auto flex-1 shadow-2xl">
            <div id="modal-contenido" class="p-6"></div>
        </div>
    </div>

    <div class="iosi-btn" onclick="toggleIosi()"><i class="fas fa-robot"></i></div>
    <div id="iosi-modal">
        <div class="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900 text-white">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><i class="fas fa-robot text-xs"></i></div>
                <div><h2 class="font-black text-sm">Iosi Inteligente</h2><p class="text-green-500 text-[8px] font-black uppercase">Analizando datos en tiempo real</p></div>
            </div>
            <button onclick="toggleIosi()" class="text-2xl">&times;</button>
        </div>
        <div id="iosi-chat"></div>
        <div class="p-3 bg-slate-800/50 flex gap-2">
            <input type="text" id="iosi-input" class="flex-1 bg-slate-900 border border-white/10 p-3 rounded-xl text-white text-xs outline-none" placeholder="Preguntame lo que quieras...">
            <button onclick="enviarIosi()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-paper-plane text-xs"></i></button>
        </div>
    </div>

    <div id="pdf-template" style="display:none; padding: 40px; font-family: sans-serif;">
        <h2 style="text-align:center;">INFORME ACADÉMICO - IOSEF CARO</h2>
        <p><b>Alumno:</b> <span id="pdf-nombre"></span> | <b>Fecha:</b> <span id="pdf-fecha"></span></p>
        <table style="width:100%; border-collapse: collapse; margin-top: 20px;">
            <thead><tr style="background:#eee;"><th style="border:1px solid #000; padding:8px;">Materia</th><th style="border:1px solid #000; padding:8px;">Nota</th></tr></thead>
            <tbody id="pdf-body"></tbody>
        </table>
    </div>

<script>
   const firebaseConfig = { apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", authDomain: "app-iosefcaro.firebaseapp.com", projectId: "app-iosefcaro", storageBucket: "app-iosefcaro.firebasestorage.app", messagingSenderId: "651320124248", appId: "1:651320124248:web:97c8ca00e29114e1983b2d" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userData = null; let userEmail = ""; let listaHijos = []; let alumnoSeleccionadoId = null;
        let brain = { noticias: [], faltas: [], notas: [], agenda: [] }; 
        let modalidadFiltro = 'num';

        async function login() {
            userEmail = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(userEmail).get();
            if (doc.exists) {
                userData = doc.data();
                if(userData.rol !== 'familia') { alert("Este acceso es solo para familias."); return; }

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-display-name').innerText = "Familia " + userData.nombre.split(' ')[0];
                document.getElementById('perfil-nombre').value = userData.nombre;
                document.getElementById('perfil-tel').value = userData.telefono || "";
                
                const select = document.getElementById('select-hijo');
                select.innerHTML = "";
                listaHijos = []; 

                if (userData.hijos && userData.hijos.length > 0) {
                    for (let hijoObj of userData.hijos) {
                        const snap = await db.collection('alumnos').where('nombre', '==', hijoObj.nombre).get();
                        snap.forEach(d => {
                            listaHijos.push({ id: d.id, nombre: d.data().nombre });
                            select.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`;
                        });
                    }
                }

                if(listaHijos.length > 0) { 
                    alumnoSeleccionadoId = listaHijos[0].id; 
                    await inicializarApp();
                } else {
                    alert("No se encontraron alumnos vinculados a esta familia.");
                }
            } else { alert("Acceso denegado. Email no registrado."); }
        }

        async function inicializarApp() {
            await cargarMuro();
            await cargarAcademico();
            await cargarAgenda();
            await cargarConvivencia();
            document.getElementById('iosi-chat').innerHTML = `<div class="bubble-iosi">¡Hola! He analizado las notas, faltas y el legajo de convivencia. ¿En qué puedo ayudarte?</div>`;
        }

        async function cargarMuro() {
            const container = document.getElementById('tab-muro');
            const snap = await db.collection('comunicados').orderBy('creadoEn', 'desc').get();
            container.innerHTML = ""; brain.noticias = [];
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id;
                brain.noticias.push(p);
                const isRead = localStorage.getItem('read_'+id);
                let img = p.link ? `<img src="${p.link}" class="w-full h-40 object-cover rounded-2xl mb-4">` : "";
                container.innerHTML += `
                    <div onclick="abrirNoticia('${id}')" class="bg-white p-6 rounded-[2rem] border shadow-sm transition-all active:scale-95 ${isRead ? 'read-post' : ''}">
                        <div class="flex justify-between mb-4"><span class="text-[9px] font-black bg-blue-50 text-blue-800 px-3 py-1 rounded-full uppercase">${p.tag || 'INFO'}</span>${isRead ? '<span class="text-[9px] font-bold text-emerald-500 uppercase">✓ LEÍDO</span>' : ''}</div>
                        ${img}<h2 class="text-xl font-black text-slate-900">${p.titulo}</h2>
                        <p class="text-slate-500 text-sm mt-2 line-clamp-2">${p.texto}</p>
                    </div>`;
            });
        }

        async function abrirNoticia(id) {
            const doc = await db.collection('comunicados').doc(id).get();
            const p = doc.data();
            const contenido = document.getElementById('modal-contenido');
            let img = p.link ? `<img src="${p.link}" class="w-full h-auto rounded-2xl mb-6">` : "";
            contenido.innerHTML = `${img}<h2 class="text-2xl font-black">${p.titulo}</h2><hr class="my-4"><p class="text-slate-600 whitespace-pre-wrap">${p.texto}</p>
                <button onclick="confirmarLectura('${id}')" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold mt-8">Confirmar Lectura</button>`;
            document.getElementById('modal-noticia').style.display = 'flex';
        }

        async function confirmarLectura(id) {
            localStorage.setItem('read_'+id, 'true');
            await db.collection('comunicados').doc(id).update({ vistas: firebase.firestore.FieldValue.increment(1) });
            await db.collection('comunicados').doc(id).collection('leidos').doc(userEmail).set({
                nombre: userData.nombre,
                fecha: new Date().toISOString()
            });
            cerrarNoticia(); cargarMuro();
        }

        function cerrarNoticia() { document.getElementById('modal-noticia').style.display = 'none'; document.body.style.overflow = 'auto'; }

        // MEJORA: ACADÉMICO CON PROMEDIO VIOLETA E INFORMES
        async function cargarAcademico() {
            const container = document.getElementById('container-notas');
            const nSnap = await db.collection('alumnos').doc(alumnoSeleccionadoId).collection('notas').get();
            container.innerHTML = ""; brain.notas = [];
            nSnap.forEach(doc => {
                const n = doc.data(); brain.notas.push(n);
                if((modalidadFiltro === 'rite' && n.rite) || (modalidadFiltro === 'num' && !n.rite)) {
                    
                    // Cálculo de promedio en vivo
                    const notasArr = [n.n1, n.n2, n.n3].filter(v => v && !isNaN(v));
                    const prom = notasArr.length > 0 ? (notasArr.reduce((a,b)=>parseFloat(a)+parseFloat(b),0)/notasArr.length).toFixed(2) : '-';

                    let notaHtml = n.rite ? `<div class="bg-blue-600 text-white p-3 rounded-xl text-center font-black text-xs uppercase">${n.rite}</div>` :
                        `<div class="grid grid-cols-4 gap-2">
                            <div class="bg-slate-50 p-2 rounded-xl text-center"><p class="text-[7px] font-bold text-slate-400 uppercase">1B</p><p class="font-black text-xs">${n.n1||'-'}</p></div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center"><p class="text-[7px] font-bold text-slate-400 uppercase">2B</p><p class="font-black text-xs">${n.n2||'-'}</p></div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center"><p class="text-[7px] font-bold text-slate-400 uppercase">3B</p><p class="font-black text-xs">${n.n3||'-'}</p></div>
                            <div class="bg-violet-50 border border-violet-100 p-2 rounded-xl text-center"><p class="text-[7px] font-black text-violet-400 uppercase">PROM</p><p class="font-black text-violet-600 text-xs">${prom}</p></div>
                        </div>`;
                    
                    let informeHtml = n.obs ? `<div class="mt-3 bg-blue-50/50 p-3 rounded-2xl border border-blue-100/50"><p class="text-[8px] font-black text-blue-400 uppercase mb-1">Informe Pedagógico</p><p class="text-[10px] text-slate-600 italic leading-relaxed">"${n.obs}"</p></div>` : "";

                    container.innerHTML += `<div class="bg-white p-6 rounded-[2rem] border shadow-sm"><p class="text-[11px] font-black uppercase mb-4 text-slate-900 italic tracking-tighter">${n.materia}</p>${notaHtml}${informeHtml}</div>`;
                }
            });
            const aSnap = await db.collection('asistencia').where('alumnoId', '==', alumnoSeleccionadoId).get();
            let f=0, t=0; brain.faltas = [];
            aSnap.forEach(d => { 
                if(d.data().estado==='A') { f++; brain.faltas.push(d.data().fecha); } 
                if(d.data().estado==='T') t++; 
            });
            document.getElementById('count-faltas').innerText = f;
            document.getElementById('count-tardes').innerText = t;
        }

        // MEJORA: CARGAR LOGROS Y SANCIONES (HOJA DE VIDA)
        async function cargarConvivencia() {
            const container = document.getElementById('lista-convivencia');
            container.innerHTML = "";
            const snap = await db.collection('alumnos').doc(alumnoSeleccionadoId).collection('convivencia').orderBy('fecha', 'desc').get();

            if(snap.empty) {
                container.innerHTML = `<div class="text-center p-10 opacity-30 font-bold text-xs">No hay registros en la hoja de vida aún.</div>`;
                return;
            }

            snap.forEach(doc => {
                const h = doc.data();
                const color = h.tipo === 'Logro' ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 
                              h.tipo === 'Sancion' ? 'bg-rose-50 border-rose-100 text-rose-700' : 
                              'bg-amber-50 border-amber-100 text-amber-700';
                const icono = h.tipo === 'Logro' ? 'fa-star' : h.tipo === 'Sancion' ? 'fa-gavel' : 'fa-eye';

                container.innerHTML += `
                    <div class="p-6 rounded-[2.5rem] border-2 ${color} transition-all shadow-sm">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <i class="fas ${icono} text-sm"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest">${h.tipo} ${h.subtipo ? '• ' + h.subtipo : ''}</span>
                            </div>
                            <span class="text-[9px] font-black opacity-50">${h.fecha}</span>
                        </div>
                        <p class="text-xs font-bold mb-3 leading-relaxed">${h.descripcion}</p>
                        <div class="pt-3 border-t border-current/10 flex justify-between items-center opacity-60">
                            <span class="text-[8px] font-black uppercase tracking-tighter">Registrado por ${h.docente}</span>
                        </div>
                    </div>`;
            });
        }

        async function cargarAgenda() {
            const container = document.getElementById('container-agenda');
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            container.innerHTML = ""; brain.agenda = [];
            snap.forEach(doc => {
                const ev = doc.data(); brain.agenda.push(ev);
                container.innerHTML += `<div class="bg-white p-4 rounded-2xl flex items-center gap-4 border shadow-sm">
                    <div class="text-center min-w-[45px] bg-slate-100 p-2 rounded-xl"><p class="text-[8px] font-black text-blue-600">${ev.fecha.split('-')[1]}</p><p class="text-xl font-black">${ev.fecha.split('-')[2]}</p></div>
                    <p class="font-bold text-slate-700 text-sm">${ev.titulo}</p></div>`;
            });
        }

        async function guardarPerfil() {
            const n = document.getElementById('perfil-nombre').value;
            const t = document.getElementById('perfil-tel').value;
            await db.collection('usuarios').doc(userEmail).update({ nombre: n, telefono: t });
            document.getElementById('user-display-name').innerText = "Familia " + n.split(' ')[0];
            alert("Perfil actualizado correctamente");
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            if(document.getElementById('nav-'+tab)) document.getElementById('nav-'+tab).classList.add('active');
        }

        function setModalidad(m) {
            modalidadFiltro = m;
            document.getElementById('switch-selector').style.left = m === 'num' ? '4px' : 'calc(50% + 0px)';
            cargarAcademico();
        }

        function cambiarHijo(id) { alumnoSeleccionadoId = id; inicializarApp(); }
        function toggleIosi() { const m = document.getElementById('iosi-modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }

                function enviarIosi() {
            const inp = document.getElementById('iosi-input'); 
            const chat = document.getElementById('iosi-chat'); 
            const val = inp.value.toLowerCase().trim();
            if(!val) return;

            chat.innerHTML += `<div class="bubble-user">${inp.value}</div>`;
            const hijo = listaHijos.find(h => h.id === alumnoSeleccionadoId);
            const primerNombre = hijo.nombre.split(' ')[0];
            
            setTimeout(() => {
                let r = `Hola. He analizado el perfil de ${primerNombre}. Puedo darte detalles sobre su rendimiento académico, su legajo de convivencia o las próximas fechas del calendario. ¿Qué necesitás saber específicamente?`;
                
                // LÓGICA DE ASISTENCIA
                if(val.includes("falta") || val.includes("inasistencia") || val.includes("asistencia")) {
                    const totalFaltas = brain.faltas.length;
                    if(totalFaltas === 0) {
                        r = `¡Excelentes noticias! **${primerNombre}** tiene asistencia perfecta hasta la fecha. No registra ninguna inasistencia en el sistema.`;
                    } else {
                        r = `**${primerNombre}** registra un total de **${totalFaltas} faltas**. Las fechas registradas son: ${brain.faltas.join(", ")}. Recordá que la regularidad es clave para el proceso pedagógico.`;
                    }
                } 
                
                // LÓGICA ACADÉMICA (DETECCIÓN DE ALERTAS Y PROMEDIOS)
                else if(val.includes("nota") || val.includes("materia") || val.includes("como va") || val.includes("rendimiento")) {
                    const conNotas = brain.notas.filter(n => n.n1 || n.n2 || n.n3 || n.rite);
                    if(conNotas.length === 0) {
                        r = `Aún no se han cargado calificaciones para este período en ninguna materia. Te sugiero estar atento a las próximas actualizaciones.`;
                    } else {
                        // Buscar la materia con nota más baja (Alerta)
                        const alertas = brain.notas.filter(n => n.n1 && parseFloat(n.n1) < 6);
                        let alertaTexto = alertas.length > 0 ? ` He detectado que en **${alertas[0].materia}** necesitaría un refuerzo (nota: ${alertas[0].n1}).` : " No detecto ninguna materia en riesgo actualmente.";
                        
                        r = `He analizado las **${conNotas.length} materias** con calificaciones. Su rendimiento general es estable.${alertaTexto} ¿Querés que te detalle alguna materia en particular?`;
                    }
                } 

                // LÓGICA DE CONVIVENCIA (HITOS)
                else if(val.includes("comportamiento") || val.includes("convivencia") || val.includes("hitos") || val.includes("vida")) {
                    // Nota: Esta parte asume que ya sincronizaste la colección 'convivencia' en tu objeto brain
                    r = `Estoy monitoreando el legajo de convivencia. Para ver el detalle completo de logros y observaciones, te sugiero visitar la nueva pestaña **"VIDA"** en el menú inferior.`;
                }

                // LÓGICA DE COMUNICADOS
                else if(val.includes("noticia") || val.includes("muro") || val.includes("comunicado") || val.includes("dijo el cole")) {
                    if(brain.noticias.length > 0) {
                        const ultima = brain.noticias[0];
                        r = `Lo más importante ahora es el comunicado: **"${ultima.titulo}"**. Dice: "${ultima.texto.substring(0, 80)}...". ¿Querés que te lo muestre completo?`;
                    } else {
                        r = "No hay comunicados recientes en el muro de noticias.";
                    }
                } 

                // LÓGICA DE EVENTOS
                else if(val.includes("evento") || val.includes("calendario") || val.includes("feriado") || val.includes("cuando hay")) {
                    if(brain.agenda.length > 0) {
                        const proximo = brain.agenda[0];
                        r = `El próximo evento importante es **"${proximo.titulo}"** programado para el día **${proximo.fecha}**. ¡Agendalo!`;
                    } else {
                        r = "No hay eventos programados en el calendario institucional por el momento.";
                    }
                }

                chat.innerHTML += `<div class="bubble-iosi">${r}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 750);
            inp.value = "";
        }


        async function generarBoletinPDF() {
            const hijo = listaHijos.find(h => h.id === alumnoSeleccionadoId);
            document.getElementById('pdf-nombre').innerText = hijo.nombre;
            document.getElementById('pdf-fecha').innerText = new Date().toLocaleDateString();
            const body = document.getElementById('pdf-body'); body.innerHTML = "";
            brain.notas.forEach(n => { body.innerHTML += `<tr><td style="border:1px solid #000;padding:8px">${n.materia}</td><td style="border:1px solid #000;padding:8px;text-align:center">${n.rite || (n.n1+'/'+n.n2)}</td></tr>`; });
            const element = document.getElementById('pdf-template');
            element.style.display = 'block';
            html2pdf().set({ margin: 0.5, filename: `Boletin_${hijo.nombre}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } }).from(element).save().then(() => element.style.display = 'none');
        }
    </script>
