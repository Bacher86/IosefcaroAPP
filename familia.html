<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Caro - Familia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 110px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* IOSI FLOAT */
        #iosi-trigger { position: fixed; bottom: 100px; right: 20px; width: 65px; height: 65px; background: #0f172a; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); z-index: 2000; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .bubble-iosi { background: rgba(255,255,255,0.1); padding: 12px 16px; border-radius: 1.2rem; border-top-left-radius: 0; max-width: 85%; }
        .bubble-user { background: #2563eb; padding: 12px 16px; border-radius: 1.2rem; border-top-right-radius: 0; max-width: 85%; margin-left: auto; }
        
        /* POST STATES */
        .read-post { opacity: 0.6; border-left: 4px solid #cbd5e1 !important; filter: grayscale(0.5); }
        .liked { color: #ef4444 !important; transform: scale(1.2); }
        .nav-btn.active { color: #2563eb; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[5000] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 bg-blue-600 rounded-[2.5rem] mb-6 flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-200"><i class="fas fa-home"></i></div>
        <h2 class="text-3xl font-black tracking-tighter mb-8">Familia Caro</h2>
        <input type="email" id="login-email" class="w-full max-w-xs p-5 bg-slate-50 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-blue-500 font-bold text-center" placeholder="email@ejemplo.com">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-lg">Ingresar</button>
    </div>

    <div id="iosi-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-2xl z-[6000] hidden flex-col p-6 text-white">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl">Iosi AI</h2>
            <button onclick="toggleIosi()" class="text-3xl">&times;</button>
        </div>
        <div id="iosi-chat" class="flex-1 overflow-y-auto space-y-4 text-sm">
            <div class="bubble-iosi">¡Hola! Soy Iosi. ¿Dudas sobre notas o faltas?</div>
        </div>
        <div class="flex gap-2 bg-white/10 p-2 rounded-[2rem] mt-4">
            <input type="text" id="iosi-input" class="flex-1 bg-transparent p-3 outline-none" placeholder="Preguntar...">
            <button onclick="enviarIosi()" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="iosi-trigger" onclick="toggleIosi()"><i class="fas fa-robot"></i></div>

    <header class="p-6 bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b flex justify-between items-end">
        <div>
            <h1 id="user-name" class="font-black text-xl tracking-tighter leading-none">Hola...</h1>
            <div class="mt-2 flex items-center gap-2 bg-blue-50 px-3 py-1 rounded-full">
                <i class="fas fa-child text-blue-500 text-[10px]"></i>
                <select id="select-hijo" onchange="cambiarHijo(this.value)" class="bg-transparent text-blue-600 font-black text-[10px] uppercase outline-none border-none">
                    </select>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto min-h-screen">
        <section id="tab-muro" class="tab-content active space-y-4"></section>

        <section id="tab-boletin" class="tab-content space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-rose-50 p-5 rounded-[2rem] border border-rose-100 text-center">
                    <p class="text-[9px] font-black text-rose-400 uppercase">Inasistencias</p>
                    <p id="count-faltas" class="text-4xl font-black text-rose-600">0</p>
                </div>
                <div class="bg-amber-50 p-5 rounded-[2rem] border border-amber-100 text-center">
                    <p class="text-[9px] font-black text-amber-400 uppercase">Tardanzas</p>
                    <p id="count-tardes" class="text-4xl font-black text-amber-600">0</p>
                </div>
            </div>
            <div id="container-notas" class="space-y-4"></div>
            <div id="container-informes" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-4 right-4 bg-white/90 backdrop-blur-md border shadow-2xl rounded-[2.5rem] mb-6 flex justify-around p-3 z-[4000]">
        <button onclick="switchTab('muro')" id="btn-muro" class="nav-btn active flex flex-col items-center gap-1 font-bold text-[10px]"><i class="fas fa-home text-xl"></i><span>INICIO</span></button>
        <button onclick="switchTab('boletin')" id="btn-boletin" class="nav-btn flex flex-col items-center gap-1 font-bold text-[10px]"><i class="fas fa-graduation-cap text-xl"></i><span>BOLETÍN</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userData = null;
        let listaHijos = [];
        let alumnoId = null;

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();
            if (doc.exists && doc.data().rol === 'familia') {
                userData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-name').innerText = "Familia " + userData.nombre;
                
                // Buscar hijos (soporta varios separados por coma en el Admin)
                const nombresHijos = userData.hijoReferencia.split(',');
                const select = document.getElementById('select-hijo');
                select.innerHTML = "";
                
                for (let nombre of nombresHijos) {
                    const snap = await db.collection('alumnos').where('nombre', '==', nombre.trim()).get();
                    snap.forEach(alDoc => {
                        listaHijos.push({ id: alDoc.id, nombre: alDoc.data().nombre });
                        select.innerHTML += `<option value="${alDoc.id}">${alDoc.data().nombre}</option>`;
                    });
                }
                if(listaHijos.length > 0) {
                    alumnoId = listaHijos[0].id;
                    cargarMuro();
                }
            } else { alert("Acceso denegado."); }
        }

        function cambiarHijo(id) {
            alumnoId = id;
            if(document.getElementById('tab-boletin').classList.contains('active')) cargarDatosAcademicos();
            alert("Cargando datos de " + listaHijos.find(h => h.id === id).nombre);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            if(tab === 'boletin') cargarDatosAcademicos();
        }

        async function cargarMuro() {
            const container = document.getElementById('tab-muro');
            const snap = await db.collection('comunicados').orderBy('creadoEn', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id;
                const isRead = localStorage.getItem('read_' + id);
                const isLiked = localStorage.getItem('like_' + id);
                container.innerHTML += `
                    <div id="post-${id}" class="bg-white p-6 rounded-[2.5rem] border shadow-sm ${isRead?'read-post':''}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase">${p.tag}</span>
                            <div class="flex gap-4">
                                <button onclick="toggleLike('${id}')" class="${isLiked?'liked':''} text-slate-300 transition-all"><i class="fas fa-heart"></i></button>
                                <button onclick="marcarLeido('${id}')" class="text-[9px] font-black uppercase ${isRead?'text-blue-500':'text-slate-300'}">
                                    ${isRead ? '✓ Leído' : 'Marcar lectura'}
                                </button>
                            </div>
                        </div>
                        <h2 class="text-xl font-black leading-tight">${p.titulo}</h2>
                        <p class="text-slate-500 text-sm mt-2">${p.texto}</p>
                    </div>`;
            });
        }

        function toggleLike(id) {
            const current = localStorage.getItem('like_' + id);
            current ? localStorage.removeItem('like_' + id) : localStorage.setItem('like_' + id, true);
            cargarMuro();
        }

        function marcarLeido(id) {
            localStorage.setItem('read_' + id, true);
            cargarMuro();
        }

        async function cargarDatosAcademicos() {
            if(!alumnoId) return;
            // Notas
            const nCont = document.getElementById('container-notas');
            const nSnap = await db.collection('alumnos').doc(alumnoId).collection('notas').get();
            nCont.innerHTML = '<h3 class="font-black text-xl mb-4">Calificaciones</h3>';
            nSnap.forEach(doc => {
                const n = doc.data();
                nCont.innerHTML += `<div class="bg-white p-6 rounded-3xl border shadow-sm"><p class="text-xs font-black text-blue-600 uppercase mb-4">${n.materia}</p>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-slate-50 p-3 rounded-2xl"><p class="text-[8px] font-bold text-slate-400">1T</p><p class="font-black text-xl">${n.n1||'-'}</p></div>
                        <div class="bg-slate-50 p-3 rounded-2xl"><p class="text-[8px] font-bold text-slate-400">2T</p><p class="font-black text-xl">${n.n2||'-'}</p></div>
                        <div class="bg-slate-50 p-3 rounded-2xl"><p class="text-[8px] font-bold text-slate-400">3T</p><p class="font-black text-xl">${n.n3||'-'}</p></div>
                    </div></div>`;
            });
            // Faltas
            const aSnap = await db.collection('asistencia').where('alumnoId', '==', alumnoId).get();
            let f = 0; let t = 0;
            aSnap.forEach(doc => { if(doc.data().estado==='A') f++; if(doc.data().estado==='T') t++; });
            document.getElementById('count-faltas').innerText = f;
            document.getElementById('count-tardes').innerText = t;
        }

        function toggleIosi() {
            const m = document.getElementById('iosi-modal');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }

        function enviarIosi() {
            const input = document.getElementById('iosi-input');
            const chat = document.getElementById('iosi-chat');
            const val = input.value.toLowerCase();
            if(!val) return;
            chat.innerHTML += `<div class="bubble-user text-sm">${input.value}</div>`;
            input.value = "";
            setTimeout(() => {
                let r = "Mmm, para esa info mejor contactá a secretaría.";
                if(val.includes("falta") || val.includes("asistencia")) {
                    r = "El alumno tiene un total de " + document.getElementById('count-faltas').innerText + " inasistencias.";
                } else if(val.includes("nota") || val.includes("como va")) {
                    r = "Podés revisar las calificaciones en la pestaña de Boletín. ¡Viene trabajando bien!";
                }
                chat.innerHTML += `<div class="bubble-iosi text-sm">${r}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
