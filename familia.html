<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Caro - Familia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 110px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        .nav-btn.active { color: #2563eb; }
        .nav-btn.active i { background: #eff6ff; padding: 10px; border-radius: 15px; }
        
        /* IOSI FLOAT */
        .iosi-btn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: #1e293b; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000; animation: bounce 2s infinite; }
        
        /* POST STATES */
        .read-post { opacity: 0.6; border-left: 4px solid #cbd5e1 !important; filter: grayscale(0.5); }
        .liked { color: #ef4444 !important; transform: scale(1.2); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[3000] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 bg-blue-600 rounded-[2rem] mb-6 flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-100"><i class="fas fa-home"></i></div>
        <h2 class="text-3xl font-black tracking-tighter mb-8">Panel Familiar</h2>
        <input type="email" id="login-email" class="w-full max-w-xs p-5 bg-slate-50 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-blue-500 font-bold" placeholder="tu-email@gmail.com">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-5 rounded-2xl font-bold">Ingresar</button>
    </div>

    <div id="iosi-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[4000] hidden flex-col p-6 text-white">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-black text-xl">Iosi AI</h2>
            <button onclick="toggleIosi()" class="text-3xl">&times;</button>
        </div>
        <div id="iosi-chat" class="flex-1 overflow-y-auto space-y-4 text-sm">
            <div class="bg-white/10 p-4 rounded-2xl">¡Hola! Soy Iosi. ¿Dudas con las inasistencias o el calendario?</div>
        </div>
        <div class="flex gap-2 bg-white/10 p-2 rounded-[2rem] mt-4">
            <input type="text" id="iosi-input" class="flex-1 bg-transparent p-3 outline-none" placeholder="Preguntar...">
            <button onclick="enviarIosi()" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="iosi-btn" onclick="toggleIosi()"><i class="fas fa-robot"></i></div>

    <header class="p-6 bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b flex justify-between items-center">
        <div>
            <h1 id="user-name" class="font-black text-xl tracking-tighter">Hola...</h1>
            <p id="hijo-tag" class="text-[9px] font-black text-blue-600 uppercase tracking-widest mt-1">Cargando...</p>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <section id="tab-muro" class="tab-content active space-y-4"></section>

        <section id="tab-agenda" class="tab-content">
            <h3 class="font-black text-2xl mb-4">Próximos Eventos</h3>
            <div id="container-agenda" class="space-y-3"></div>
        </section>

        <section id="tab-academico" class="tab-content space-y-6">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-rose-50 p-4 rounded-3xl border border-rose-100 text-center">
                    <p class="text-[9px] font-black text-rose-400 uppercase">Inasistencias</p>
                    <p id="count-faltas" class="text-2xl font-black text-rose-600">0</p>
                </div>
                <div class="bg-amber-50 p-4 rounded-3xl border border-amber-100 text-center">
                    <p class="text-[9px] font-black text-amber-400 uppercase">Tardanzas</p>
                    <p id="count-tardes" class="text-2xl font-black text-amber-600">0</p>
                </div>
            </div>
            <div id="container-notas" class="space-y-4"></div>
            <div id="container-informes" class="space-y-3"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-[1000]">
        <button onclick="switchTab('muro')" id="nav-muro" class="nav-btn active flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-home text-xl"></i><span>INICIO</span></button>
        <button onclick="switchTab('agenda')" id="nav-agenda" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-calendar-day text-xl"></i><span>AGENDA</span></button>
        <button onclick="switchTab('academico')" id="nav-academico" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-graduation-cap text-xl"></i><span>BOLETÍN</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userData = null; let alumnoId = null;

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();
            if (doc.exists && doc.data().rol === 'familia') {
                userData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-name').innerText = "Familia " + userData.nombre;
                document.getElementById('hijo-tag').innerText = "Vínculo: " + userData.hijoReferencia;
                
                const snapAl = await db.collection('alumnos').where('nombre', '==', userData.hijoReferencia).get();
                if(!snapAl.empty) { 
                    alumnoId = snapAl.docs[0].id;
                    cargarMuro();
                }
            } else { alert("Acceso incorrecto."); }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
            if(tab === 'agenda') cargarAgenda();
            if(tab === 'academico') cargarAcademico();
        }

        // --- MURO: LIKES Y LECTURA ---
        async function cargarMuro() {
            const container = document.getElementById('tab-muro');
            const snap = await db.collection('comunicados').orderBy('creadoEn', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id;
                const isRead = localStorage.getItem('read_'+id);
                const isLiked = localStorage.getItem('like_'+id);
                
                container.innerHTML += `
                    <div id="post-${id}" class="bg-white p-6 rounded-[2.5rem] border shadow-sm ${isRead?'read-post':''}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase">${p.tag}</span>
                            <div class="flex gap-4 items-center">
                                <button onclick="darLike('${id}')" class="transition-all ${isLiked?'liked':''}"><i class="fas fa-heart"></i></button>
                                <button onclick="marcarLeido('${id}')" class="text-[9px] font-black uppercase ${isRead?'text-blue-500':'text-slate-300'}">
                                    ${isRead ? '<i class="fas fa-check-double"></i> Leído' : 'Confirmar Lectura'}
                                </button>
                            </div>
                        </div>
                        <h2 class="text-xl font-black leading-tight">${p.titulo}</h2>
                        <p class="text-slate-500 text-sm mt-2 leading-relaxed">${p.texto}</p>
                    </div>`;
            });
        }

        function darLike(id) {
            if(localStorage.getItem('like_'+id)) return;
            localStorage.setItem('like_'+id, true);
            cargarMuro();
        }

        function marcarLeido(id) {
            localStorage.setItem('read_'+id, true);
            cargarMuro();
        }

        // --- AGENDA ---
        async function cargarAgenda() {
            const container = document.getElementById('container-agenda');
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const ev = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex items-center gap-4 border">
                        <div class="bg-blue-600 text-white p-3 rounded-xl font-black min-w-[50px] text-center">
                            <span class="text-lg">${ev.fecha.split('-')[2]}</span>
                        </div>
                        <h4 class="font-bold text-slate-700 text-sm">${ev.titulo}</h4>
                    </div>`;
            });
        }

        // --- ACADÉMICO ---
        async function cargarAcademico() {
            if(!alumnoId) return;
            
            // Notas por materia (No se pisan)
            const nCont = document.getElementById('container-notas');
            const nSnap = await db.collection('alumnos').doc(alumnoId).collection('notas').get();
            nCont.innerHTML = '<h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Calificaciones</h4>';
            nSnap.forEach(doc => {
                const n = doc.data();
                nCont.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border shadow-sm">
                        <p class="text-xs font-black text-blue-600 uppercase mb-3">${n.materia}</p>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="bg-slate-50 p-2 rounded-xl text-center"><p class="text-[7px] font-black text-slate-400">1T</p><p class="font-black text-lg">${n.n1||'-'}</p></div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center"><p class="text-[7px] font-black text-slate-400">2T</p><p class="font-black text-lg">${n.n2||'-'}</p></div>
                            <div class="bg-slate-50 p-2 rounded-xl text-center"><p class="text-[7px] font-black text-slate-400">3T</p><p class="font-black text-lg">${n.n3||'-'}</p></div>
                        </div>
                    </div>`;
            });

            // Asistencia (Cálculo de totales)
            const aSnap = await db.collection('asistencia').where('alumnoId', '==', alumnoId).get();
            let faltas = 0; let tardes = 0;
            aSnap.forEach(doc => {
                if(doc.data().estado === 'A') faltas++;
                if(doc.data().estado === 'T') tardes++;
            });
            document.getElementById('count-faltas').innerText = faltas;
            document.getElementById('count-tardes').innerText = tardes;

            // Sanciones
            const sCont = document.getElementById('container-informes');
            const sSnap = await db.collection('alumnos').doc(alumnoId).collection('sanciones').get();
            sCont.innerHTML = '<h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-6 mb-2">Conducta</h4>';
            sSnap.forEach(doc => {
                const s = doc.data();
                sCont.innerHTML += `<div class="bg-rose-50 border border-rose-100 p-4 rounded-2xl"><p class="text-xs font-bold text-rose-800">${s.motivo}</p><p class="text-[9px] font-bold text-rose-300 uppercase mt-2">${s.fecha}</p></div>`;
            });
        }

        // --- IOSI ---
        function toggleIosi() {
            const m = document.getElementById('iosi-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
        function enviarIosi() {
            const inp = document.getElementById('iosi-input');
            const chat = document.getElementById('iosi-chat');
            if(!inp.value) return;
            chat.innerHTML += `<div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none ml-auto max-w-[80%]">${inp.value}</div>`;
            const q = inp.value; inp.value = "";
            setTimeout(() => {
                chat.innerHTML += `<div class="bg-white/10 p-3 rounded-2xl rounded-tl-none max-w-[80%]">Entiendo tu consulta sobre "${q}". Estoy analizando los datos del colegio para responderte.</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
