<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Familia - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; padding-bottom: 90px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        .nav-active { color: #2563eb; transform: translateY(-5px); }
        .nav-active i { background: #eff6ff; padding: 10px; border-radius: 15px; }
        .iosi-float { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: #1e293b; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000; animation: bounce 2s infinite; cursor: pointer; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .liked { color: #ef4444 !important; }
        .read { opacity: 0.6; border-left: 4px solid #cbd5e1 !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center p-8">
        <div class="w-20 h-20 bg-blue-600 rounded-[2rem] mb-6 flex items-center justify-center text-white text-3xl shadow-2xl">
            <i class="fas fa-heart"></i>
        </div>
        <h2 class="text-3xl font-black tracking-tighter mb-2">Comunidad Caro</h2>
        <input type="email" id="login-email" class="w-full max-w-xs p-5 bg-slate-50 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-blue-500 font-bold" placeholder="tu-email@gmail.com">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-xl">Entrar</button>
    </div>

    <div id="modal-iosi" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[3000] hidden flex-col p-6">
        <div class="flex justify-between items-center mb-8 text-white">
            <h2 class="font-black text-2xl">Iosi AI</h2>
            <button onclick="cerrarIosi()" class="text-3xl">&times;</button>
        </div>
        <div id="chat-iosi" class="flex-1 overflow-y-auto space-y-4 mb-4">
            <div class="bg-white/10 p-4 rounded-2xl rounded-tl-none text-white/90 max-w-[80%] text-sm">¡Hola! Soy Iosi. ¿Tenés dudas sobre el uniforme, horarios o comedor? Preguntame lo que quieras.</div>
        </div>
        <div class="flex gap-2">
            <input type="text" id="pregunta-iosi" class="flex-1 bg-white/10 border-none rounded-2xl p-4 text-white outline-none" placeholder="Escribí tu duda...">
            <button onclick="preguntarIosi()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="iosi-float" onclick="abrirIosi()"><i class="fas fa-robot"></i></div>

    <header class="bg-white/80 backdrop-blur-md p-6 sticky top-0 z-50 flex justify-between items-center border-b">
        <div>
            <h1 class="font-extrabold text-xl tracking-tighter" id="user-name">Hola...</h1>
            <p class="text-[9px] font-bold text-blue-600 uppercase tracking-widest" id="hijo-tag">Cargando perfil...</p>
        </div>
        <div class="w-10 h-10 bg-slate-100 rounded-full border-2 border-white shadow-sm overflow-hidden">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" alt="avatar">
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto min-h-screen">
        
        <section id="tab-muro" class="tab-content active space-y-4">
            <div id="muro-container"></div>
        </section>

        <section id="tab-agenda" class="tab-content space-y-4">
            <h3 class="font-black text-2xl mb-4">Calendario Escolar</h3>
            <div id="agenda-container" class="space-y-3"></div>
        </section>

        <section id="tab-notas" class="tab-content space-y-6">
            <h3 class="font-black text-2xl mb-2">Desempeño</h3>
            <div id="notas-container" class="space-y-4"></div>
            
            <div id="asistencia-container" class="space-y-2">
                <h3 class="font-black text-sm uppercase text-slate-400 mt-6">Asistencias y Tardanzas</h3>
            </div>

            <div id="sanciones-container" class="space-y-2">
                <h3 class="font-black text-sm uppercase text-rose-500 mt-6">Sanciones e Informes</h3>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t flex justify-around p-3 z-[1000]">
        <button onclick="switchTab('muro')" id="nav-muro" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400 nav-active">
            <i class="fas fa-home text-lg"></i><span>INICIO</span>
        </button>
        <button onclick="switchTab('agenda')" id="nav-agenda" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400">
            <i class="fas fa-calendar-alt text-lg"></i><span>AGENDA</span>
        </button>
        <button onclick="switchTab('notas')" id="nav-notas" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400">
            <i class="fas fa-file-invoice text-lg"></i><span>BOLETÍN</span>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI",
            authDomain: "app-iosefcaro.firebaseapp.com",
            projectId: "app-iosefcaro",
            storageBucket: "app-iosefcaro.firebasestorage.app",
            messagingSenderId: "651320124248",
            appId: "1:651320124248:web:97c8ca00e29114e1983b2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userData = null;
        let alumnoId = null;

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();

            if (doc.exists && doc.data().rol === 'familia') {
                userData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-name').innerText = "Familia " + userData.nombre;
                document.getElementById('hijo-tag').innerText = "Alumno: " + userData.hijoReferencia;
                
                // Buscar el ID del alumno para las subcolecciones
                const snapAlum = await db.collection('alumnos').where('nombre', '==', userData.hijoReferencia).get();
                if(!snapAlum.empty) alumnoId = snapAlum.docs[0].id;

                cargarMuro();
            } else {
                alert("Email no registrado.");
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('nav-active');
            
            if(tab === 'muro') cargarMuro();
            if(tab === 'agenda') cargarAgenda();
            if(tab === 'notas') cargarNotasYBoletin();
        }

        // --- LÓGICA DEL MURO ---
        async function cargarMuro() {
            const container = document.getElementById('muro-container');
            container.innerHTML = '<p class="text-center py-20 text-slate-400">Actualizando muro...</p>';
            const snap = await db.collection('comunicados').orderBy('creadoEn', 'desc').get();
            container.innerHTML = "";
            
            snap.forEach(doc => {
                const post = doc.data();
                const id = doc.id;
                const isLiked = localStorage.getItem('like_' + id);
                const isRead = localStorage.getItem('read_' + id);

                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-4 ${isRead ? 'read' : ''}" id="post-${id}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase tracking-tighter">${post.tag}</span>
                            <div class="flex gap-3">
                                <button onclick="toggleLike('${id}')" class="text-slate-300 ${isLiked ? 'liked' : ''} transition-colors"><i class="fas fa-heart text-lg"></i></button>
                                <button onclick="marcarLeido('${id}')" class="text-slate-300 ${isRead ? 'text-blue-500' : ''}"><i class="fas fa-check-double"></i></button>
                            </div>
                        </div>
                        <h2 class="text-xl font-black leading-tight">${post.titulo}</h2>
                        <p class="text-slate-500 text-sm mt-2 mb-4 leading-relaxed">${post.texto}</p>
                        ${post.link ? `<a href="${post.link}" target="_blank" class="block w-full bg-slate-900 text-white text-center py-4 rounded-2xl font-bold text-xs mb-2">Ver Galería Multimedia</a>` : ''}
                        ${post.form ? `<a href="${post.form}" target="_blank" class="block w-full bg-blue-600 text-white text-center py-4 rounded-2xl font-bold text-xs">Completar Formulario</a>` : ''}
                    </div>`;
            });
        }

        function toggleLike(id) {
            if(localStorage.getItem('like_' + id)) return; // Solo una vez
            localStorage.setItem('like_' + id, true);
            cargarMuro(); // Recargar para mostrar el color
        }

        function marcarLeido(id) {
            localStorage.setItem('read_' + id, true);
            document.getElementById('post-' + id).classList.add('read');
        }

        // --- LÓGICA AGENDA ---
        async function cargarAgenda() {
            const container = document.getElementById('agenda-container');
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const ev = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex items-center gap-4 border">
                        <div class="bg-blue-50 text-blue-600 p-3 rounded-xl font-black text-center min-w-[55px]">
                            <span class="block text-[8px] uppercase">${new Date(ev.fecha).toLocaleString('es', {month:'short'})}</span>
                            <span class="text-lg">${new Date(ev.fecha).getDate() + 1}</span>
                        </div>
                        <h4 class="font-bold text-slate-700 text-sm">${ev.titulo}</h4>
                    </div>`;
            });
        }

        // --- LÓGICA BOLETÍN (NOTAS POR MATERIA, ASISTENCIA Y SANCIONES) ---
        async function cargarNotasYBoletin() {
            if(!alumnoId) return;

            // 1. Cargar Notas por Materia
            
async function cargarNotasYBoletin() {
    if(!alumnoId) return;

    const notasContainer = document.getElementById('notas-container');
    notasContainer.innerHTML = '<p class="text-xs text-slate-400">Cargando boletín...</p>';
    
    // Traemos TODAS las materias guardadas en la subcolección
    const notasSnap = await db.collection('alumnos').doc(alumnoId).collection('notas').get();
    
    if(notasSnap.empty) {
        notasContainer.innerHTML = '<p class="text-center py-10 text-slate-400 text-xs">Aún no hay notas cargadas.</p>';
    } else {
        notasContainer.innerHTML = ""; // Limpiamos el "Cargando..."
        notasSnap.forEach(doc => {
            const n = doc.data();
            // Creamos una tarjeta por cada materia encontrada
            notasContainer.innerHTML += `
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm mb-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${n.materia}</span>
                        <span class="text-[8px] text-slate-300 font-bold">${n.fechaUpdate || ''}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-slate-50 p-3 rounded-xl text-center">
                            <p class="text-[8px] font-bold text-slate-400 uppercase">1° T</p>
                            <p class="font-black text-xl">${n.n1 || '-'}</p>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl text-center">
                            <p class="text-[8px] font-bold text-slate-400 uppercase">2° T</p>
                            <p class="font-black text-xl">${n.n2 || '-'}</p>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl text-center">
                            <p class="text-[8px] font-bold text-slate-400 uppercase">3° T</p>
                            <p class="font-black text-xl">${n.n3 || '-'}</p>
                        </div>
                    </div>
                </div>`;
        });
    }
    
    // (Mantené aquí abajo el código de Asistencia y Sanciones que ya tenías)
}
            
            // 2. Cargar Asistencias
            const asisContainer = document.getElementById('asistencia-container');
            const asisSnap = await db.collection('asistencia').where('alumnoId', '==', alumnoId).orderBy('fecha', 'desc').limit(10).get();
            asisContainer.innerHTML = '<h3 class="font-black text-sm uppercase text-slate-400 mt-6">Últimas Asistencias</h3>';
            
            asisSnap.forEach(doc => {
                const a = doc.data();
                const color = a.estado === 'P' ? 'emerald' : a.estado === 'A' ? 'rose' : 'amber';
                const label = a.estado === 'P' ? 'Presente' : a.estado === 'A' ? 'Ausente' : 'Tarde';
                asisContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border-l-4 border-${color}-500 shadow-xs">
                        <span class="text-xs font-bold text-slate-600">${a.fecha}</span>
                        <span class="text-[10px] font-black text-${color}-600 uppercase">${label} ${a.justificativo ? ' (J)' : ''}</span>
                    </div>`;
            });

            // 3. Cargar Sanciones
            const sancContainer = document.getElementById('sanciones-container');
            const sancSnap = await db.collection('alumnos').doc(alumnoId).collection('sanciones').get();
            sancContainer.innerHTML = '<h3 class="font-black text-sm uppercase text-rose-500 mt-6">Conducta e Informes</h3>';
            
            sancSnap.forEach(doc => {
                const s = doc.data();
                sancContainer.innerHTML += `
                    <div class="bg-rose-50 p-4 rounded-2xl border border-rose-100">
                        <p class="text-xs font-bold text-rose-700 leading-snug">${s.motivo}</p>
                        <p class="text-[9px] text-rose-400 font-bold mt-2">${s.fecha} - Prof. ${s.docente}</p>
                    </div>`;
            });
        }

        // --- IOSI AI ---
        function abrirIosi() { document.getElementById('modal-iosi').style.display = 'flex'; }
        function cerrarIosi() { document.getElementById('modal-iosi').style.display = 'none'; }

        function preguntarIosi() {
            const input = document.getElementById('pregunta-iosi');
            const chat = document.getElementById('chat-iosi');
            if(!input.value) return;
            chat.innerHTML += `<div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none text-white text-right ml-auto max-w-[80%] text-sm">${input.value}</div>`;
            const msg = input.value;
            input.value = "";
            setTimeout(() => {
                chat.innerHTML += `<div class="bg-white/10 p-4 rounded-2xl rounded-tl-none text-white/90 max-w-[80%] text-sm">Entiendo tu consulta sobre "${msg}". Como asistente del Iosef Caro, te informo que estamos procesando la base de datos oficial para darte una respuesta exacta.</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
