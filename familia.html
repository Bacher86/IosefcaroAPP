<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Caro - Portal de Familia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 110px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* CORRECCIÓN IOSI CHAT */
        #iosi-modal { 
            position: fixed; inset: 0; background: #0f172a; z-index: 6000; 
            display: none; flex-direction: column; 
        }
        #iosi-chat { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }
        .bubble-iosi { 
            background: #1e293b; color: #f1f5f9; padding: 14px; border-radius: 20px; 
            border-top-left-radius: 4px; max-width: 85%; align-self: flex-start;
            border: 1px solid #334155; line-height: 1.5; font-size: 14px;
        }
        .bubble-user { 
            background: #2563eb; color: white; padding: 14px; border-radius: 20px; 
            border-top-right-radius: 4px; max-width: 85%; align-self: flex-end;
            font-weight: 500; font-size: 14px;
        }
        .iosi-btn { position: fixed; bottom: 100px; right: 20px; width: 65px; height: 65px; background: #0f172a; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); z-index: 2000; cursor: pointer; }
        .read-post { opacity: 0.6; filter: grayscale(0.5); }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white z-[7000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-slate-900 rounded-[2rem] mb-6 flex items-center justify-center text-white text-3xl"><i class="fas fa-university"></i></div>
        <h2 class="text-3xl font-black mb-2 tracking-tighter">Portal de Familias</h2>
        <input type="email" id="login-email" class="w-full max-w-xs p-5 bg-slate-50 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-slate-900 font-bold" placeholder="Email institucional">
        <button onclick="login()" class="w-full max-w-xs bg-slate-900 text-white p-5 rounded-2xl font-bold">Acceder</button>
    </div>

    <div id="iosi-modal">
        <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-robot text-white"></i></div>
                <div>
                    <h2 class="text-white font-black text-lg">Asistente Iosi</h2>
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Atención Institucional</p>
                </div>
            </div>
            <button onclick="toggleIosi()" class="text-white text-3xl">&times;</button>
        </div>
        
        <div id="iosi-chat">
            <div class="bubble-iosi">Estimada familia, ¿en qué puedo asistirle hoy respecto a la información académica de sus hijos?</div>
        </div>

        <div class="p-4 bg-slate-800/50 border-t border-white/10 flex gap-2">
            <input type="text" id="iosi-input" class="flex-1 bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none" placeholder="Escriba su consulta...">
            <button onclick="enviarIosi()" class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="iosi-btn" onclick="toggleIosi()"><i class="fas fa-robot"></i></div>

    <header class="p-6 bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b flex justify-between items-center">
        <div>
            <h1 id="user-name" class="font-black text-xl">Hola...</h1>
            <select id="select-hijo" onchange="cambiarHijo(this.value)" class="mt-2 bg-slate-100 text-slate-700 font-bold text-[10px] uppercase px-3 py-1.5 rounded-lg border-none outline-none"></select>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <section id="tab-muro" class="tab-content active space-y-4"></section>
        <section id="tab-agenda" class="tab-content space-y-4">
            <h3 class="font-black text-2xl mb-4">Agenda Institucional</h3>
            <div id="container-agenda" class="space-y-3"></div>
        </section>
        <section id="tab-academico" class="tab-content space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-3xl border text-center shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Faltas</p>
                    <p id="count-faltas" class="text-3xl font-black">0</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border text-center shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Tardes</p>
                    <p id="count-tardes" class="text-3xl font-black">0</p>
                </div>
            </div>
            <div id="container-notas" class="space-y-4"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-[1000]">
        <button onclick="switchTab('muro')" id="nav-muro" class="nav-btn active flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-home text-xl"></i><span>INICIO</span></button>
        <button onclick="switchTab('agenda')" id="nav-agenda" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-calendar-alt text-xl"></i><span>AGENDA</span></button>
        <button onclick="switchTab('academico')" id="nav-academico" class="nav-btn flex flex-col items-center gap-1 font-bold text-[9px] text-slate-400"><i class="fas fa-graduation-cap text-xl"></i><span>BOLETÍN</span></button>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD4pg_8j_CbgeqA1x8IOqn3CxpXepVWQtI", authDomain: "app-iosefcaro.firebaseapp.com", projectId: "app-iosefcaro", storageBucket: "app-iosefcaro.firebasestorage.app", messagingSenderId: "651320124248", appId: "1:651320124248:web:97c8ca00e29114e1983b2d" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userData = null; let listaHijos = []; let alumnoSeleccionadoId = null;
        let fechasInasistencias = [];

        async function login() {
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const doc = await db.collection('usuarios').doc(email).get();
            if (doc.exists && doc.data().rol === 'familia') {
                userData = doc.data();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-name').innerText = "Familia " + userData.nombre;
                const nombresHijos = userData.hijoReferencia.split(',');
                const select = document.getElementById('select-hijo');
                select.innerHTML = "";
                for (let nombre of nombresHijos) {
                    const snap = await db.collection('alumnos').where('nombre', '==', nombre.trim()).get();
                    snap.forEach(alDoc => {
                        listaHijos.push({ id: alDoc.id, nombre: alDoc.data().nombre });
                        select.innerHTML += `<option value="${alDoc.id}">${alDoc.data().nombre}</option>`;
                    });
                }
                if(listaHijos.length > 0) { alumnoSeleccionadoId = listaHijos[0].id; cargarMuro(); }
            } else { alert("Credenciales incorrectas."); }
        }

        function cambiarHijo(id) { alumnoSeleccionadoId = id; if(document.getElementById('tab-academico').classList.contains('active')) cargarAcademico(); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
            if(tab === 'agenda') cargarAgenda();
            if(tab === 'academico') cargarAcademico();
        }

        async function cargarMuro() {
            const container = document.getElementById('tab-muro');
            const snap = await db.collection('comunicados').orderBy('creadoEn', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id; const isRead = localStorage.getItem('read_'+id);
                container.innerHTML += `<div id="post-${id}" class="bg-white p-6 rounded-[2rem] border shadow-sm ${isRead?'read-post':''}">
                    <div class="flex justify-between mb-4"><span class="text-[9px] font-black bg-blue-50 text-blue-800 px-3 py-1 rounded-full uppercase">${p.tag}</span>
                    <button onclick="marcarLeido('${id}')" class="text-[9px] font-bold uppercase text-slate-400">${isRead?'✓ Notificado':'Confirmar lectura'}</button></div>
                    <h2 class="text-xl font-black">${p.titulo}</h2><p class="text-slate-500 text-sm mt-2 leading-relaxed">${p.texto}</p></div>`;
            });
        }

        async function cargarAgenda() {
            const container = document.getElementById('container-agenda');
            const snap = await db.collection('eventos').orderBy('fecha', 'asc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const ev = doc.data();
                container.innerHTML += `<div class="bg-white p-4 rounded-2xl flex items-center gap-4 border shadow-sm">
                    <div class="text-center min-w-[40px]"><p class="text-[10px] font-bold text-slate-400">${ev.fecha.split('-')[1]}</p><p class="text-xl font-black">${ev.fecha.split('-')[2]}</p></div>
                    <p class="font-bold text-slate-700 text-sm">${ev.titulo}</p></div>`;
            });
        }

        async function cargarAcademico() {
            if(!alumnoSeleccionadoId) return;
            const nSnap = await db.collection('alumnos').doc(alumnoSeleccionadoId).collection('notas').get();
            document.getElementById('container-notas').innerHTML = "";
            nSnap.forEach(doc => {
                const n = doc.data();
                document.getElementById('container-notas').innerHTML += `<div class="bg-white p-5 rounded-3xl border">
                    <p class="text-xs font-black text-blue-900 uppercase mb-3">${n.materia}</p>
                    <div class="grid grid-cols-3 gap-2 text-center text-sm">
                        <div class="bg-slate-50 p-2 rounded-xl"><p class="text-[8px] font-bold text-slate-400 uppercase">1° Trim</p><p class="font-black">${n.n1||'-'}</p></div>
                        <div class="bg-slate-50 p-2 rounded-xl"><p class="text-[8px] font-bold text-slate-400 uppercase">2° Trim</p><p class="font-black">${n.n2||'-'}</p></div>
                        <div class="bg-slate-50 p-2 rounded-xl"><p class="text-[8px] font-bold text-slate-400 uppercase">3° Trim</p><p class="font-black">${n.n3||'-'}</p></div>
                    </div></div>`;
            });

            const aSnap = await db.collection('asistencia').where('alumnoId', '==', alumnoSeleccionadoId).get();
            let f = 0; let t = 0; fechasInasistencias = [];
            aSnap.forEach(doc => { 
                const d = doc.data();
                if(d.estado==='A') { f++; fechasInasistencias.push(d.fecha); }
                if(d.estado==='T') t++; 
            });
            document.getElementById('count-faltas').innerText = f;
            document.getElementById('count-tardes').innerText = t;
        }

        function marcarLeido(id) { localStorage.setItem('read_'+id, 'true'); cargarMuro(); }
        
        function toggleIosi() { 
            const m = document.getElementById('iosi-modal'); 
            m.style.display = m.style.display==='flex'?'none':'flex'; 
        }
        
        function enviarIosi() {
            const inp = document.getElementById('iosi-input');
            const chat = document.getElementById('iosi-chat');
            const val = inp.value.toLowerCase();
            if(!val) return;
            
            chat.innerHTML += `<div class="bubble-user">${inp.value}</div>`;
            
            setTimeout(() => {
                let r = "Disculpe, no he comprendido su solicitud. Puede consultar por inasistencias o boletín.";
                const nombreHijo = listaHijos.find(h => h.id === alumnoSeleccionadoId).nombre;

                if(val.includes("falta") || val.includes("inasistencia")) {
                    r = fechasInasistencias.length > 0 
                        ? `Le informamos que el alumno/a ${nombreHijo} registra inasistencias en las siguientes fechas: ${fechasInasistencias.join(", ")}.`
                        : `El alumno/a ${nombreHijo} no registra inasistencias a la fecha.`;
                } else if(val.includes("hola")) {
                    r = `Buenos días. Soy el asistente del Instituto Caro. ¿Desea consultar la situación de ${nombreHijo}?`;
                }
                
                chat.innerHTML += `<div class="bubble-iosi">${r}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
            inp.value = "";
        }
    </script>
</body>
</html>
