<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidad Familia - Iosef Caro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .nav-btn.active { color: #0f172a; }
        .nav-btn.active i { transform: translateY(-4px); color: #2563eb; }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #chat-window { height: 60vh; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center bg-white border-b sticky top-0 z-50">
        <div>
            <h1 class="font-black text-2xl tracking-tighter">Iosef Caro</h1>
            <p class="text-[9px] font-bold text-blue-600 uppercase tracking-widest">Portal Familia</p>
        </div>
        <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <section id="muro" class="tab-content active space-y-4">
            <h2 class="font-black text-xl px-2">Novedades</h2>
            <div id="feed-comunicados" class="space-y-4">
                </div>
        </section>

        <section id="notas" class="tab-content space-y-4">
            <h2 class="font-black text-xl px-2">Desempeño Académico</h2>
            <div id="boletin-container" class="space-y-3">
                </div>
        </section>

        <section id="iosi" class="tab-content space-y-4">
            <div class="card bg-blue-600 text-white mb-4">
                <h2 class="font-black text-lg">Hola, soy IOSI</h2>
                <p class="text-xs opacity-80">Asistente Virtual de Iosef Caro</p>
            </div>
            <div id="chat-window" class="space-y-4 p-2">
                <div class="bg-white p-4 rounded-2xl border text-sm shadow-sm">
                    Hola! ¿En qué puedo ayudarte hoy? Consultame sobre horarios, eventos o el menú del comedor.
                </div>
            </div>
            <div class="flex gap-2 sticky bottom-24 bg-white p-2 rounded-2xl border shadow-lg">
                <input type="text" id="chat-input" placeholder="Preguntame algo..." class="flex-1 outline-none px-2 font-bold text-sm">
                <button onclick="preguntarIosi()" class="w-12 h-12 bg-blue-600 text-white rounded-xl"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-2xl z-50">
        <button onclick="switchTab('muro')" class="nav-btn active flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-home transition-all"></i>
            <span class="text-[8px] font-black uppercase">Muro</span>
        </button>
        <button onclick="switchTab('notas')" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-file-invoice transition-all"></i>
            <span class="text-[8px] font-black uppercase">Notas</span>
        </button>
        <button onclick="switchTab('iosi')" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
            <i class="fas fa-robot transition-all"></i>
            <span class="text-[8px] font-black uppercase">IOSI</span>
        </button>
    </nav>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCLeGKE5NoGUQT0GRdMDIHn4zhxF3ZOp6k",
            authDomain: "app-academica-interna.firebaseapp.com",
            projectId: "app-academica-interna",
            storageBucket: "app-academica-interna.firebasestorage.app",
            messagingSenderId: "169882587504",
            appId: "1:169882587504:web:0fcdf32efdc81ad0a0bfb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LÓGICA DE NAVEGACIÓN
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // CARGAR MURO
        db.collection('comunicados').orderBy('creadoEn', 'desc').onSnapshot(snap => {
            const container = document.getElementById('feed-comunicados');
            container.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="card">
                        <span class="text-[8px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-black uppercase">${data.tag}</span>
                        <h3 class="font-black text-lg mt-2">${data.titulo}</h3>
                        <p class="text-sm text-slate-500 mt-2">${data.texto}</p>
                        ${data.link ? `<a href="${data.link}" target="_blank" class="block mt-4 text-center bg-slate-50 p-3 rounded-xl text-xs font-bold text-slate-600"><i class="fas fa-link mr-2"></i> Ver adjunto</a>` : ''}
                    </div>
                `;
            });
        });

        // LÓGICA CHAT IOSI (Sencilla para testear)
        function preguntarIosi() {
            const input = document.getElementById('chat-input');
            const win = document.getElementById('chat-window');
            if(!input.value) return;

            win.innerHTML += `<div class="bg-blue-50 p-4 rounded-2xl text-sm font-bold ml-10 text-blue-700">${input.value}</div>`;
            
            // Simulación de respuesta IA
            setTimeout(() => {
                win.innerHTML += `<div class="bg-white p-4 rounded-2xl border text-sm shadow-sm mr-10 italic">Estoy procesando tu consulta sobre "${input.value}"...</div>`;
                win.scrollTop = win.scrollHeight;
            }, 1000);
            
            input.value = "";
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
